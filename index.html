<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no">
<title>Hero Academy — Aria Learns Computers</title>
</head>
<body>
<style>
  :root{
    /* ground — deep, warm, layered "night dojo" */
    --midnight:#120E22; --panel:#1D1638; --panel2:#171130;
    --surface:rgba(255,255,255,.055); --surface-2:rgba(255,255,255,.09);
    --stroke:rgba(255,255,255,.10); --stroke-soft:rgba(255,255,255,.06);
    --ink:#0C0918;
    /* text — warm off-white */
    --white:#F7F1E6; --off:#E7DECF; --dim:#B9AECE; --faint:#7E74A0;
    /* accents — old neon var names kept but remapped to soft luminous values
       (JS inline styles reference these names, so keep them valid) */
    --yellow:#F0B95A; --gold:#F0B95A; --gold-deep:#D99A33; --gold-soft:rgba(240,185,90,.16);
    --red:#E8896B; --blue:#7FA9DB; --green:#6CC48F; --purple:#A98FE0; --orange:#EE9A5C;
    --violet:#A99BE8; --violet-soft:rgba(169,155,232,.14);
    --good:#6CC48F; --good-soft:rgba(108,196,143,.16);
    /* shape + depth */
    --r-sm:14px; --r-md:22px; --r-lg:30px; --r-pill:999px;
    --shadow-1:0 4px 14px rgba(6,4,16,.35);
    --shadow-2:0 10px 30px rgba(6,4,16,.45);
    --depth:0 5px 0 rgba(8,5,20,.55);
    --glow-gold:0 0 26px rgba(240,185,90,.28);
    --glow-good:0 0 24px rgba(108,196,143,.35);
    --disp:'Arial Rounded MT Bold','Nunito',ui-rounded,'Segoe UI Rounded','Chalkboard SE',system-ui,sans-serif;
    --body:'Nunito','Arial Rounded MT Bold',ui-rounded,'Segoe UI Rounded','Chalkboard SE',system-ui,sans-serif;
  }
  *{box-sizing:border-box; -webkit-tap-highlight-color:transparent;}
  html,body{margin:0;padding:0;}
  body{
    background:
      radial-gradient(1200px 620px at 28% -8%, #2A2050 0%, rgba(42,32,80,0) 60%),
      radial-gradient(900px 520px at 92% 6%, rgba(169,155,232,.10) 0%, rgba(169,155,232,0) 62%),
      linear-gradient(180deg,#1A1436 0%,#140F28 46%,#0C0918 100%);
    background-attachment:fixed;
    color:var(--off); font-family:var(--body);
    min-height:100vh; min-height:100dvh;
    user-select:none; -webkit-user-select:none;
    touch-action:manipulation; overflow-x:hidden;
  }
  body::before{
    content:""; position:fixed; top:-90px; left:0; right:0; bottom:-90px; pointer-events:none; z-index:0; opacity:.55;
    background-image:
      radial-gradient(1.6px 1.6px at 12% 18%, #FFEFC9 45%, transparent 47%),
      radial-gradient(1.4px 1.4px at 78% 12%, #DCD3FF 45%, transparent 47%),
      radial-gradient(1.5px 1.5px at 88% 42%, #FFEFC9 45%, transparent 47%),
      radial-gradient(1.3px 1.3px at 24% 62%, #DCD3FF 45%, transparent 47%),
      radial-gradient(1.5px 1.5px at 62% 30%, #FFEFC9 45%, transparent 47%),
      radial-gradient(1.3px 1.3px at 44% 84%, #DCD3FF 45%, transparent 47%),
      radial-gradient(1.4px 1.4px at 92% 74%, #FFEFC9 45%, transparent 47%),
      radial-gradient(1.4px 1.4px at 8% 88%, #DCD3FF 45%, transparent 47%);
    animation:starDriftA 90s ease-in-out infinite alternate, starTwinkle 7s ease-in-out infinite;
  }
  body::after{
    content:""; position:fixed; top:-90px; left:0; right:0; bottom:-90px; pointer-events:none; z-index:0; opacity:.3;
    background-image:
      radial-gradient(2.2px 2.2px at 30% 8%, #FFEFC9 45%, transparent 47%),
      radial-gradient(1.9px 1.9px at 66% 52%, #DCD3FF 45%, transparent 47%),
      radial-gradient(2px 2px at 16% 44%, #DCD3FF 45%, transparent 47%),
      radial-gradient(2.1px 2.1px at 84% 24%, #FFEFC9 45%, transparent 47%),
      radial-gradient(1.8px 1.8px at 52% 90%, #FFEFC9 45%, transparent 47%),
      radial-gradient(2px 2px at 6% 70%, #DCD3FF 45%, transparent 47%);
    animation:starDriftB 130s ease-in-out infinite alternate;
  }
  @keyframes starDriftA{from{transform:translateY(0)}to{transform:translateY(-46px)}}
  @keyframes starDriftB{from{transform:translateY(0)}to{transform:translateY(38px)}}
  @keyframes starTwinkle{0%,100%{opacity:.55}50%{opacity:.38}}
  #app{position:relative; z-index:1; max-width:600px;margin:0 auto;padding:10px 14px 40px;min-height:100vh;min-height:100dvh;display:flex;flex-direction:column;}
  .hdr{display:flex;align-items:center;justify-content:space-between;gap:8px;padding:6px 0 12px;}
  .hdr .mid{font-family:var(--disp);color:var(--gold);font-size:16px;letter-spacing:2px;text-align:center;flex:1;
    white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
  .iconbtn{
    font-size:22px;line-height:1;background:var(--surface);border:1px solid var(--stroke);
    border-radius:16px;box-shadow:var(--shadow-1);padding:10px 13px;cursor:pointer;color:var(--off);
  }
  .iconbtn:active{transform:translateY(2px);}
  .stage{flex:1;display:flex;flex-direction:column;gap:14px;}
  .card{
    background:linear-gradient(175deg,rgba(255,255,255,.055),rgba(255,255,255,.02));
    border:1px solid var(--stroke);border-radius:var(--r-lg);box-shadow:var(--shadow-2);padding:18px;
  }
  .scene{
    text-align:center;font-size:min(80px,18vw);line-height:1.15;padding:16px 6px;
    background:radial-gradient(80% 90% at 50% 32%, var(--gold-soft) 0%, rgba(255,255,255,.03) 60%);
    border:1px solid var(--stroke);border-radius:var(--r-md);min-height:120px;
    display:flex;align-items:center;justify-content:center;gap:6px;flex-wrap:wrap;
    box-shadow:inset 0 0 40px rgba(6,4,16,.3);
  }
  .bigtext{
    font-family:var(--disp);font-size:clamp(23px,6.2vw,34px);line-height:1.75;color:var(--white);
    text-align:center;margin:14px 4px 6px;letter-spacing:.4px;
  }
  .bigtext .w{display:inline-block;padding:2px 6px;border:1px solid transparent;border-radius:var(--r-pill);
    transition:background .12s,color .12s,box-shadow .12s,transform .12s;}
  .bigtext .w.on{background:var(--gold-soft);color:#FBE1A2;border-color:rgba(240,185,90,.45);
    box-shadow:0 0 16px rgba(240,185,90,.22);transform:scale(1.04);}
  .bigtext .w.done{color:var(--gold);}
  .btn{
    font-family:var(--disp);background:linear-gradient(180deg,#F6C775,#EBA93F);color:#3A2708;border:none;
    border-radius:var(--r-pill);box-shadow:var(--glow-gold),var(--depth),var(--shadow-1);
    padding:15px 26px;font-size:22px;letter-spacing:1px;cursor:pointer;display:inline-block;text-align:center;
  }
  .btn:active{transform:translateY(4px);box-shadow:0 1px 0 rgba(8,5,20,.55);}
  .btn.blue{background:linear-gradient(180deg,#9CC0E8,#6E9BD2);color:#0d233b;box-shadow:var(--depth),var(--shadow-1);}
  .btn.red{background:linear-gradient(180deg,#F0A088,#E1795B);color:#3a1608;box-shadow:var(--depth),var(--shadow-1);}
  .btn.green{background:linear-gradient(180deg,#86D6A6,#57BD86);color:#0c3a22;box-shadow:var(--depth),var(--shadow-1);}
  .btn.purple{background:linear-gradient(180deg,#C3B0F0,#9A7FE0);color:#241247;box-shadow:var(--depth),var(--shadow-1);}
  .btn.ghost{background:var(--surface);color:var(--off);border:1px solid var(--stroke);box-shadow:var(--shadow-1);}
  .btn.ghost:active{transform:translateY(2px);box-shadow:none;}
  .btn.pulse{animation:pulse 1s ease-in-out infinite;}
  .btn:disabled{opacity:.4;pointer-events:none;}
  .btnrow{display:flex;gap:12px;justify-content:center;flex-wrap:wrap;margin-top:4px;}
  .dots{display:flex;gap:8px;justify-content:center;margin-top:10px;}
  .dot{width:12px;height:12px;border-radius:50%;background:rgba(255,255,255,.14);}
  .dot.on{background:var(--gold);box-shadow:0 0 8px rgba(240,185,90,.5);}
  .optgrid{display:grid;grid-template-columns:repeat(auto-fit,minmax(130px,1fr));gap:14px;margin-top:14px;}
  .optgrid.two{grid-template-columns:1fr 1fr;}
  .opt{
    background:var(--surface);border:1px solid var(--stroke);border-radius:var(--r-md);box-shadow:var(--shadow-1);
    padding:16px 8px;text-align:center;cursor:pointer;transition:transform .1s,box-shadow .15s,background .15s;
  }
  .opt:active{transform:translateY(3px);}
  .opt .e{font-size:48px;line-height:1.1;display:block;}
  .opt .l{font-family:var(--disp);font-size:15px;color:var(--dim);letter-spacing:.5px;display:block;margin-top:8px;line-height:1.3;}
  .opt.right{border-color:rgba(108,196,143,.65);background:var(--good-soft);box-shadow:var(--glow-good);animation:pop .4s;}
  .opt.right .l{color:#BFE8CF;}
  .opt.wrong{border-color:rgba(232,137,107,.55);animation:wiggle .5s;}
  .opt.found{border-color:rgba(108,196,143,.6);background:var(--good-soft);opacity:.92;pointer-events:none;}
  .opt.dim{opacity:.35;pointer-events:none;}
  .opt.reading{border-color:rgba(240,185,90,.75);background:var(--gold-soft);box-shadow:var(--glow-gold);transform:scale(1.04);}
  .chapcard{
    display:flex;align-items:center;gap:14px;background:var(--surface);border:1px solid var(--stroke-soft);
    border-radius:var(--r-md);box-shadow:var(--shadow-1);padding:14px 16px;cursor:pointer;
    position:relative;overflow:hidden;transition:transform .1s;
  }
  .chapcard:active{transform:translateY(2px);}
  .chapcard .ce{font-size:40px;width:54px;text-align:center;flex:none;}
  .chapcard .ct{font-family:var(--disp);font-size:18px;letter-spacing:.5px;color:var(--white);flex:1;line-height:1.25;}
  .chapcard .cs{font-size:13px;color:var(--dim);font-family:var(--body);font-weight:700;display:block;margin-top:3px;letter-spacing:0;}
  .chapcard .cb{font-size:26px;flex:none;}
  .chapcard.locked{opacity:.55;}
  .chapcard.play{border-color:rgba(169,155,232,.3);background:var(--violet-soft);}
  .beltstripe{width:8px;align-self:stretch;border-radius:var(--r-pill);flex:none;box-shadow:0 0 12px rgba(255,255,255,.18);}
  .banner{
    font-family:var(--disp);text-align:center;color:var(--gold);
    font-size:clamp(28px,8.5vw,44px);letter-spacing:2px;line-height:1.12;
    text-shadow:0 0 30px rgba(240,185,90,.35);margin:8px 0;
  }
  .sub{text-align:center;color:var(--dim);font-size:16px;margin:2px 0 8px;line-height:1.5;font-weight:700;}
  .feedback{
    font-family:var(--disp);text-align:center;font-size:20px;letter-spacing:.5px;color:var(--gold);
    min-height:28px;margin-top:12px;animation:slidein .3s;
  }
  .stars{font-size:24px;letter-spacing:3px;}
  .hudrow{display:flex;align-items:center;justify-content:space-between;gap:10px;margin-bottom:8px;
    font-family:var(--disp);color:var(--dim);font-size:15px;letter-spacing:.5px;}
  .hudrow .big{color:var(--gold);font-size:18px;}
  .citygrid{display:grid;grid-template-columns:repeat(5,1fr);gap:5px;background:rgba(0,0,0,.25);
    border:1px solid var(--stroke);border-radius:var(--r-md);padding:8px;}
  .cell{aspect-ratio:1;display:flex;align-items:center;justify-content:center;font-size:clamp(22px,6.4vw,36px);
    background:var(--surface);border-radius:12px;position:relative;}
  .cell.wall{background:rgba(169,143,224,.14);}
  .progrow{display:flex;gap:7px;flex-wrap:wrap;min-height:54px;background:rgba(0,0,0,.2);
    border:1px dashed var(--stroke);border-radius:var(--r-md);padding:8px;align-items:center;}
  .chip{font-size:28px;background:linear-gradient(180deg,rgba(169,155,232,.24),rgba(169,155,232,.1));
    border:1px solid rgba(169,155,232,.4);border-radius:16px;box-shadow:var(--shadow-1);padding:6px 10px;cursor:pointer;}
  .chip:active{transform:translateY(2px);}
  .chip.bad{border-color:rgba(232,137,107,.7);animation:wiggle .5s;}
  .chip.fixed{border-color:rgba(108,196,143,.7);box-shadow:var(--glow-good);animation:pop .4s;}
  .palette{display:flex;gap:10px;justify-content:center;flex-wrap:wrap;}
  .palette .chip{font-size:32px;}
  .slotrow{display:flex;gap:10px;justify-content:center;margin:10px 0;flex-wrap:wrap;}
  .slot{width:74px;height:74px;border:1px dashed var(--stroke);border-radius:18px;display:flex;align-items:center;
    justify-content:center;font-size:38px;background:var(--surface);}
  .slot.filled{border-style:solid;border-color:rgba(108,196,143,.6);box-shadow:var(--glow-good);}
  .repeatbox{display:flex;align-items:center;justify-content:center;gap:14px;background:var(--violet-soft);
    border:1px solid rgba(169,155,232,.4);border-radius:var(--r-md);box-shadow:var(--shadow-1);padding:14px;margin:10px 0;}
  .repeatbox .num{font-family:var(--disp);font-size:48px;color:var(--white);min-width:64px;text-align:center;}
  .repeatbox .lbl{font-family:var(--disp);font-size:16px;color:var(--violet);letter-spacing:.5px;line-height:1.2;text-align:center;}
  .villain{display:inline-block;font-size:min(46px,10vw);margin:0 3px;animation:wiggle 1.6s ease-in-out infinite;transition:transform .4s,opacity .4s;}
  .villain.zapped{transform:scale(.1) rotate(200deg);opacity:0;}
  .villain.gone{opacity:.22;animation:none;filter:grayscale(1);}
  .rulecard{background:var(--violet-soft);border:1px solid rgba(169,155,232,.4);border-radius:var(--r-md);
    padding:12px 14px;text-align:center;font-family:var(--disp);font-size:19px;color:var(--white);
    letter-spacing:.5px;margin-bottom:10px;line-height:1.4;}
  .rulecard.hint{animation:pulse .9s infinite;border-color:rgba(240,185,90,.6);box-shadow:var(--glow-gold);}
  .pickrow{display:flex;align-items:center;justify-content:space-between;gap:10px;background:var(--surface);
    border:1px solid var(--stroke-soft);border-radius:var(--r-md);padding:10px 12px;margin-top:10px;}
  .pickrow .pv{font-size:19px;font-family:var(--disp);color:var(--white);flex:1;text-align:center;letter-spacing:.3px;}
  .arrowbtn{font-size:22px;background:linear-gradient(180deg,#F6C775,#EBA93F);color:#3A2708;border:none;
    border-radius:14px;box-shadow:var(--depth),var(--shadow-1);padding:9px 15px;cursor:pointer;font-weight:bold;}
  .arrowbtn:active{transform:translateY(3px);box-shadow:0 1px 0 rgba(8,5,20,.55);}
  .herocard{border-radius:var(--r-lg);border:2px solid;box-shadow:0 0 34px;padding:20px;text-align:center;
    background:var(--surface);animation:pop .5s;}
  .badgebig{font-size:110px;text-align:center;animation:pop .6s;filter:drop-shadow(0 0 24px rgba(240,185,90,.3));}
  .membox{display:inline-block;background:var(--gold-soft);border:1px solid rgba(240,185,90,.5);
    border-radius:var(--r-md);box-shadow:var(--glow-gold);padding:10px 18px;min-width:110px;text-align:center;}
  .membox .tag{font-family:var(--disp);font-size:14px;color:var(--gold);letter-spacing:2px;display:block;}
  .membox .val{font-family:var(--disp);font-size:44px;color:var(--white);display:block;line-height:1.2;}
  .grown{background:var(--surface);border:1px solid var(--stroke-soft);border-radius:var(--r-md);padding:14px 16px;
    color:var(--dim);font-size:14px;line-height:1.6;user-select:text;-webkit-user-select:text;}
  .grown h3{color:var(--off);margin:0 0 6px;font-family:var(--disp);letter-spacing:.5px;}
  .grown b{color:var(--off);}
  .tinylink{text-align:center;color:var(--faint);font-size:14px;margin-top:16px;cursor:pointer;text-decoration:underline;}
  .sky{position:relative;height:56vh;min-height:320px;background:linear-gradient(180deg,#1A1436,#241B44);
    border:1px solid var(--stroke);border-radius:var(--r-md);overflow:hidden;box-shadow:inset 0 0 50px rgba(6,4,16,.4);}
  .fallstar{position:absolute;top:-60px;font-size:44px;cursor:pointer;transition:top linear;z-index:2;
    filter:drop-shadow(0 0 10px rgba(240,185,90,.4));}
  .fallstar.caught{animation:pop .3s;opacity:0;transition:opacity .3s;}
  .cfx{position:fixed;inset:0;pointer-events:none;overflow:hidden;z-index:50;}
  .cfp{position:absolute;top:-24px;font-size:24px;animation:fall linear forwards;}
  .pow{
    position:fixed;left:50%;top:38%;transform:translate(-50%,-50%);z-index:60;pointer-events:none;
    font-family:var(--disp);font-size:clamp(40px,12vw,78px);color:var(--gold);letter-spacing:2px;
    text-shadow:0 0 30px rgba(240,185,90,.5);animation:pow .9s ease-out forwards;
  }
  @keyframes pulse{0%,100%{transform:scale(1)}50%{transform:scale(1.06)}}
  @keyframes pop{0%{transform:scale(.3)}70%{transform:scale(1.12)}100%{transform:scale(1)}}
  @keyframes wiggle{0%,100%{transform:rotate(-4deg)}50%{transform:rotate(4deg)}}
  @keyframes slidein{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:none}}
  @keyframes fall{to{transform:translate(var(--sx,0px),110vh) rotate(var(--rot,720deg));opacity:.85}}
  @keyframes pow{0%{transform:translate(-50%,-50%) scale(.2);opacity:0}28%{transform:translate(-50%,-50%) scale(1.28);opacity:1}55%{transform:translate(-50%,-50%) scale(.9)}75%{transform:translate(-50%,-50%) scale(1.08)}100%{transform:translate(-50%,-50%) scale(1);opacity:0}}
  @keyframes floaty{0%,100%{transform:translateY(0)}50%{transform:translateY(-10px)}}
  @keyframes meteor{0%,100%{transform:translateY(0) scale(1)}50%{transform:translateY(14px) scale(1.06)}}
  .floaty{animation:floaty 2.6s ease-in-out infinite;display:inline-block;}
  /* ===== Motion system: choreographed entrances + springy interactions ===== */
  .hdr{animation:fadeDown .34s cubic-bezier(.22,1,.36,1) both;}
  .stage>*:not(.floaty):not(.badgebig){animation:riseIn .42s cubic-bezier(.22,1,.36,1) both;animation-delay:.3s;}
  .stage>*:not(.floaty):not(.badgebig):nth-child(1){animation-delay:0s;}
  .stage>*:not(.floaty):not(.badgebig):nth-child(2){animation-delay:.05s;}
  .stage>*:not(.floaty):not(.badgebig):nth-child(3){animation-delay:.09s;}
  .stage>*:not(.floaty):not(.badgebig):nth-child(4){animation-delay:.13s;}
  .stage>*:not(.floaty):not(.badgebig):nth-child(5){animation-delay:.17s;}
  .stage>*:not(.floaty):not(.badgebig):nth-child(6){animation-delay:.21s;}
  .stage>*:not(.floaty):not(.badgebig):nth-child(7){animation-delay:.25s;}
  .stage>*:not(.floaty):not(.badgebig):nth-child(8){animation-delay:.28s;}
  .optgrid .opt:not(.right):not(.wrong):not(.found):not(.dim){animation:optIn .36s cubic-bezier(.3,1.4,.6,1) both;animation-delay:.24s;}
  .optgrid .opt:not(.right):not(.wrong):not(.found):not(.dim):nth-child(1){animation-delay:.02s;}
  .optgrid .opt:not(.right):not(.wrong):not(.found):not(.dim):nth-child(2){animation-delay:.07s;}
  .optgrid .opt:not(.right):not(.wrong):not(.found):not(.dim):nth-child(3){animation-delay:.12s;}
  .optgrid .opt:not(.right):not(.wrong):not(.found):not(.dim):nth-child(4){animation-delay:.16s;}
  .optgrid .opt:not(.right):not(.wrong):not(.found):not(.dim):nth-child(5){animation-delay:.2s;}
  .btn,.opt,.chapcard,.iconbtn,.arrowbtn,.chip{transition:transform .16s cubic-bezier(.3,1.4,.6,1),box-shadow .16s ease;}
  @media (hover:hover){
    .btn:hover{transform:translateY(-2px);}
    .opt:hover{transform:translateY(-3px);}
    .chapcard:hover{transform:translateY(-2px);}
    .iconbtn:hover{transform:translateY(-1px);}
  }
  /* re-assert press states so they win over hover */
  .btn:active{transform:translateY(4px);}
  .btn.ghost:active{transform:translateY(2px);}
  .opt:active{transform:translateY(3px);}
  .chapcard:active{transform:translateY(2px);}
  .iconbtn:active{transform:translateY(3px);}
  @keyframes fadeDown{from{opacity:0;transform:translateY(-8px)}to{opacity:1;transform:none}}
  @keyframes riseIn{from{opacity:0;transform:translateY(14px) scale(.985)}to{opacity:1;transform:none}}
  @keyframes optIn{from{opacity:0;transform:translateY(10px) scale(.92)}to{opacity:1;transform:none}}
  @media (prefers-reduced-motion:reduce){*{animation:none !important;transition:none !important;}}
  /* ===== Professor Pixel — living mascot ===== */
  .pixel-mascot{display:inline-block;line-height:0;}
  .pixel-mascot svg,.pixel-mascot img.pxm{animation:pixelBreathe 3.8s ease-in-out infinite;transform-origin:50% 92%;filter:drop-shadow(0 6px 20px rgba(240,185,90,.18));}
  .pixel-mascot img.pxm{display:block;object-fit:contain;}
  /* produced raster art */
  .art-icon{display:inline-block;vertical-align:middle;object-fit:contain;}
  .scene-art{max-width:min(52vw,240px);max-height:220px;object-fit:contain;filter:drop-shadow(0 8px 24px rgba(6,4,16,.5));}
  .cell-art{width:88%;height:88%;object-fit:contain;display:block;margin:auto;}
  .villain img{width:min(52px,11vw);height:auto;display:block;}
  .hq-arch{display:block;margin:0 auto -18px;width:min(72%,380px);opacity:.9;filter:drop-shadow(0 6px 24px rgba(240,185,90,.15));}
  .fallstar img{width:48px;height:48px;display:block;pointer-events:none;}
  /* binary switchboard (track 2) */
  .bswrap{display:flex;gap:10px;justify-content:center;margin:10px 0 2px;}
  .bscol{display:flex;flex-direction:column;align-items:center;gap:6px;}

/* raster lip-flap: alternate idle/talk frames while narrating */
let talkFlapT=null;
function pixelTalk(on){
  try{
    document.querySelectorAll(".pixel-mascot").forEach(function(m){ m.classList.toggle("talking",!!on); });
    if(ART){
      if(on&&!talkFlapT){
        let flip=false;
        talkFlapT=setInterval(function(){
          flip=!flip;
          document.querySelectorAll('.pixel-mascot.talking[data-pose="idle"] img.pxm,.pixel-mascot.talking[data-pose="talk"] img.pxm').forEach(function(img){
            img.src="assets/pixel-"+(flip?"talk":"idle")+".png";
          });
        },200);
      }else if(!on&&talkFlapT){
        clearInterval(talkFlapT); talkFlapT=null;
        document.querySelectorAll('.pixel-mascot[data-pose] img.pxm').forEach(function(img){
          const p=img.closest(".pixel-mascot").getAttribute("data-pose");
          img.src="assets/pixel-"+p+".png";
        });
      }
    }
  }catch(e){}
}
/* walk-in entrance: Pixel strides in from the left, then settles into his pose */
function pixelWalkIn(container){
  if(!ART||!container)return;
  if(window.matchMedia&&window.matchMedia("(prefers-reduced-motion: reduce)").matches)return;
  const m=container.querySelector(".pixel-mascot"), img=container.querySelector("img.pxm");
  if(!m||!img)return;
  const finalPose=m.getAttribute("data-pose")||"idle";
  let flip=false;
  img.src="assets/pixel-walk-a.png";
  const frames=setInterval(function(){
    if(!img.isConnected){clearInterval(frames);return;}
    flip=!flip; img.src="assets/pixel-walk-"+(flip?"b":"a")+".png";
  },150);
  try{
    const anim=m.animate([{transform:"translateX(-70vw)"},{transform:"translateX(0)"}],{duration:1000,easing:"ease-out"});
    anim.onfinish=function(){ clearInterval(frames); if(img.isConnected)img.src="assets/pixel-"+finalPose+".png"; };
  }catch(e){ clearInterval(frames); img.src="assets/pixel-"+finalPose+".png"; }
}

  try{ localStorage.setItem("hero-academy-profiles",JSON.stringify(reg)); }catch(e){}
  return reg;
}
function saveProfiles(){ try{localStorage.setItem("hero-academy-profiles",JSON.stringify(PROFILES));}catch(e){} }
function selectProfile(id){
  const prof=PROFILES.list.find(function(p){return p.id===id;});
  if(!prof)return;
  activeProfile=prof;
  PROFILES.active=id;
  saveProfiles();
  P={v:3,belts:{},heroes:0,best:0};
  try{ const raw=localStorage.getItem("hero-academy-progress-"+id); if(raw)P=Object.assign(P,JSON.parse(raw)); }catch(e){}
  NAME=prof.name;
}
function save(){
  if(activeProfile){
    try{localStorage.setItem("hero-academy-progress-"+activeProfile.id,JSON.stringify(P));}catch(e){}
    activeProfile.updatedAt = new Date().toISOString();
    saveProfiles();
  }
}
function createProfile(name,ageBandVal,avatar){
  const id="p"+Math.random().toString(36).slice(2,9);
  const prof={id:id,name:((name||"").replace(/[<>&]/g,"").trim().slice(0,18))||"Hero",ageBand:ageBandVal||"4-7",avatar:avatar||"🦸‍♀️"};
  prof.updatedAt = new Date().toISOString();
  PROFILES.list.push(prof);
  saveProfiles();
  selectProfile(id);
}
function deleteProfile(id){
  PROFILES.list=PROFILES.list.filter(function(p){return p.id!==id;});
  try{ localStorage.removeItem("hero-academy-progress-"+id); }catch(e){}
  if(PROFILES.active===id){ PROFILES.active=null; activeProfile=null; }
  saveProfiles();
}
function ageBand(){ return activeProfile?activeProfile.ageBand:"4-7"; }
function BP(beltId){
  if(!P.belts[beltId])P.belts[beltId]={les:{},cor:{},earned:false};
  return P.belts[beltId];
}
function starsFor(beltId,skillId){
  const c=(BP(beltId).cor[skillId]||0);
  return c>=10?3:c>=6?2:c>=3?1:0;
}
function starStr(n){ return "⭐".repeat(n)+"☆".repeat(3-n); }

     {check:{t:"So what really changed between THEN and NOW?", spoken:"So what really changed between then and now?",

       yes:"Exactly. Same jobs, faster tools. That's the smartest way to think about all technology."}},

{ id:"yellow2", name:"YELLOW BELT", concept:"THE INTERNET", beltEmoji:"🟡", color:"#F2C94C",
  skills:["urltrip","packet","cs"], testN:6, testPass:5,
  lessons:[
   { title:"WHERE THE CLOUD LIVES", emoji:"☁️", slides:[
     {e:"☁️", t:"'The cloud' is a building.",
      x:"Your photos are 'in the cloud'. Cool. Here's the thing — the cloud is a real building called a DATA CENTER. A giant warehouse packed with thousands of computers, humming in the dark, kept freezing cold so they don't overheat."},
     {e:"🖥️", t:"Racks and racks of servers.",
      x:"Those computers are called SERVERS. No screens, no keyboards — just stacked machines with blinking lights, working for millions of people at once. Your photos live on a few of them right now, in a building you will never visit."},
     {e:"🧊", t:"Cold air. Backup power.",
      x:"Data centers need monster air conditioning, and backup generators too — because if one loses power, a chunk of the internet goes dark with it. Somewhere out there, someone's whole job is keeping those rooms cold."},
     {check:{t:"So where IS the cloud, really?", spoken:"So — where is the cloud, really?",
       opts:[{e:"🏢",l:"A BUILDING FULL OF SERVERS",ok:true},{e:"🌦️",l:"UP IN THE SKY",no:"The sky has regular clouds. Your photos are in a very cold warehouse. Less poetic — more true. Again."},{e:"📱",l:"INSIDE YOUR PHONE",no:"If it lived in your phone, losing the phone would lose everything. It lives in a data center — which is exactly why it's safe. Again."}],
       yes:"A building full of servers. Every cloud thing you use lives in one."}},
     {e:"🌍", t:"They're everywhere.",
      x:"Big tech companies run HUNDREDS of these buildings all over the world, so there's always one near-ish to you. Next time someone says 'the cloud', picture it properly: racks, blinking lights, cold air, hum."},
   ]},
   { title:"ASK + ANSWER", emoji:"🏓", slides:[
     {e:"🏓", t:"The internet's only rule.",
      x:"Everything online is one single pattern: somebody ASKS, somebody ANSWERS. Your device asks. A server answers. Ask, answer, ask, answer, forever. That's it. That's the internet."},
     {e:"📱", t:"Your device = the CLIENT.",
      x:"The asker is called the CLIENT. Your phone, your tablet, your console — all clients. When you open a video, your device is asking a server: hey, send me that video. Please. Well... without the please."},
     {e:"🖥️", t:"The answerer = the SERVER.",
      x:"The server has the stuff — the videos, the messages, the game worlds. It sits in that freezing data center answering MILLIONS of asks every second, without ever getting bored. Servers don't do bored."},
     {check:{t:"You hit play on a video. Who actually HAS the video?", spoken:"You hit play on a video. Who actually has the video file?",
       opts:[{e:"🖥️",l:"THE SERVER",ok:true},{e:"📱",l:"YOUR PHONE",no:"If the whole video were already on your phone, you wouldn't need internet to watch it. Your phone asks — the server sends. Again."},{e:"🎨",l:"THE SCREEN",no:"The screen just shows what it's given. The file lives far away. Again."}],
       yes:"The server. Your phone asks, and the video streams over, piece by piece."}},
     {e:"💬", t:"Where messages wait.",
      x:"Send a message while your friend's phone is dead. Where does it go? It waits ON THE SERVER. When their phone wakes up, it asks the server: anything for me? — and gets your message. Messages never fly phone to phone. They always go through the middle."},
     {check:{t:"Friend's phone is OFF. Your message...", spoken:"Your friend's phone is completely off. What happens to your message?",
       opts:[{e:"🖥️",l:"WAITS ON THE SERVER",ok:true},{e:"↩️",l:"BOUNCES BACK TO YOU",no:"Nothing bounces — the middle just holds it. Again."},{e:"✨",l:"TELEPORTS INTO THEIR PHONE",no:"Into a phone that's OFF? Nothing enters a dead phone. The server holds it until the phone asks. Again."}],
       yes:"It waits on the server — which is exactly why it arrives the second they're back online."}},
   ]},
   { title:"A MESSAGE'S JOURNEY", emoji:"✉️", slides:[
     {e:"⌨️", t:"You type a site's name...",
      x:"...and hit enter. Here's the secret journey. First problem: the internet doesn't know NAMES — it knows number addresses. So your device asks a phonebook service called D N S: what's the address for this name?"},
     {e:"📖", t:"DNS — the phonebook.",
      x:"D N S answers with the server's address in a few milliseconds. This happens for every site, every single time — so fast you've never even noticed it exists. Now you know one of the internet's secret services."},
     {e:"✂️", t:"Data travels in packets.",
      x:"And here's the weird part. Your data doesn't travel in one piece! It gets chopped into thousands of little chunks called PACKETS. Each packet races across the internet on its own — hopping from router to router — and everything gets rebuilt at the other end. One photo can be a thousand packets."},
     {check:{t:"DNS's job is to...", spoken:"Quick check. What is D N S's job?",
       opts:[{e:"📖",l:"TURN NAMES INTO ADDRESSES",ok:true},{e:"📦",l:"CARRY THE PACKETS",no:"Routers do the carrying. D N S is the phonebook you check BEFORE the trip. Again."},{e:"🎨",l:"DRAW THE WEBSITE",no:"Your browser draws the page — at the very end. D N S works at the very start. Again."}],
       yes:"The phonebook. Name in, address out, journey begins."}},
     {e:"⏳", t:"Why the spinner spins.",
      x:"When you see the loading spinner, nothing is broken. Your request is literally TRAVELING — maybe across an ocean, through cables lying on the sea floor — and the answer has to travel all the way back. Far server, slower answer. Near server, snappy. Distance is real, even online."},
     {check:{t:"The spinner is spinning. What's ACTUALLY happening?", spoken:"The spinner is spinning. What is actually happening?",
       opts:[{e:"✈️",l:"THE ANSWER IS STILL TRAVELING",ok:true},{e:"🤔",l:"THE PHONE IS THINKING HARD",no:"Your phone finished asking ages ago — it's waiting for the answer to travel back. Again."},{e:"😤",l:"THE APP IS SULKING",no:"Apps don't sulk. Data travels. Sometimes across the literal ocean floor. Again."}],
       yes:"Traveling. Sometimes across the actual ocean floor. Give it a second."}},
   ]},
  ]},
{ id:"orange2", name:"ORANGE BELT", concept:"WHAT APPS ARE MADE OF", beltEmoji:"🟠", color:"#EE9A5C",
  skills:["organs","journey","crew"], testN:6, testPass:5,
  lessons:[
   { title:"THE FOUR ORGANS", emoji:"🧩", slides:[
     {e:"🧩", t:"Every app is four parts.",
      x:"Every app you love — same four organs inside. The FRONTEND you see and touch. The BACKEND thinking far away. The DATABASE remembering everything. And the API — the messenger sprinting between them. Learn these four, and no app is ever a mystery again."},
     {e:"📱", t:"Frontend: what you see.",
      x:"Buttons, colors, animations, the keyboard, the loading spinner. If your eyes see it or your finger touches it — that's frontend, living right on your device."},
     {e:"🖥️", t:"Backend: the far-away brain.",
      x:"Checking your password. Picking your next video. Matching you with players your level. The heavy thinking happens on servers — the backend — because your phone can't know what millions of other people are doing. The backend can."},
     {e:"🗄️", t:"Database: the forever memory.",
      x:"Your score, your friends, every comment ever posted — the database keeps it all safe. Even when your phone is off. Even if your tablet takes a bath. Ahem. ESPECIALLY then."},
     {e:"📨", t:"API: the messenger.",
      x:"When you tap, the frontend writes a tiny message, and the A P I carries it to the backend — then sprints the answer back home. Millions of little messengers, running, every single second."},
     {check:{t:"Your high score lives FOREVER in the...", spoken:"Check! Your high score has to survive forever. Which organ keeps it?",
       opts:[{e:"🗄️",l:"THE DATABASE",ok:true},{e:"📱",l:"THE FRONTEND",no:"The frontend SHOWS the score — but showing isn't remembering. Again."},{e:"⏳",l:"THE SPINNER",no:"The spinner just spins. It remembers absolutely nothing. Again."}],
       yes:"The database. Forever is its whole job."}},
   ]},
   { title:"THE CREW + UPDATE DAY", emoji:"👷", slides:[
     {e:"👷", t:"Apps are built by crews.",
      x:"A real app team: the DESIGNER makes it beautiful. The FRONTEND DEV builds what you touch. The BACKEND DEV builds the far-away brain. The DATA ENGINEER guards the memory. The PM decides what gets built next. And the TESTER... tries to break everything. On purpose. It's their job."},
     {e:"🔗", t:"Nobody works alone.",
      x:"The designer's gorgeous button? Does nothing without backend code behind it. The backend? Has nothing to say without the database. Every part needs every other part. Apps are a team sport."},
     {e:"🚀", t:"Why apps update.",
      x:"That little UPDATE button? The crew fixed bugs, added features, patched security holes. 'Bug fixes and performance improvements' secretly means: we found the broken bits before you did. Mostly before."},
     {check:{t:"Who tries to BREAK the app on purpose?", spoken:"Check! Someone on the crew breaks the app on purpose, every day. Who?",
       opts:[{e:"🧪",l:"THE TESTER",ok:true},{e:"🎨",l:"THE DESIGNER",no:"The designer makes it lovely — someone else does the smashing. Again."},{e:"🦹",l:"A VILLAIN",no:"Ha — no villains needed. The team hires their own breaker. Again."}],
       yes:"The tester — breaking it in private, so it never breaks on you."}},
   ]},
  ]},
{ id:"green2", name:"GREEN BELT", concept:"DATABASES", beltEmoji:"🟢", color:"#6CC48F",
  skills:["tables","dbmatch","pickcol"], testN:6, testPass:5,
  lessons:[
   { title:"THE MEMORY OF THE WORLD", emoji:"🗄️", slides:[
     {e:"🗄️", t:"Databases remember everything.",
      x:"Every score, every message, every account on Earth lives in a DATABASE — the most under-famous invention in all of tech. Time you two met properly."},
     {e:"📋", t:"Tables: rows and columns.",
      x:"A database keeps TABLES. Each ROW is one thing's whole entry — one pet, one player, one order. Each COLUMN is one kind of info for everyone — every name, every age. A grid with a perfect memory."},
     {e:"📱", t:"One is in your pocket. Right now.",
      x:"A tiny database called S Q Lite lives inside your phone THIS SECOND, holding your texts and settings. You've carried a database around for years without knowing its name. Now you know its name."},
     {e:"🌍", t:"Postgres. MySQL. MongoDB.",
      x:"The big engines: Postgres and MySQL run half the internet's tables. MongoDB keeps flexible boxes instead of strict grids. Real technology names. Drop them at dinner. Watch the grown-ups blink."},
     {check:{t:"One ROW in the pets table is...", spoken:"Check! In a table of pets — what is one row?",
       opts:[{e:"🐶",l:"ONE PET'S WHOLE ENTRY",ok:true},{e:"📊",l:"ONE KIND OF INFO",no:"That's a COLUMN — everyone's age, everyone's name. A row is one whole pet. Again."},{e:"🚣",l:"A TINY BOAT",no:"Different kind of row, sailor. Again."}],
       yes:"One row, one pet — name, species, age, the works."}},
   ]},
   { title:"ASK THE DATA ANYTHING", emoji:"🔍", slides:[
     {e:"🔍", t:"Queries: questions for data.",
      x:"A QUERY is a question you ask a database. Show me every player above level nine! Which pet is oldest? The database answers across MILLIONS of rows — in milliseconds. That's the superpower."},
     {e:"⚡", t:"When apps feel instant...",
      x:"...you're feeling a database being very good at its job. Finding your account among two billion accounts takes it milliseconds. It is genuinely showing off."},
     {e:"👻", t:"Data outlives the app.",
      x:"Here's one worth remembering forever: DELETE the app, and your account still exists — far away, in the database. The delete button on your screen doesn't reach the server. Which means: think BEFORE you post, not after."},
     {check:{t:"You delete the app. Your account...", spoken:"Check. You delete the app from your phone. What happens to your account?",
       opts:[{e:"🗄️",l:"STILL LIVES IN THE DATABASE",ok:true},{e:"💨",l:"VANISHES FOREVER",no:"Your phone only deleted its own copy. The server never noticed. Again."},{e:"🗑️",l:"HIDES IN THE TRASH",no:"Not in your trash — in a data center, far away. Again."}],
       yes:"Still there, on the server. Screens forget. Databases don't."}},
   ]},
  ]},
{ id:"blue2", name:"BLUE BELT", concept:"REAL CODE", beltEmoji:"🔵", color:"#7FA9DB",
  skills:["pyread","pyfill","pyfork"], testN:6, testPass:5,
  lessons:[
   { title:"HELLO, REAL CODE", emoji:"💬", slides:[
     {e:"⌨️", t:"Time. Actual code.",
      x:"Everything so far — the machine, the internet, the organs of an app — was the map. Today you write the territory. Real syntax, in a real terminal, really running. Ready? You're ready."},
     {e:"💬", t:'print("hi")',
      x:"print is an instruction: put this on the screen. The round brackets hold WHAT to print. The quotes say: these are words, exactly as written. Every coder on Earth started with this exact line. Every single one."},
     {e:"🔤", t:"Quotes = words. No quotes = trouble.",
      x:"Write print, and in quotes, pizza — the terminal says pizza. Forget the quotes, and the machine goes hunting for a BOX named pizza, finds nothing, and throws an error. Quotes matter. A lot."},
     {e:"➕", t:'print("ha" + "ha") → haha',
      x:"With words, plus is GLUE. Two ha's glue into haha — no space appears unless you put one inside the quotes yourself. The machine does exactly what you wrote. Never what you meant. Remember that one."},
     {check:{t:'print("boom") shows...', spoken:"First check! print, and in quotes, boom. What appears in the terminal?",
       opts:[{e:"💥",l:"boom",ok:true},{e:"✏️",l:'"boom" — QUOTES AND ALL',no:"The quotes are for the machine, not the screen. They never get printed. Again."},{e:"🖨️",l:"print",no:"print is the instruction, not the message. Again."}],
       yes:"Just boom. The quotes stay behind the curtain."}},
     {e:"🖥️", t:"Your terminal awaits.",
      x:"In the playground there's now a REAL terminal with your name on it — type code, run it, break it, nobody minds. And the practice arena opens after these lessons. Let's write."},
   ]},
   { title:"BOXES, BUT REAL", emoji:"📦", slides:[
     {e:"📦", t:"score = 7",
      x:"Memory boxes, real syntax. score, equals, seven — that MAKES a box called score with seven inside. One equals sign means: STORE this."},
     {e:"🏷️", t:'name = "Zoe"',
      x:"Boxes hold words too — with quotes. And then: print, quote hi space quote, plus name — the terminal says hi Zoe. print opens the box and uses what's inside."},
     {e:"🔄", t:"score = score + 1",
      x:"The most famous line in video games. Take what's in score, add one, store it BACK. Every coin grabbed, every point ever scored, in every game ever made — this line was running."},
     {check:{t:"score = 4, then score = score + 1. Now the box holds...", spoken:"Check! score equals four. Then: score equals score plus one. What's in the box now?",
       opts:[{e:"5️⃣",l:"5",ok:true},{e:"4️⃣",l:"4",no:"The second line updated the box — old value out, new value in. Again."},{e:"🔢",l:"41",no:"Ha — no gluing here! Both are real numbers, so real math. Again."}],
       yes:"Five. The box always keeps the newest value."}},
     {e:"🧠", t:"Numbers add. Words glue.",
      x:"Three plus four is seven. But quote-three plus quote-four is... thirty-four! Numbers in quotes aren't numbers — they're words in a number costume. This trips up REAL programmers. Not you though. Now you know."},
   ]},
   { title:"THE FORK: if / else", emoji:"🔱", slides:[
     {e:"🔱", t:'if password == "otter":',
      x:"The fork, in real syntax. IF, then the rule, then a colon. The line under it — pushed in with spaces — runs ONLY if the rule is true. That pushing-in is called INDENTING, and it shows the machine what belongs to the if."},
     {e:"⚖️", t:"== asks. = stores.",
      x:"One equals sign STORES into a box. Two equals signs ASK: are these the same? Store with one. Ask with two. The machine never confuses them — so you can't either."},
     {e:"🔀", t:"else: — the other path.",
      x:"else, colon, its own indented line. Rule true? The if-path runs. Rule false? The else-path. One rule, two doors — and the machine walks through exactly one. Every time."},
     {check:{t:"power = 3. if power > 5: mega, else: mini. Which prints?", spoken:"Check! power is three. If power is bigger than five, print mega. Else, print mini. Which one prints?",
       opts:[{e:"🐜",l:"mini",ok:true},{e:"💪",l:"mega",no:"Three is not bigger than five — the if-door stays shut, the else-door opens. Again."},{e:"👯",l:"BOTH",no:"Never both! One rule, one door, one path. Again."}],
       yes:"mini. Three lost to five, so else took over."}},
     {e:"🧭", t:"> and < compare numbers.",
      x:"If temp is greater than twenty-five: shorts. Else: jacket. Congratulations — you now read the exact logic that runs games, apps, and robots. The arena is open. Go fork some paths."},
   ]},
  ]},
{ id:"purple2", name:"PURPLE BELT", concept:"DEBUGGING", beltEmoji:"🟣", color:"#A98FE0",
  skills:["errfix","verorder"], testN:6, testPass:5,
  lessons:[
   { title:"ERRORS ARE CLUES", emoji:"🐛", slides:[
     {e:"🦋", t:"The first bug was a real moth.",
      x:"True story. 1947 — a computer the size of a room stops working. Engineer Grace Hopper's team opens it up and finds an actual MOTH stuck inside. They tape it into the logbook and write: first actual case of bug being found. Computer mistakes have been BUGS ever since."},
     {e:"🚨", t:"An error is not an insult.",
      x:"When the terminal prints an error, it isn't angry at you. It's POINTING: this line, this name, this problem. Beginners look away from errors. Pros read them like treasure maps."},
     {e:"🧭", t:"Read it: line, name, hint.",
      x:"Line 2 — I don't know scor. That's the WHERE, the WHAT, and usually the fix, all in one sentence. And here's a secret: ninety percent of bugs are typos, missing quotes, or a missing colon. You've already met all three."},
     {e:"🔁", t:"Guess. Check. Fix ONE thing. Run.",
      x:"The debugging loop. Fix one thing at a time — change five things at once and you'll never know which one mattered. Then run again. And again. That loop is the actual daily life of every programmer alive."},
     {check:{t:"The terminal shows an error. A pro...", spoken:"Check! The terminal shows an error. What does a professional do?",
       opts:[{e:"🔍",l:"READS IT — IT'S A CLUE",ok:true},{e:"🔌",l:"RESTARTS THE PHONE",no:"The classic move! But the bug will be sitting there waiting after the restart. Read the clue. Again."},{e:"😭",l:"GIVES UP",no:"Never. Bugs lose to patience, every time. Again."}],
       yes:"Reads it. Line, name, hint — the error already knows where the treasure is."}},
   ]},
   { title:"HOW REAL SOFTWARE SHIPS", emoji:"🚢", slides:[
     {e:"🚢", t:"Nobody writes it perfect.",
      x:"Not beginners. Not pros. NOBODY writes correct code on the first try. Real software gets written, tested, broken, fixed, and tested again — on purpose, every day, at every tech company on Earth."},
     {e:"🧪", t:"Test before you ship.",
      x:"Before an update ever reaches your tablet, testers and testing robots hammer it — tap every button, break every screen, try every silly thing. What survives, ships. What doesn't goes back to the bench."},
     {e:"1️⃣", t:"Version 1.0 is a beginning.",
      x:"One point oh is never the end — it's the first survivor. Then one point one fixes what users found. Two point oh brings the big ideas. Software is never finished. It's just... currently shipped."},
     {check:{t:"Why do apps update so often?", spoken:"Check! Why do your apps update so often?",
       opts:[{e:"🛠️",l:"FIXES + NEW FEATURES",ok:true},{e:"🧹",l:"THE ICON GETS DUSTY",no:"Icons are dust-proof, I checked. Again."},{e:"😤",l:"TO ANNOY YOU",no:"It can FEEL that way at bedtime. But no. Again."}],
       yes:"Bug fixes, new features, security patches. The crew never stops."}},
   ]},
  ]},
{ id:"black2", name:"BLACK BELT", concept:"AI + THE FINAL TEST", beltEmoji:"⚫", color:"#4A4460",
  skills:[], testN:8, testPass:6,
  lessons:[
   { title:"WHAT AI ACTUALLY IS", emoji:"✨", slides:[
     {e:"✨", t:"AI is not magic. It's patterns.",
      x:"Artificial intelligence learns by seeing MILLIONS of examples. Show it a million cat photos — it learns the PATTERN of cat. Then it guesses: is this new thing a cat? It doesn't think. It doesn't dream. It pattern-guesses. Very, very fast."},
     {e:"🎓", t:"Training = showing examples.",
      x:"Teaching an AI is called TRAINING, and training is mostly showing examples with answers attached. Good examples make a good guesser. Bad or unfair examples make a bad or unfair guesser. The examples ARE the teacher."},
     {e:"🤖", t:"You used AI today. Several times.",
      x:"Autocorrect guessing your word. Your video app guessing what you'll love next. Voice assistants guessing what you said. All pattern-guessers. All trained on examples. All around you, all day long."},
     {check:{t:"AI learns by...", spoken:"Check! How does an AI actually learn?",
       opts:[{e:"📚",l:"SEEING MILLIONS OF EXAMPLES",ok:true},{e:"🧠",l:"BEING BORN SMART",no:"Before training, an AI knows exactly nothing. The examples build everything. Again."},{e:"🔮",l:"READING MINDS",no:"No minds are read. Patterns are guessed. Again."}],
       yes:"Examples, examples, examples. The pattern is the knowledge."}},
     {e:"⚠️", t:"It guesses. Guesses can be wrong.",
      x:"An AI sounds confident even when it's wrong — because it isn't checking facts, it's completing patterns. Smart people double-check what AI tells them. Now you know exactly why."},
   ]},
   { title:"THE PILOT RULE", emoji:"✈️", slides:[
     {e:"✈️", t:"AI writes code now. Really.",
      x:"True fact: AI can write code today. Whole programs. So... was learning all this pointless? Hold that thought."},
     {e:"👩‍✈️", t:"Autopilot flies. Pilots still exist.",
      x:"Autopilot can fly a plane for hours — and airlines STILL put pilots up front. Because someone must understand what the plane is doing, catch its mistakes, and take over when things get weird. The autopilot doesn't know when it's wrong."},
     {e:"🔍", t:"Ask. Read. Verify. Fix.",
      x:"That's how coders work with AI now: ASK it for code, READ what it wrote, VERIFY it's right, FIX what isn't. Every step after asking needs a human who understands the machine. That human... is now you."},
     {check:{t:"AI writes the code. The human must...", spoken:"Check. The AI writes the code. What must the human do?",
       opts:[{e:"🧐",l:"UNDERSTAND AND CHECK IT",ok:true},{e:"🤞",l:"JUST TRUST IT",no:"That's how planes fly into mountains. Verify. Always. Again."},{e:"🖨️",l:"PRINT IT OUT",no:"Paper won't catch the bug. Understanding does. Again."}],
       yes:"Understand it, check it, fix it. The pilot rule."}},
     {e:"⚫", t:"The final test awaits.",
      x:"Hardware. The internet. App organs. Databases. Real code. Debugging. And the truth about AI. Eight challenges, everything mixed together. Deep breath, insider... go show the machine who understands it."},
   ]},
  ]},

/* ============================== MAZE GENERATOR + BFS ============================== */
const GRIDN=5;
function wallKey(w){return w.x+","+w.y;}
function bfsPath(start,goal,walls){
  const wk=new Set(walls.map(wallKey));
  const seen={}; seen[start.x+","+start.y]=null;
  let q=[[start.x,start.y]];
  const DIRS4=[[1,0],[-1,0],[0,1],[0,-1]];
  while(q.length){
    const [x,y]=q.shift();
    if(x===goal.x&&y===goal.y){
      const moves=[]; let k=x+","+y;
      while(seen[k]){ moves.unshift(seen[k].m); k=seen[k].from; }
      return moves; // array of {dx,dy}
    }
    for(const [dx,dy] of DIRS4){
      const nx=x+dx,ny=y+dy,k=nx+","+ny;
      if(nx<0||ny<0||nx>=GRIDN||ny>=GRIDN||wk.has(k)||(k in seen))continue;
      seen[k]={from:x+","+y,m:{dx,dy}};
      q.push([nx,ny]);
    }
  }
  return null;
}
function genMaze(level){
  for(let tries=0;tries<80;tries++){
    let start,goal,walls=[];
    if(level<=1){
      const ry=1+rint(3);
      start={x:0,y:ry}; goal={x:4,y:ry};
      // sprinkle 3 decorative walls off the flight row
      const cells=[];
      for(let x=1;x<4;x++)for(let y=0;y<GRIDN;y++){ if(y!==ry)cells.push({x,y}); }
      walls=sample(cells,3);
    }else if(level===2){
      start={x:0,y:rint(GRIDN)}; goal={x:4,y:rint(GRIDN)};
      const gapY=rint(GRIDN);
      for(let y=0;y<GRIDN;y++){ if(y!==gapY)walls.push({x:2,y}); }
    }else{
      start={x:0,y:rint(GRIDN)}; goal={x:4,y:rint(GRIDN)};
      const g1=rint(GRIDN), g2=Math.max(0,Math.min(GRIDN-1,g1+(rint(3)-1)));
      for(let y=0;y<GRIDN;y++){ if(y!==g1)walls.push({x:1,y}); if(y!==g2)walls.push({x:3,y}); }
    }
    walls=walls.filter(w=>!(w.x===start.x&&w.y===start.y)&&!(w.x===goal.x&&w.y===goal.y));
    const path=bfsPath(start,goal,walls);
    const maxB=level<=1?5:(level===2?7:8);
    if(path&&path.length>=3&&path.length<=maxB) return {start,goal,walls,max:maxB,solution:path};
  }
  return {start:{x:0,y:2},goal:{x:4,y:2},walls:[],max:5,solution:[{dx:1,dy:0},{dx:1,dy:0},{dx:1,dy:0},{dx:1,dy:0}]};
}
function simulateRun(start,goal,walls,moves){
  // returns {steps:[{x,y}...], outcome:'win'|'crash'|'out'|'short', at:index}
  const wk=new Set(walls.map(wallKey));
  let pos={x:start.x,y:start.y};
  const steps=[];
  for(let i=0;i<moves.length;i++){
    pos={x:pos.x+moves[i].dx,y:pos.y+moves[i].dy};
    if(pos.x<0||pos.y<0||pos.x>=GRIDN||pos.y>=GRIDN)return {steps,outcome:"out",at:i};
    if(wk.has(pos.x+","+pos.y))return {steps:steps.concat([pos]),outcome:"crash",at:i};
    steps.push({x:pos.x,y:pos.y});
  }
  return {steps,outcome:(pos.x===goal.x&&pos.y===goal.y)?"win":"short",at:moves.length-1};
}
const DIRINFO=[{dx:1,dy:0,e:"➡️",n:"fly right"},{dx:-1,dy:0,e:"⬅️",n:"fly left"},{dx:0,dy:-1,e:"⬆️",n:"fly up"},{dx:0,dy:1,e:"⬇️",n:"fly down"}];

function choiceProblem(st,cfg,mode,onDone){

    '<div class="scene" id="cpScene" style="font-size:'+(cfg.sceneSize||"min(64px,15vw)")+';">'+cfg.scene+'</div>'+

    '<div class="optgrid'+(cfg.opts.length===2?" two":"")+'" id="cpOpts"></div>'+
    '<div class="feedback" id="cpFb"></div></div>');
  st.appendChild(card);
  const box=card.querySelector("#cpOpts"), fb=card.querySelector("#cpFb");
  const pixBox=card.querySelector("#cpPix");
  pixBox.innerHTML=pixelSVG("thinking",60);
  let locked=false;
  const opts=cfg.noShuffle?cfg.opts:shuffle(cfg.opts);
  opts.forEach(function(o){
    const c=el('<div class="opt">'+(o.e?('<span class="e">'+o.e+'</span>'):"")+(o.l?('<span class="l">'+o.l+'</span>'):"")+'</div>');
    c.onclick=function(){
      if(locked)return;
      if(o.ok){
        locked=true;
        c.classList.add("right");
        Array.from(box.children).forEach(ch=>{ if(ch!==c)ch.classList.add("dim"); });
        fb.textContent="⭐ CORRECT! ⭐";
        pow("YES!","var(--green)");
        setPixelIn(pixBox,"happy",60);
        speak(cfg.yes||praise(),{onend:function(){ onDone(true); }});
      }else{
        if(mode==="test"){
          locked=true;
          c.classList.add("wrong");
          const right=Array.from(box.children)[opts.findIndex(x=>x.ok)];
          if(right)right.classList.add("right");
          fb.textContent="THE ANSWER IS SHOWN!";
          setPixelIn(pixBox,"oops",60);
          speak(o.no||"Not this time! See the glowing one? That was the answer. On we go!",{onend:function(){ onDone(false); }});
        }else{
          c.classList.remove("wrong"); void c.offsetWidth; c.classList.add("wrong");
          fb.textContent="Try again!";
          setPixelIn(pixBox,"oops",60);
          setTimeout(function(){ if(!locked)setPixelIn(pixBox,"thinking",60); },1600);
          speak(o.no||encourage());
        }
      }
    };
    box.appendChild(c);
  });
  // read each answer choice aloud, one by one, highlighting the tile being said
  function clearReading(){ Array.from(box.children).forEach(t=>t.classList.remove("reading")); }
  function readOptions(){
    const tiles=Array.from(box.children);
    let i=0;
    (function step(){
      if(!card.isConnected||locked)return;
      clearReading();
      if(i>=tiles.length)return;
      tiles[i].classList.add("reading");
      const o=opts[i];
      if(o.l){ speak(o.l.replace(/\n/g," "),{onend:function(){ i++; step(); }}); }
      else { setTimeout(function(){ i++; step(); },600); }
    })();
  }
  box.addEventListener("click",clearReading,true);
  if(cfg.setup)cfg.setup(card.querySelector("#cpScene"));
  replayFn=function(){ speak(cfg.spoken, ageBand()==="4-7" ? {onend:readOptions} : {}); };
  speak(cfg.spoken, ageBand()==="4-7" ? {onend:readOptions} : {});
}

          over=true;

          pow("DONE!"); if(win)confetti(24);
          fb.textContent="⭐ ROBOT CODED! ⭐";

/* ---------- Shared maze drawing ---------- */
function drawGridInto(grid,mz,hero){
  grid.innerHTML="";
  const wk=new Set(mz.walls.map(wallKey));
  for(let y=0;y<GRIDN;y++)for(let x=0;x<GRIDN;x++){
    const c=document.createElement("div");
    c.className="cell"+(wk.has(x+","+y)?" wall":"");
    if(wk.has(x+","+y))c.innerHTML=ART?'<img class="cell-art" src="assets/obj-building.png" alt="">':"🏢";
    if(mz.goal.x===x&&mz.goal.y===y&&!(hero&&hero.x===x&&hero.y===y))
      c.innerHTML=ART?'<img class="cell-art" src="assets/obj-signal.png" alt="">':"📡";
    if(hero&&hero.x===x&&hero.y===y){
      if(ART)c.innerHTML='<img class="cell-art" src="assets/pixel-'+(hero.crash?"oops":"idle")+'.png" alt="">';
      else c.innerHTML='<span>'+(hero.crash?"💥":"🦸‍♀️")+'</span>';
    }
    grid.appendChild(c);
  }
}

SKILLS.fly={ title:"FLY MISSION", emoji:"🦸‍♀️", blurb:"Code Aria to fly to the signal!",
play:function(st,level,mode,onDone){
  const mz=genMaze(level);
  let prog=[], running=false, over=false, fails=0;
  const card=el('<div class="card">'+
    '<div class="citygrid" id="grid"></div>'+
    '<div class="sub" style="margin-top:8px;font-family:var(--disp);letter-spacing:1px;color:var(--yellow);">YOUR CODE (max '+mz.max+' blocks):</div>'+
    '<div class="progrow" id="prog"></div>'+
    '<div class="palette" id="pal" style="margin-top:10px;"></div>'+
    '<div class="btnrow" style="margin-top:12px;">'+
      '<button class="btn green" id="launch" style="font-size:24px;">🚀 LAUNCH!</button>'+
      '<button class="btn ghost" id="clear">🧹</button>'+
    '</div><div class="feedback" id="fb"></div></div>');
  st.appendChild(card);
  const grid=card.querySelector("#grid"), progRow=card.querySelector("#prog"), fb=card.querySelector("#fb");
  function drawProg(){
    progRow.innerHTML="";
    if(prog.length===0)progRow.appendChild(el('<span style="color:#5a64b8;font-size:14px;">your blocks go here…</span>'));
    prog.forEach(function(d,i){
      const ch=el('<div class="chip">'+d.e+'</div>');
      ch.onclick=function(){ if(running||over)return; prog.splice(i,1); drawProg(); };
      progRow.appendChild(ch);
    });
  }
  DIRINFO.forEach(function(d){
    const ch=el('<div class="chip">'+d.e+'</div>');
    ch.onclick=function(){
      if(running||over)return;
      if(prog.length>=mz.max){ speak("That is the most blocks! Tap a block in your code to remove one."); return; }
      prog.push(d); drawProg(); speak(d.n+"!");
    };
    card.querySelector("#pal").appendChild(ch);
  });
  card.querySelector("#clear").onclick=function(){ if(running||over)return; prog=[]; drawProg(); speak("All clear! Write new code!"); };
  card.querySelector("#launch").onclick=async function(){
    if(running||over)return;
    if(prog.length===0){ speak("Your code is empty! Tap some arrow blocks first, then launch!"); return; }
    running=true; fb.textContent="FLYING...";
    speak("Three, two, one, launch!");
    await new Promise(r=>setTimeout(r,1300));
    if(!card.isConnected)return; // user navigated away mid-flight
    const run=simulateRun(mz.start,mz.goal,mz.walls,prog);
    let pos={x:mz.start.x,y:mz.start.y};
    for(const s of run.steps){ pos=s; drawGridInto(grid,mz,pos); await new Promise(r=>setTimeout(r,480)); }
    if(!card.isConnected)return;
    if(run.outcome==="win"){
      over=true; running=false;
      confetti(36); pow("HERO!");
      fb.textContent="⭐ SIGNAL REACHED! ⭐";
      speak("You did it! Your code flew me right to the signal! Real coding, "+NAME+"!",{onend:function(){onDone(true);}});
      return;
    }
    if(run.outcome==="crash"||run.outcome==="out"){
      drawGridInto(grid,mz,Object.assign({},pos,{crash:true}));
      pow("CRASH!","var(--red)");
    }
    fails++;
    if(mode==="test"&&fails>=2){
      over=true; running=false; fb.textContent="ON TO THE NEXT ONE!";
      speak("Tricky maze! We will get the next one. Onward!",{onend:function(){onDone(false);}});
      return;
    }
    fb.textContent=run.outcome==="short"?"ALMOST — KEEP GOING!":"💥 TRY AGAIN!";
    speak(run.outcome==="crash"?"CRASH! I flew into a building — because I follow your code EXACTLY! Change the code and try again!"
         :run.outcome==="out"?"Whoops, I flew out of the city! Fix the code and try again!"
         :"I followed every block, but I did not reach the signal yet. Add more blocks!");
    running=false;
    setTimeout(function(){ if(!over)drawGridInto(grid,mz,mz.start); },1200);
  };
  drawGridInto(grid,mz,mz.start); drawProg();
  const intro="Mission time! Fly me from my spot to the flashing signal — but do not hit the buildings! Tap arrow blocks to write the code, then press launch.";
  replayFn=function(){speak(intro);};
  speak(intro);
}};
/* ---------- ORANGE: Zap loop (set repeat N) ---------- */
SKILLS.zap={ title:"ZAP THE VILLAINS", emoji:"👾", blurb:"Set the loop to zap them all!",
play:function(st,level,mode,onDone){
  const theme=pick(ZAP_THEMES);
  let total,gone=0;
  if(level<=1)total=3+rint(3);
  else if(level===2)total=5+rint(4);
  else {total=6+rint(4); gone=1+rint(Math.min(3,total-4));}
  const need=total-gone;
  let n=1, running=false, over=false, attempts=0;
  const card=el('<div class="card">'+
    '<div class="scene" id="vill" style="font-size:inherit;min-height:90px;"></div>'+
    (gone?'<div class="sub" style="font-size:14px;">The faded ones are ALREADY zapped — skip them!</div>':"")+
    '<div class="repeatbox">'+
      '<button class="arrowbtn" id="minus">−</button>'+
      '<div><div class="lbl">REPEAT ZAP ⚡</div><div class="num" id="num">1</div><div class="lbl">TIMES</div></div>'+
      '<button class="arrowbtn" id="plus">+</button>'+
    '</div>'+
    '<div class="btnrow"><button class="btn purple" id="zap" style="font-size:24px;">⚡ RUN THE LOOP!</button></div>'+
    '<div class="feedback" id="fb"></div></div>');
  st.appendChild(card);
  const vill=card.querySelector("#vill"), num=card.querySelector("#num"), fb=card.querySelector("#fb");
  function draw(){
    vill.innerHTML="";
    for(let i=0;i<total;i++){
      const face=ART?'<img src="assets/obj-villain-'+((i%3)+1)+'.png" alt="">':theme[0];
      const v=el('<span class="villain'+(i<gone?" gone":"")+'" style="animation-delay:'+(i*0.18)+'s">'+face+'</span>');
      vill.appendChild(v);
    }
  }
  card.querySelector("#minus").onclick=function(){ if(running||over)return; if(n>1)n--; num.textContent=n; speak(String(n)); };
  card.querySelector("#plus").onclick=function(){ if(running||over)return; if(n<9)n++; num.textContent=n; speak(String(n)); };
  card.querySelector("#zap").onclick=async function(){
    if(running||over)return;
    running=true; draw(); attempts++;
    fb.textContent="ZAP ZAP ZAP...";
    const kids=Array.from(vill.children);
    for(let i=0;i<Math.min(n,need);i++){
      await new Promise(r=>setTimeout(r,420));
      if(!card.isConnected)return;
      kids[gone+i].classList.add("zapped"); pow("ZAP!","var(--blue)");
    }
    await new Promise(r=>setTimeout(r,600));
    if(!card.isConnected)return;
    if(n===need){
      over=true; confetti(32); pow("KAPOW!");
      fb.textContent="⭐ ALL ZAPPED! ⭐";
      speak("Exactly "+NUMWORD[need]+"! One little loop, "+NUMWORD[need]+" big zaps! Loops are POWERFUL!",{onend:function(){onDone(true);}});
      return;
    }
    if(mode==="test"){
      over=true; fb.textContent="THE ANSWER WAS "+need+"!";
      speak("We needed exactly "+NUMWORD[need]+" zaps. Next one is yours!",{onend:function(){onDone(false);}});
      return;
    }
    fb.textContent=n<need?"SOME ARE LEFT!":"TOO MANY ZAPS!";
    speak(n<need?("Only "+NUMWORD[n]+" zaps — some "+theme[1]+" are still giggling! Count them and make the loop bigger!")
               :("Whoa, "+NUMWORD[n]+" zaps is too many — we zapped empty sky! Count again!"));
    running=false; setTimeout(function(){ if(!over)draw(); },1200);
  };
  draw();
  const intro=(gone? "Some "+theme[1]+" are already zapped — count only the ones still wiggling! ":"")+
    "Do not tap them one by one — use a LOOP! Count the "+theme[1]+", set the repeat number, and run your loop!";
  replayFn=function(){speak(intro);};
  speak(intro);
}};

SKILLS.fixmaze={ title:"BUG HUNT: SKY CODE", emoji:"🐛", blurb:"One block is wrong — find it!",
play:function(st,level,mode,onDone){
  const mz=genMaze(Math.min(level+1,3));
  const good=mz.solution;
  let badIdx=-1, badProg=null;
  for(let t=0;t<40;t++){
    const i=rint(good.length);
    const wrongDir=pick(DIRINFO.filter(d=>!(d.dx===good[i].dx&&d.dy===good[i].dy)));
    const prog=good.slice(); prog[i]={dx:wrongDir.dx,dy:wrongDir.dy};
    const run=simulateRun(mz.start,mz.goal,mz.walls,prog);
    if(run.outcome!=="win"){ badIdx=i; badProg=prog; break; }
  }
  if(badIdx<0){ badIdx=0; badProg=good.slice(); badProg[0]={dx:-good[0].dx,dy:-good[0].dy}; }
  let over=false, phase="watch";
  const card=el('<div class="card">'+
    '<div class="citygrid" id="grid"></div>'+
    '<div class="sub" style="margin-top:8px;font-family:var(--disp);letter-spacing:1px;color:var(--yellow);">THE CODE:</div>'+
    '<div class="progrow" id="prog" style="border-style:solid;"></div>'+
    '<div class="feedback" id="fb">WATCH WHAT HAPPENS...</div></div>');
  st.appendChild(card);
  const grid=card.querySelector("#grid"), progRow=card.querySelector("#prog"), fb=card.querySelector("#fb");
  const chips=[];
  badProg.forEach(function(m,i){
    const ch=el('<div class="chip">'+dirInfo(m).e+'</div>');
    ch.onclick=function(){
      if(over||phase!=="hunt")return;
      if(i===badIdx){
        over=true;
        ch.classList.add("fixed");
        ch.textContent=dirInfo(good[badIdx]).e;
        fb.textContent="BUG FIXED! WATCH!";
        pow("FIXED!","var(--green)");
        speak("You found the bug! Let me fly the fixed code!",{onend:async function(){
          let pos={x:mz.start.x,y:mz.start.y};
          const run=simulateRun(mz.start,mz.goal,mz.walls,good);
          for(const s of run.steps){ pos=s; drawGridInto(grid,mz,pos); await new Promise(r=>setTimeout(r,380)); }
          confetti(32); fb.textContent="⭐ BUG SQUASHED! ⭐";
          speak("Perfect flight! One fixed block saved the whole mission. You are a real bug hunter, "+NAME+"!",{onend:function(){onDone(true);}});
        }});
      }else{
        ch.classList.remove("bad"); void ch.offsetWidth; ch.classList.add("bad");
        if(mode==="test"){
          over=true;
          chips[badIdx].classList.add("fixed");
          fb.textContent="THE BUG IS GLOWING!";
          speak("Not that block! See the glowing one? That was the bug. On we go!",{onend:function(){onDone(false);}});
        }else{
          speak("Hmm, that block looks okay to me! Watch the crash again — where does it go wrong?");
        }
      }
    };
    chips.push(ch); progRow.appendChild(ch);
  });
  drawGridInto(grid,mz,mz.start);
  async function watchRun(){
    const run=simulateRun(mz.start,mz.goal,mz.walls,badProg);
    let pos={x:mz.start.x,y:mz.start.y};
    await new Promise(r=>setTimeout(r,1500));
    for(const s of run.steps){ pos=s; drawGridInto(grid,mz,pos); await new Promise(r=>setTimeout(r,420)); }
    if(!card.isConnected)return;
    if(run.outcome==="crash"||run.outcome==="out"){
      drawGridInto(grid,mz,Object.assign({},pos.x!==undefined?pos:mz.start,{crash:true}));
      pow("CRASH!","var(--red)");
    }
    phase="hunt";
    fb.textContent="TAP THE WRONG BLOCK!";
    speak("Oh no — the code has a BUG! One block points the wrong way. Look at the code and tap the block that is wrong!");
  }
  const intro="Bug hunt! This code is SUPPOSED to fly me to the signal. Watch what happens instead...";
  replayFn=function(){speak(intro);};
  speak(intro,{onend:watchRun});
}};

  choiceProblem(st,{
    scene:'<span style="font-size:min(46px,10vw);">🤖💥</span>',
    prompt:"The robot tried to "+R.name+" — but the steps are scrambled! Tap a step that is in the wrong spot!",

    opts:opts, noShuffle:true,

  },mode,onDone);
}};

function orderChain(st,cfg,mode,onDone){
  const steps=cfg.steps.map(function(s,i){return {e:s.e,l:s.l,idx:i};});
  const cards=shuffle(steps.slice());
  let need=0, over=false, anyWrong=false;
  const card=el('<div class="card">'+
    '<div class="sub" style="font-family:var(--disp);letter-spacing:1px;color:var(--yellow);">'+cfg.headline+'</div>'+
    '<div class="slotrow" id="slots"></div>'+
    '<div class="optgrid" id="cards" style="grid-template-columns:repeat('+Math.min(cards.length,3)+',1fr);"></div>'+
    '<div class="feedback" id="fb">What happens FIRST?</div></div>');
  st.appendChild(card);
  const slots=card.querySelector("#slots"), fb=card.querySelector("#fb");
  steps.forEach(function(){slots.appendChild(el('<div class="slot">·</div>'));});
  cards.forEach(function(o){
    const c=el('<div class="opt"><span class="e">'+o.e+'</span><span class="l">'+o.l+'</span></div>');
    c.onclick=function(){
      if(over||c.classList.contains("dim"))return;
      if(o.idx===need){
        c.classList.add("dim");
        const slot=slots.children[need];
        slot.textContent=o.e; slot.classList.add("filled");
        need++;
        if(need>=steps.length){
          over=true;
          const win=(mode!=="test"||!anyWrong);
          pow("DONE!"); if(win)confetti(24);
          fb.textContent="⭐ SEQUENCE COMPLETE! ⭐";
          speak(win?cfg.doneLine:"Finished — but a few steps got tangled on the way. Watch the order next time!",
            {onend:function(){onDone(win);}});
        }else{ fb.textContent="What happens NEXT?"; speak(pick(["Right. Then?","Correct. Next?","Yep. What now?","Good. Keep going."])); }
      }else{
        anyWrong=true;
        c.classList.remove("wrong"); void c.offsetWidth; c.classList.add("wrong");
        speak("Not that one yet. What really happens "+(need===0?"first":"next")+"?");
      }
    };
    card.querySelector("#cards").appendChild(c);
  });
  replayFn=function(){speak(cfg.intro);};
  speak(cfg.intro);
}

/* ============================== TRACK 2: THE CODE RUNNER (blue belt) ============================== */
function escT(t){ return String(t).replace(/[&<>]/g,function(c){return {"&":"&amp;","<":"&lt;",">":"&gt;"}[c];}); }
function levDist(a,b){
  const m=a.length,n=b.length; if(!m)return n; if(!n)return m;
  let prev=[]; for(let j=0;j<=n;j++)prev[j]=j;
  for(let i=1;i<=m;i++){
    const cur=[i];
    for(let j=1;j<=n;j++)cur[j]=Math.min(prev[j]+1,cur[j-1]+1,prev[j-1]+(a[i-1]===b[j-1]?0:1));
    prev=cur;
  }
  return prev[n];
}
/* tiny sandboxed interpreter: print / string+number variables / + / if-else with == > < */
function pixRun(code){
  const out=[], vars={};
  const raw=String(code||"").replace(/\t/g,"  ").split("\n");
  const st=[];
  for(let i=0;i<raw.length;i++){
    if(!raw[i].trim())continue;
    st.push({ln:i+1, txt:raw[i].trim(), ind:raw[i].match(/^ */)[0].length});
  }
  function fail(ln,msg){ return {out:out,err:{ln:ln,msg:msg}}; }
  function nearest(name){
    let best=null,bd=3;
    Object.keys(vars).forEach(function(k){ const d=levDist(k,name); if(d<bd){bd=d;best=k;} });
    return best;
  }
  function evalExpr(src){
    src=String(src).trim();
    if(!src)return {e:"there's nothing to work with here."};
    const parts=[]; let cur="",q=null;
    for(const ch of src){
      if(q){ cur+=ch; if(ch===q)q=null; continue; }
      if(ch==='"'||ch==="'"){ q=ch; cur+=ch; continue; }
      if(ch==='+'){ parts.push(cur); cur=""; continue; }
      cur+=ch;
    }
    if(q)return {e:"a quote got opened but never closed. Every quote needs a partner."};
    parts.push(cur);
    const vals=[];
    for(let p of parts){
      p=p.trim();
      if(!p)return {e:"there's a + with nothing on one side of it."};
      let m;
      if((m=p.match(/^"([^"]*)"$/))||(m=p.match(/^'([^']*)'$/))){ vals.push(m[1]); continue; }
      if(/^-?\d+(\.\d+)?$/.test(p)){ vals.push(parseFloat(p)); continue; }
      if(/^[A-Za-z_][A-Za-z0-9_]*$/.test(p)){
        if(!(p in vars)){
          const s=nearest(p);
          return {e:"I don't know «"+p+"». "+(s?("Did you mean «"+s+"»?"):"Words need quotes — or put "+p+" in a box first.")};
        }
        vals.push(vars[p]); continue;
      }
      return {e:"I can't read «"+p+"». Words need quotes, like \"hello\"."};
    }
    if(vals.some(function(v){return typeof v==="string";}))return {v:vals.map(String).join("")};
    return {v:vals.reduce(function(a,b){return a+b;},0)};
  }
  function evalCond(src){
    let op=null,idx=-1;
    if((idx=src.indexOf("=="))>=0)op="==";
    else if((idx=src.indexOf(">"))>=0)op=">";
    else if((idx=src.indexOf("<"))>=0)op="<";
    if(!op)return {e:"an if needs a comparison: ==, > or <."};
    const L=evalExpr(src.slice(0,idx)); if(L.e)return L;
    const R=evalExpr(src.slice(idx+op.length)); if(R.e)return R;
    if(op==="=="){
      if(typeof L.v==="number"&&typeof R.v==="number")return {v:L.v===R.v};
      return {v:String(L.v)===String(R.v)};
    }
    if(typeof L.v!=="number"||typeof R.v!=="number")return {e:"I can only compare numbers with "+op+"."};
    return {v:op===">"?L.v>R.v:L.v<R.v};
  }
  function execSimple(s){
    let m;
    if((m=s.txt.match(/^print\s*\((.*)\)\s*$/))){
      const r=evalExpr(m[1]); if(r.e)return r.e;
      out.push(String(r.v)); return null;
    }
    if(/^print\b/.test(s.txt))return "print needs round brackets: print(\"hi\")";
    if((m=s.txt.match(/^([A-Za-z_][A-Za-z0-9_]*)\s*=(?!=)\s*(.+)$/))){
      const r=evalExpr(m[2]); if(r.e)return r.e;
      vars[m[1]]=r.v; return null;
    }
    if(/^else\b/.test(s.txt))return "this else has no if to belong to.";
    return "I don't understand this line. Try print(...), a box like score = 7, or if ...:";
  }
  let i=0, steps=0;
  while(i<st.length){
    if(++steps>500)return fail(st[i].ln,"that is a LOT of steps. My terminal stops at five hundred.");
    const s=st[i];
    if(/^if\b/.test(s.txt)){
      if(!/:\s*$/.test(s.txt))return fail(s.ln,"an if needs a colon at the end, like: if score > 5:");
      const m=s.txt.match(/^if\s+(.+):\s*$/);
      if(!m)return fail(s.ln,"an if needs a rule to check, like: if score > 5:");
      const cond=evalCond(m[1]); if(cond.e)return fail(s.ln,cond.e);
      const base=s.ind; i++;
      const thenB=[];
      while(i<st.length&&st[i].ind>base){ thenB.push(st[i]); i++; }
      if(!thenB.length)return fail(s.ln,"the if has no indented line under it to run.");
      let elseB=[];
      if(i<st.length&&/^else\b/.test(st[i].txt)&&st[i].ind===base){
        if(!/^else\s*:\s*$/.test(st[i].txt))return fail(st[i].ln,"else needs a colon too: else:");
        const eln=st[i].ln; i++;
        while(i<st.length&&st[i].ind>base){ elseB.push(st[i]); i++; }
        if(!elseB.length)return fail(eln,"the else has no indented line under it to run.");
      }
      const body=cond.v?thenB:elseB;
      for(const b of body){
        if(/^if\b/.test(b.txt))return fail(b.ln,"one fork at a time in my terminal! No if inside an if... yet.");
        const e=execSimple(b); if(e)return fail(b.ln,e);
        if(++steps>500)return fail(b.ln,"too many steps!");
      }
      continue;
    }
    const e=execSimple(s); if(e)return fail(s.ln,e);
    i++;
  }
  return {out:out,err:null};
}
/* code display helpers */
function colorCode(line){
  const rest=escT(line);
  const re=/("[^"]*"|'[^']*')/g;
  let outH="",last=0,m;
  function plain(seg){
    return seg.replace(/\b(print|if|else)\b/g,'<span class="kwd">$1</span>')
              .replace(/\b(\d+)\b/g,'<span class="num">$1</span>');
  }
  while((m=re.exec(rest))){
    outH+=plain(rest.slice(last,m.index))+'<span class="str">'+m[1]+'</span>';
    last=m.index+m[1].length;
  }
  outH+=plain(rest.slice(last));
  return outH;
}
function codeBoxHTML(lines){
  return '<div class="codebox">'+lines.map(function(l,i){
    return '<div class="cl"><span class="cln">'+(i+1)+'</span>'+colorCode(l)+'</div>';
  }).join("")+'</div>';
}
function termHTML(res){
  let h='<div class="term">';
  res.out.forEach(function(l,i){ h+='<div class="tl" style="animation-delay:'+(i*0.22)+'s">'+escT(l)+'</div>'; });
  if(res.err)h+='<div class="terr" style="animation-delay:'+(res.out.length*0.22)+'s">Line '+res.err.ln+' — '+escT(res.err.msg)+'</div>';
  if(!res.out.length&&!res.err)h+='<div class="tdim">…nothing printed</div>';
  return h+'</div>';
}

const PY_WORDS=["pizza","ninja","boom","wow","robot","magic","taco","zap"];
const PY_NAMES=["Maya","Leo","Zoe","Kai","Ari","Sam"];
function genPyRead(level){
  const t=level<=1?rint(2):(level===2?2+rint(3):5+rint(3));
  let w,n,a,b,s,v,g;
  switch(t){
    case 0: w=pick(PY_WORDS);
      return {lines:['print("'+w+'")'],ans:w,wrongs:['"'+w+'"',pick(PY_WORDS.filter(function(x){return x!==w;}))],
        why:"Quotes tell the machine what to print — but the quotes themselves never get printed."};
    case 1: w=pick(PY_WORDS);
      return {lines:['print("'+w+'" + "'+w+'")'],ans:w+w,wrongs:[w+" "+w,w],
        why:"Plus glues strings together, with no space unless YOU put one in."};
    case 2: n=pick(PY_NAMES);
      return {lines:['name = "'+n+'"','print("hi " + name)'],ans:"hi "+n,wrongs:["hi name","hi"+n],
        why:"name is a box. print opens the box and uses what's inside."};
    case 3: a=2+rint(4); b=2+rint(4);
      return {lines:['a = '+a,'b = '+b,'print(a + b)'],ans:String(a+b),wrongs:[''+a+b,String(a+b+1)],
        why:"Two numbers and a plus — real math. Only quoted things glue."};
    case 4: s=3+rint(5);
      return {lines:['score = '+s,'score = score + 1','print(score)'],ans:String(s+1),wrongs:[String(s),String(s+2)],
        why:"The box keeps the NEWEST value. That line runs in every game ever made."};
    case 5: v=3+rint(7);
      return {lines:['power = '+v,'if power > 5:','  print("mega")','else:','  print("mini")'],
        ans:v>5?"mega":"mini",wrongs:[v>5?"mini":"mega","mega mini"],
        why:"The machine checks the rule, then runs exactly ONE path. "+v+(v>5?" is":" is not")+" bigger than 5."};
    case 6: g=pick(["otter","otter","tiger","comet"]);
      return {lines:['password = "'+g+'"','if password == "otter":','  print("door opens")','else:','  print("no entry")'],
        ans:g==="otter"?"door opens":"no entry",wrongs:[g==="otter"?"no entry":"door opens","password"],
        why:"Double equals ASKS if they match — it never changes the box."};
    default:
      return {lines:['a = 3','b = "4"','print(a + b)'],ans:"34",wrongs:["7","3 + 4"],
        why:"Sneaky! b is in quotes — so plus GLUES instead of adding. Numbers in quotes aren't numbers."};
  }
}
function genPyFill(level){
  const t=level<=1?rint(2):(level===2?2+rint(2):4+rint(2));
  let n,w,s;
  switch(t){
    case 0: n=pick(PY_NAMES);
      return {mission:["hi "+n],lines:['name = ____','print("hi " + name)'],chips:['"'+n+'"',n,'"name"'],
        yes:"Quotes around "+n+" made it a word the machine can keep in the box. Mission complete."};
    case 1: w=pick(PY_WORDS);
      return {mission:[w],lines:['print(____)'],chips:['"'+w+'"',w,'"'+pick(PY_WORDS.filter(function(x){return x!==w;}))+'"'],
        yes:"print plus quotes — the first spell every coder learns."};
    case 2:
      return {mission:["7"],lines:['a = 3','b = ____','print(a + b)'],chips:['4','"4"','7'],
        yes:"A real 4, no quotes — so three plus four made seven. Quotes would have glued them into thirty-four!"};
    case 3: s=5+rint(4);
      return {mission:["score is "+(s+1)],lines:['score = '+s,'score = score + ____','print("score is " + score)'],chips:['1','2','"1"'],
        yes:"Plus one, saved back into the box. The most famous line in games."};
    case 4:
      return {mission:["door opens"],lines:['password = "otter"','if password == ____:','  print("door opens")','else:','  print("no entry")'],chips:['"otter"','"banana"','otter'],
        yes:"The passwords matched, so the if-path ran. Double equals checks; it never changes."};
    default:
      return {mission:["shorts"],lines:['temp = 8','if temp ____ 5:','  print("shorts")','else:','  print("jacket")'],chips:['>','<','=='],
        yes:"Eight is bigger than five, so the greater-than fork chose shorts. You just steered an if!"};
  }
}
SKILLS.pyread={ title:"OUTPUT ORACLE", emoji:"🔮", blurb:"Read real code — predict what it prints!",

SKILLS.pyfork={ title:"FORK MASTER", emoji:"🔱", blurb:"if... else — command the two paths!",
play:function(st,level,mode,onDone){
  if(rint(2)===0){
    const v=3+rint(7), k=5;
    const tpl=rint(2)===0
      ? {lines:['power = '+v,'if power > '+k+':','  print("mega")','else:','  print("mini")'],ans:v>k?"mega":"mini",wrongs:[v>k?"mini":"mega","nothing"],
         why:v+(v>k?" beats ":" does not beat ")+k+" — so that path ran. One rule, one path, every time."}
      : (function(){ const g=pick(["otter","otter","tiger"]);
         return {lines:['password = "'+g+'"','if password == "otter":','  print("door opens")','else:','  print("no entry")'],
           ans:g==="otter"?"door opens":"no entry",wrongs:[g==="otter"?"no entry":"door opens","otter"],
           why:"The machine compared the two words and picked its path. No guessing, ever."}; })();
    choiceProblem(st,{
      scene:codeBoxHTML(tpl.lines), sceneSize:"15px",
      prompt:"Which path runs — what prints?",
      spoken:"An if and an else — two paths, but the machine only ever takes one. Which prints?",
      opts:[{l:"▸ "+tpl.ans,ok:true}].concat(tpl.wrongs.map(function(x){return {l:"▸ "+x};})),
      yes:tpl.why,
    },mode,onDone);
    return;
  }
  runnerFill(st,genPyFill(4),mode,onDone);
}};
