<!doctype html>

<head>

<body>
<style>
  :root{
    --midnight:#0B1033; --panel:#171D4E; --panel2:#10153f;
    --yellow:#FFD900; --red:#FF3B5C; --blue:#29C5FF; --green:#2EE86C;
    --purple:#9A6BFF; --orange:#FF8A00; --ink:#000;
    --white:#FFFFFF; --off:#E9EDFF;
    --disp:'Arial Rounded MT Bold','Chalkboard SE','Comic Sans MS',sans-serif;
    --body:'Chalkboard SE','Comic Sans MS','Marker Felt',sans-serif;
  }
  *{box-sizing:border-box; -webkit-tap-highlight-color:transparent;}
  html,body{margin:0;padding:0;}
  body{
    background:var(--midnight);
    background-image:radial-gradient(rgba(255,255,255,.06) 1.5px, transparent 1.6px);
    background-size:24px 24px;
    color:var(--off); font-family:var(--body);
    min-height:100vh; min-height:100dvh;
    user-select:none; -webkit-user-select:none;
    touch-action:manipulation;
    overflow-x:hidden;
  }
  #app{max-width:600px;margin:0 auto;padding:10px 14px 40px;min-height:100vh;min-height:100dvh;display:flex;flex-direction:column;}
  .hdr{display:flex;align-items:center;justify-content:space-between;gap:8px;padding:4px 0 10px;}
  .hdr .mid{font-family:var(--disp);color:var(--yellow);font-size:17px;letter-spacing:2px;text-align:center;flex:1;
    white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
  .iconbtn{
    font-size:24px;line-height:1;background:var(--panel);border:3px solid var(--ink);
    border-radius:14px;box-shadow:0 4px 0 var(--ink);padding:9px 13px;cursor:pointer;color:var(--white);
  }
  .iconbtn:active{transform:translateY(3px);box-shadow:0 1px 0 var(--ink);}
  .stage{flex:1;display:flex;flex-direction:column;gap:14px;}
  .card{
    background:var(--panel);border:4px solid var(--yellow);border-radius:22px;
    box-shadow:8px 8px 0 rgba(0,0,0,.55);padding:18px;
  }
  .scene{
    text-align:center;font-size:min(88px,20vw);line-height:1.15;padding:14px 6px;
    background:var(--panel2);border:3px solid var(--ink);border-radius:18px;min-height:120px;
    display:flex;align-items:center;justify-content:center;gap:6px;flex-wrap:wrap;
  }
  .bigtext{
    font-family:var(--disp);font-size:clamp(24px,6.6vw,38px);line-height:1.3;color:var(--white);
    text-align:center;margin:16px 4px 6px;letter-spacing:.5px;
  }
  .bigtext .w{display:inline-block;padding:1px 5px;border-radius:9px;transition:background .12s,color .12s,transform .12s;}
  .bigtext .w.on{background:var(--yellow);color:#1b1500;transform:scale(1.08);}
  .bigtext .w.done{color:var(--yellow);}
  .btn{
    font-family:var(--disp);background:var(--yellow);color:#1b1500;border:4px solid var(--ink);
    border-radius:18px;box-shadow:0 6px 0 var(--ink);padding:14px 24px;font-size:23px;letter-spacing:1.5px;
    cursor:pointer;display:inline-block;text-align:center;
  }
  .btn:active{transform:translateY(4px);box-shadow:0 2px 0 var(--ink);}
  .btn.blue{background:var(--blue);color:#00243a;} .btn.red{background:var(--red);color:#fff;}
  .btn.green{background:var(--green);color:#00381a;} .btn.purple{background:var(--purple);color:#fff;}
  .btn.ghost{background:var(--panel);color:var(--off);}
  .btn.pulse{animation:pulse 1s ease-in-out infinite;}
  .btn:disabled{opacity:.4;pointer-events:none;}
  .btnrow{display:flex;gap:12px;justify-content:center;flex-wrap:wrap;margin-top:4px;}
  .dots{display:flex;gap:8px;justify-content:center;margin-top:10px;}
  .dot{width:13px;height:13px;border-radius:50%;background:#2a3170;border:2px solid var(--ink);}
  .dot.on{background:var(--yellow);}
  .optgrid{display:grid;grid-template-columns:repeat(auto-fit,minmax(130px,1fr));gap:14px;margin-top:14px;}
  .opt{
    background:var(--panel2);border:4px solid var(--ink);border-radius:18px;box-shadow:0 6px 0 var(--ink);
    padding:14px 8px;text-align:center;cursor:pointer;
  }
  .opt:active{transform:translateY(4px);box-shadow:0 2px 0 var(--ink);}
  .opt .e{font-size:56px;line-height:1.1;display:block;}
  .opt .l{font-family:var(--disp);font-size:16px;color:var(--off);letter-spacing:1px;display:block;margin-top:8px;}
  .opt.right{border-color:var(--green);background:#0f3a22;animation:pop .4s;}
  .opt.wrong{animation:wiggle .5s;}
  .opt.found{border-color:var(--green);background:#0f3a22;opacity:.9;pointer-events:none;}
  .opt.dim{opacity:.35;pointer-events:none;}

    display:flex;align-items:center;gap:14px;background:var(--panel);border:4px solid var(--ink);

  .chapcard .ct{font-family:var(--disp);font-size:19px;letter-spacing:1px;color:var(--white);flex:1;line-height:1.25;}
  .chapcard .cs{font-size:13px;color:#9aa4e8;font-family:var(--body);display:block;margin-top:3px;letter-spacing:0;}
  .chapcard .cb{font-size:30px;flex:none;}

  .slotrow{display:flex;gap:10px;justify-content:center;margin:10px 0;}
  .slot{width:86px;height:86px;border:3px dashed #4a54a8;border-radius:16px;display:flex;align-items:center;

  .repeatbox{display:flex;align-items:center;justify-content:center;gap:14px;background:var(--purple);

  .repeatbox .num{font-family:var(--disp);font-size:52px;color:#fff;min-width:70px;text-align:center;}
  .repeatbox .lbl{font-family:var(--disp);font-size:19px;color:#fff;letter-spacing:1px;line-height:1.2;text-align:center;}
  .villain{display:inline-block;font-size:min(52px,11vw);margin:0 3px;animation:wiggle 1.6s ease-in-out infinite;transition:transform .4s,opacity .4s;}
  .villain.zapped{transform:scale(.1) rotate(200deg);opacity:0;}
  .rulecard{background:#2b2358;border:3px solid var(--purple);border-radius:16px;padding:12px;text-align:center;

  .rulecard.hint{animation:pulse .9s infinite;border-color:var(--yellow);}
  .pickrow{display:flex;align-items:center;justify-content:space-between;gap:10px;background:var(--panel2);

  .pickrow .pv{font-size:20px;font-family:var(--disp);color:#fff;flex:1;text-align:center;letter-spacing:.5px;}
  .arrowbtn{font-size:26px;background:var(--yellow);border:3px solid var(--ink);border-radius:12px;
    box-shadow:0 4px 0 var(--ink);padding:8px 15px;cursor:pointer;font-weight:bold;}
  .arrowbtn:active{transform:translateY(3px);box-shadow:0 1px 0 var(--ink);}
  .herocard{border-radius:22px;border:5px solid;box-shadow:0 0 34px;padding:20px;text-align:center;
    background:var(--panel2);animation:pop .5s;}
  .badgebig{font-size:120px;text-align:center;animation:pop .6s;}
  .grown{background:var(--panel2);border:2px solid #3a4390;border-radius:14px;padding:14px 16px;

  .grown h3{color:var(--off);margin:0 0 6px;font-family:var(--disp);letter-spacing:1px;}
  .tinylink{text-align:center;color:#7c86d6;font-size:14px;margin-top:16px;cursor:pointer;text-decoration:underline;}
  /* confetti */
  .cfx{position:fixed;inset:0;pointer-events:none;overflow:hidden;z-index:50;}
  .cfp{position:absolute;top:-24px;font-size:24px;animation:fall linear forwards;}
  .pow{
    position:fixed;left:50%;top:38%;transform:translate(-50%,-50%);z-index:60;pointer-events:none;
    font-family:var(--disp);font-size:clamp(44px,13vw,84px);color:var(--yellow);letter-spacing:3px;
    text-shadow:4px 4px 0 var(--ink),-2px -2px 0 var(--ink);animation:pow .9s ease-out forwards;

  @keyframes pop{0%{transform:scale(.3)}70%{transform:scale(1.12)}100%{transform:scale(1)}}
  @keyframes wiggle{0%,100%{transform:rotate(-4deg)}50%{transform:rotate(4deg)}}
  @keyframes slidein{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:none}}
  @keyframes fall{to{transform:translateY(110vh) rotate(720deg);opacity:.9}}
  @keyframes pow{0%{transform:translate(-50%,-50%) scale(.2);opacity:0}25%{opacity:1}70%{transform:translate(-50%,-50%) scale(1.15)}100%{transform:translate(-50%,-50%) scale(1);opacity:0}}
  @keyframes floaty{0%,100%{transform:translateY(0)}50%{transform:translateY(-10px)}}
  @keyframes meteor{0%,100%{transform:translateY(0) scale(1)}50%{transform:translateY(14px) scale(1.06)}}
  .floaty{animation:floaty 2.6s ease-in-out infinite;display:inline-block;}
  @media (prefers-reduced-motion:reduce){*{animation:none !important;transition:none !important;}}

<script>
"use strict";
/* ============================== SPEECH ENGINE ============================== */
const NAME="Aria";
let voices=[], theVoice=null, muted=false;
function loadVoices(){
  try{ voices=speechSynthesis.getVoices()||[]; }catch(e){ voices=[]; }
  const pref=["Samantha","Google US English","Karen","Martha","Moira","Ava","Allison","Victoria","Zira"];
  theVoice=null;
  for(const p of pref){ const v=voices.find(v=>v.name&&v.name.indexOf(p)>=0); if(v){theVoice=v;break;} }
  if(!theVoice) theVoice=voices.find(v=>v.lang&&v.lang.indexOf("en")===0)||null;
}
if("speechSynthesis" in window){ loadVoices(); speechSynthesis.onvoiceschanged=loadVoices; }
let hiTimer=null, speakSeq=0;
function stopSpeech(){ speakSeq++; try{speechSynthesis.cancel();}catch(e){} if(hiTimer){clearInterval(hiTimer);hiTimer=null;} }
function speak(text,opts){
  opts=opts||{};
  stopSpeech();
  const seq=speakSeq;
  let finished=false, failsafe=null;
  function finish(){
    // seq guard: if a newer speak()/stopSpeech() happened (e.g. user navigated away,
    // which cancels speech and can still fire onend), this callback must not run
    if(finished||seq!==speakSeq)return;
    finished=true;
    if(hiTimer){clearInterval(hiTimer);hiTimer=null;}
    if(failsafe)clearTimeout(failsafe);
    if(opts.onend)opts.onend();
  }
  if(muted||!("speechSynthesis" in window)){ setTimeout(finish,500); return; }
  const u=new SpeechSynthesisUtterance(text);
  if(theVoice)u.voice=theVoice;
  u.rate=0.95;u.pitch=1.05;u.volume=1;
  let boundarySeen=false;
  if(opts.onword){
    u.onboundary=function(e){
      if(typeof e.charIndex!=="number"||seq!==speakSeq)return;
      boundarySeen=true;
      if(hiTimer){clearInterval(hiTimer);hiTimer=null;}
      opts.onword(e.charIndex);
    };
  }
  u.onend=finish;
  u.onerror=finish;
  try{ speechSynthesis.speak(u); }catch(e){ setTimeout(finish,500); return; }
  // if the browser never delivers onend, don't leave the flow stuck
  failsafe=setTimeout(finish,Math.min(3000+text.length*95,45000));
  // iOS Safari fires no boundary events — estimate word timing instead
  if(opts.onword&&opts.estOffsets){
    setTimeout(function(){
      if(boundarySeen||muted||finished||seq!==speakSeq)return;
      let i=0; const offs=opts.estOffsets;
      hiTimer=setInterval(function(){
        if(i>=offs.length||seq!==speakSeq){clearInterval(hiTimer);hiTimer=null;return;}
        opts.onword(offs[i].off); i++;
      },340);
    },650);
  }
}
/* Speak with word-by-word highlight over the span list. `text` is displayed, `extra` is spoken after. */
function speakWords(text,extra,spans,onend){
  const words=text.split(" ");
  let off=0; const offs=words.map(w=>{const o=off;off+=w.length+1;return {off:o,len:w.length};});
  const full=extra?(text+". "+extra):text;
  speak(full,{
    estOffsets:offs,
    onword:function(ci){
      let idx=-1;
      for(let i=0;i<offs.length;i++){ if(ci>=offs[i].off) idx=i; }
      if(ci>text.length){ spans.forEach(s=>{s.classList.remove("on");s.classList.add("done");}); return; }
      spans.forEach((s,i)=>{
        s.classList.toggle("on",i===idx);
        s.classList.toggle("done",i<idx);
      });
    },
    onend:function(){
      spans.forEach(s=>{s.classList.remove("on");s.classList.add("done");});
      if(onend)onend();
    }
  });
}
/* ============================== FX ============================== */
function confetti(n){
  n=n||36;
  const box=document.createElement("div");box.className="cfx";
  const pieces=["⭐","🎉","⚡","💛","✨","🎈"];
  for(let i=0;i<n;i++){
    const p=document.createElement("div");p.className="cfp";
    p.textContent=pieces[i%pieces.length];
    p.style.left=(Math.random()*100)+"vw";
    p.style.animationDuration=(2+Math.random()*2)+"s";
    p.style.animationDelay=(Math.random()*0.8)+"s";
    p.style.fontSize=(16+Math.random()*22)+"px";
    box.appendChild(p);
  }
  document.body.appendChild(box);
  setTimeout(()=>box.remove(),4600);
}
function pow(word,color){
  const d=document.createElement("div");d.className="pow";d.textContent=word||"POW!";
  if(color)d.style.color=color;
  document.body.appendChild(d);
  setTimeout(()=>d.remove(),950);
}
/* ============================== PROGRESS ============================== */
const SAVE_KEY="hero-academy-aria-v2";
let P={done:{},heroes:0};
try{ const raw=localStorage.getItem(SAVE_KEY); if(raw)P=Object.assign(P,JSON.parse(raw)); }catch(e){}
function save(){ try{localStorage.setItem(SAVE_KEY,JSON.stringify(P));}catch(e){} }

          if(r>=rounds.length){
            confetti(30); fb.textContent="⭐ TIME TRAVEL COMPLETE! ⭐";
            speak(R.yes+" You matched them all, "+NAME+"! What a time traveler!",{onend:done});
          }else{
            speak(R.yes,{onend:playRound});
          }
        }else{
          card.classList.remove("wrong"); void card.offsetWidth; card.classList.add("wrong");
          speak("Hee hee, nope! Listen again: "+R.ask);
        }
      };
      box.appendChild(card);
    });
    speak(R.ask);
    replayFn=function(){ speak(R.ask); };
  }
  const intro="Let's time travel! I will show you the OLD way from long ago. You tap the NEW way we do it today, with computers!";
  speak(intro,{onend:playRound});
  replayFn=function(){ speak(intro); };
}};
/* ---- 3. Sort It ---- */
ACTS.sort={ title:"SORT IT!", emoji:"🗂️", blurb:"Hardware you can touch, or software magic?",
render:function(st,done){
  const items=shuffle([
    {e:"🖥️",n:"a screen",l:"SCREEN",hw:true, why:"You can touch a screen — hardware, the computer's body!"},
    {e:"🎨",n:"a drawing app",l:"DRAWING APP",hw:false, why:"A drawing app is software — magic you cannot touch!"},
    {e:"🔊",n:"a speaker",l:"SPEAKER",hw:true, why:"You can touch a speaker — hardware!"},
    {e:"🎵",n:"a music app",l:"MUSIC APP",hw:false, why:"A music app is software — the magic inside!"},
    {e:"⌨️",n:"a keyboard",l:"KEYBOARD",hw:true, why:"You can touch every key — hardware!"},
    {e:"📹",n:"a video call app",l:"VIDEO CALL APP",hw:false, why:"A video call app is software!"},
  ]);
  let i=0, busy=false;
  const scene=el('<div class="card"><div class="scene" style="font-size:min(74px,18vw);"><span id="it" class="floaty"></span></div>'+
    '<div class="bigtext" id="itl" style="font-size:24px;"></div>'+
    '<div class="optgrid" style="grid-template-columns:1fr 1fr;">'+
      '<div class="opt" id="binH"><span class="e">🖐️</span><span class="l">HARDWARE<br>CAN TOUCH IT</span></div>'+
      '<div class="opt" id="binS"><span class="e">✨</span><span class="l">SOFTWARE<br>MAGIC INSIDE</span></div>'+
    '</div><div class="feedback" id="fb"></div></div>');
  st.appendChild(scene);
  const fb=scene.querySelector("#fb");
  function show(){
    busy=false;
    scene.querySelector("#it").textContent=items[i].e;
    scene.querySelector("#itl").textContent=items[i].l;
    fb.textContent=(i+1)+" of "+items.length;
    const ask="Here is "+items[i].n+"! Can you touch it with your hands? Is it hardware, or software?";
    speak(ask);
    replayFn=function(){ speak(ask); };
  }
  function pick(saidHw,binEl){
    if(busy)return;
    const it=items[i];
    if(saidHw===it.hw){
      busy=true; binEl.classList.add("right"); pow(it.hw?"TOUCH!":"MAGIC!","var(--green)");
      setTimeout(()=>binEl.classList.remove("right"),450);
      i++;
      if(i>=items.length){
        confetti(30); fb.textContent="⭐ ALL SORTED! ⭐";
        speak(it.why+" And that was the last one! You sorted everything, "+NAME+"! Hardware is the suit, software is the hero inside!",{onend:done});
      }else{
        speak(it.why,{onend:show});
      }
    }else{
      binEl.classList.remove("wrong"); void binEl.offsetWidth; binEl.classList.add("wrong");
      speak(it.hw?"Hmm, try touching it... you CAN touch "+it.n+"! So which bin is it?"
                 :"Hmm, can your fingers touch "+it.n+"? No! You can only see what it does. So which bin is it?");
    }
  }
  scene.querySelector("#binH").onclick=function(){ pick(true,this); };
  scene.querySelector("#binS").onclick=function(){ pick(false,this); };
  const intro="Sorting mission! I will show you something. If you can touch it with your hands, tap HARDWARE. If it is magic inside the computer, tap SOFTWARE!";
  speak(intro,{onend:show});
  replayFn=function(){ speak(intro); };
}};
/* ---- 4a. Recipe Robot ---- */
ACTS.recipe={ title:"RECIPE ROBOT", emoji:"🥪", blurb:"Put the steps in the right order!",
render:function(st,done){
  const recipes=[
    {name:"make a jam sandwich",steps:[{e:"🍞",l:"GET THE BREAD"},{e:"🍓",l:"SPREAD THE JAM"},{e:"🥪",l:"PUT IT TOGETHER"}],
     silly:"Jam before bread? Sticky table! "},
    {name:"brush your teeth",steps:[{e:"🧴",l:"PUT ON TOOTHPASTE"},{e:"🪥",l:"BRUSH BRUSH BRUSH"},{e:"💦",l:"RINSE YOUR MOUTH"}],
     silly:"Rinse before brushing? Silly robot! "},
  ];
  let r=0, need=0, busy=false;
  const scene=el('<div class="card">'+
    '<div class="sub" style="font-family:var(--disp);letter-spacing:1px;color:var(--yellow);" id="rname"></div>'+
    '<div class="slotrow" id="slots"></div>'+
    '<div class="optgrid" id="cards" style="grid-template-columns:repeat(3,1fr);"></div>'+
    '<div class="feedback" id="fb"></div></div>');
  st.appendChild(scene);
  const fb=scene.querySelector("#fb");
  function playRound(){
    busy=false; need=0;
    const R=recipes[r];
    scene.querySelector("#rname").textContent="CODE THE ROBOT TO: "+R.name.toUpperCase();
    const slots=scene.querySelector("#slots"); slots.innerHTML="";
    R.steps.forEach(()=>slots.appendChild(el('<div class="slot">·</div>')));
    const cards=scene.querySelector("#cards"); cards.innerHTML="";
    fb.textContent="What comes FIRST?";
    shuffle(R.steps.map((s,idx)=>({s:s,idx:idx}))).forEach(function(o){
      const card=el('<div class="opt"><span class="e">'+o.s.e+'</span><span class="l">'+o.s.l+'</span></div>');
      card.onclick=function(){
        if(busy||card.classList.contains("dim"))return;
        if(o.idx===need){
          card.classList.add("dim");
          const slot=slots.children[need];
          slot.textContent=o.s.e; slot.classList.add("filled");
          need++;
          if(need>=R.steps.length){
            busy=true; r++;
            if(r>=recipes.length){
              confetti(30); pow("YUM!"); fb.textContent="⭐ ROBOT CODED! ⭐";
              speak("Beep! Program complete! The robot did it perfectly, because your steps were in the right order! That is exactly what coding is, "+NAME+"!",{onend:done});
            }else{
              pow("DONE!"); fb.textContent="⭐ PERFECT ORDER! ⭐";
              speak("Beep! The robot made the sandwich! Steps in order, that is code! Next recipe!",{onend:playRound});
            }
          }else{
            fb.textContent="What comes NEXT?";
            speak("Yes! Then what comes next?");
          }
        }else{
          card.classList.remove("wrong"); void card.offsetWidth; card.classList.add("wrong");
          speak(R.silly+"Robots follow steps IN ORDER. What comes "+(need===0?"first":"next")+"?");
        }
      };
      cards.appendChild(card);
    });
    speak("The robot wants to "+R.name+"! Tap the steps in the right order. What comes first?");
    replayFn=function(){ speak("Tap the steps in order! What comes "+(need===0?"first":"next")+"?"); };
  }
  const intro="Meet Recipe Robot! He only does what your code says, step by step. Put the steps in the right order — or silly things will happen!";
  speak(intro,{onend:playRound});
  replayFn=function(){ speak(intro); };
}};
/* ---- 4b. Fly Mission ---- */
ACTS.fly={ title:"FLY MISSION", emoji:"🦸‍♀️", blurb:"Code Aria to fly past the buildings!",
render:function(st,done){
  const GRID=5, START={x:0,y:2}, GOAL={x:4,y:2};
  // building rises from the ground; solvable in 6 blocks: up, right x4, down
  const WALLS=[{x:2,y:2},{x:2,y:3},{x:2,y:4}];
  const DIRS=[{e:"⬆️",n:"fly up",dx:0,dy:-1},{e:"⬇️",n:"fly down",dx:0,dy:1},{e:"⬅️",n:"fly left",dx:-1,dy:0},{e:"➡️",n:"fly right",dx:1,dy:0}];
  const MAX=7;
  let prog=[], running=false, finished=false;
  const scene=el('<div class="card">'+
    '<div class="citygrid" id="grid"></div>'+
    '<div class="sub" style="margin-top:10px;font-family:var(--disp);letter-spacing:1px;color:var(--yellow);">YOUR CODE:</div>'+
    '<div class="progrow" id="prog"></div>'+
    '<div class="sub" style="margin-top:10px;">Tap arrows to add · tap your code to remove</div>'+
    '<div class="palette" id="pal"></div>'+
    '<div class="btnrow" style="margin-top:14px;">'+
      '<button class="btn green" id="launch" style="font-size:26px;">🚀 LAUNCH!</button>'+
      '<button class="btn ghost" id="clear">🧹</button>'+
    '</div><div class="feedback" id="fb"></div></div>');
  st.appendChild(scene);
  const grid=scene.querySelector("#grid"), progRow=scene.querySelector("#prog"), fb=scene.querySelector("#fb");
  function isWall(x,y){ return WALLS.some(w=>w.x===x&&w.y===y); }
  function drawGrid(hero){
    grid.innerHTML="";
    for(let y=0;y<GRID;y++)for(let x=0;x<GRID;x++){
      const c=document.createElement("div"); c.className="cell"+(isWall(x,y)?" wall":"");
      if(isWall(x,y))c.textContent="🏢";
      if(GOAL.x===x&&GOAL.y===y&&!(hero.x===x&&hero.y===y))c.textContent="📡";
      if(hero.x===x&&hero.y===y)c.innerHTML='<span class="hero-in-cell">'+(hero.crash?"💥":"🦸‍♀️")+'</span>';
      grid.appendChild(c);
    }
  }
  function drawProg(){
    progRow.innerHTML="";
    if(prog.length===0){ progRow.appendChild(el('<span style="color:#5a64b8;font-size:15px;">your blocks go here…</span>')); }
    prog.forEach(function(d,i){
      const ch=el('<div class="chip">'+d.e+'</div>');
      ch.onclick=function(){ if(running)return; prog.splice(i,1); drawProg(); };
      progRow.appendChild(ch);
    });
  }
  DIRS.forEach(function(d){
    const ch=el('<div class="chip">'+d.e+'</div>');
    ch.onclick=function(){
      if(running)return;
      if(prog.length>=MAX){ speak("That is a lot of blocks! Seven is the most. Tap a block in your code to remove one!"); return; }
      prog.push(d); drawProg();
      speak(d.n+"!");
    };
    scene.querySelector("#pal").appendChild(ch);
  });
  scene.querySelector("#clear").onclick=function(){ if(running)return; prog=[]; drawProg(); speak("All clear! Write new code!"); };
  scene.querySelector("#launch").onclick=async function(){
    if(running||finished)return;
    if(prog.length===0){ speak("Your code is empty! Tap some arrow blocks first, then launch!"); return; }
    running=true; fb.textContent="FLYING...";
    let pos={x:START.x,y:START.y};
    speak("Three, two, one, launch!");
    await new Promise(res=>setTimeout(res,1400));
    for(const d of prog){
      pos={x:pos.x+d.dx,y:pos.y+d.dy};
      const out=pos.x<0||pos.y<0||pos.x>=GRID||pos.y>=GRID;
      const hit=!out&&isWall(pos.x,pos.y);
      if(out||hit){
        drawGrid({x:Math.min(Math.max(pos.x,0),GRID-1),y:Math.min(Math.max(pos.y,0),GRID-1),crash:true});
        pow("CRASH!","var(--red)");
        fb.textContent="💥 TRY AGAIN!";
        speak(hit?"CRASH! I flew right into a building! I follow your instructions EXACTLY — so let's change the code and fly around it!"
                 :"Whoops! I flew out of the city! Let's fix the code and try again!");
        running=false; drawGrid(START); return;
      }
      drawGrid(pos);
      await new Promise(res=>setTimeout(res,520));
    }
    if(pos.x===GOAL.x&&pos.y===GOAL.y){
      finished=true; running=false;
      confetti(40); pow("HERO!"); fb.textContent="⭐ ARIA SAVES THE DAY! ⭐";
      speak("You did it! Your code flew me all the way to the signal! "+NAME+", you just wrote a real computer program! You are officially a coder!",{onend:done});
    }else{
      running=false; fb.textContent="ALMOST!";
      speak("I followed every block... but I did not reach the signal yet! Add more blocks to finish the trip!");
    }
  };
  drawGrid(START); drawProg();
  const intro="Mission time, "+NAME+"! See the flashing signal? Fly me there, but do not crash into the buildings! Tap arrow blocks to write your code, then press launch. I will do exactly what your code says!";
  replayFn=function(){ speak(intro); };
  speak(intro);
}};
/* ---- 5. Zap the Villains ---- */
ACTS.zap={ title:"ZAP THE VILLAINS", emoji:"👾", blurb:"Set the loop to zap them all!",
render:function(st,done){
  const TOTAL=5;
  let n=1, running=false, finished=false;
  const scene=el('<div class="card">'+
    '<div class="scene" id="vill" style="font-size:inherit;min-height:100px;"></div>'+
    '<div class="repeatbox">'+
      '<button class="arrowbtn" id="minus">−</button>'+
      '<div><div class="lbl">REPEAT ZAP ⚡</div><div class="num" id="num">1</div><div class="lbl">TIMES</div></div>'+
      '<button class="arrowbtn" id="plus">+</button>'+
    '</div>'+
    '<div class="btnrow"><button class="btn purple" id="zap" style="font-size:26px;">⚡ RUN THE LOOP!</button></div>'+
    '<div class="feedback" id="fb"></div></div>');
  st.appendChild(scene);
  const vill=scene.querySelector("#vill"), num=scene.querySelector("#num"), fb=scene.querySelector("#fb");
  function drawVillains(){
    vill.innerHTML="";
    for(let i=0;i<TOTAL;i++){ vill.appendChild(el('<span class="villain" style="animation-delay:'+(i*0.2)+'s">👾</span>')); }
  }
  scene.querySelector("#minus").onclick=function(){ if(running)return; if(n>1)n--; num.textContent=n; speak(String(n)); };
  scene.querySelector("#plus").onclick=function(){ if(running)return; if(n<9)n++; num.textContent=n; speak(String(n)); };
  scene.querySelector("#zap").onclick=async function(){
    if(running||finished)return;
    running=true; drawVillains(); fb.textContent="ZAP ZAP ZAP...";
    const kids=Array.from(vill.children);
    for(let i=0;i<Math.min(n,TOTAL);i++){
      await new Promise(res=>setTimeout(res,480));
      kids[i].classList.add("zapped"); pow("ZAP!","var(--blue)");
    }
    await new Promise(res=>setTimeout(res,650));
    if(n===TOTAL){
      finished=true; confetti(40); pow("KAPOW!"); fb.textContent="⭐ ALL VILLAINS ZAPPED! ⭐";
      speak("Exactly five! One little loop, five big zaps! "+NAME+", loops are POWERFUL, and so are you!",{onend:done});
    }else if(n<TOTAL){
      fb.textContent="SOME VILLAINS ARE LEFT!";
      speak("Only "+n+" zaps! Some villains are still giggling at us! Make the loop bigger and run it again!");
      running=false; setTimeout(drawVillains,1400);
    }else{
      fb.textContent="TOO MANY ZAPS!";
      speak("Whoa, "+n+" zaps! That is too many — we zapped the empty sky! We only need exactly five. Try again!");
      running=false; setTimeout(drawVillains,1400);
    }
  };
  drawVillains();
  const intro="Villain alert! Five silly villains are in the city! Do not tap them one by one — use a LOOP! Set how many times to repeat the zap, then run your loop!";
  replayFn=function(){ speak(intro); };
  speak(intro);
}};

ACTS.meteor={ title:"STOP THE METEOR", emoji:"☄️", blurb:"IF meteor, THEN... which power?",
render:function(st,done){
  const POWERS=shuffle([
    {e:"🛡️",l:"SHIELD",ok:true},
    {e:"🔥",l:"FIRE BLAST",no:"Fire blast! Fwooosh! ...The meteor flew right through it! Remember the rule!"},
    {e:"💨",l:"BIG WIND",no:"Big wind! Wooosh! ...The meteor is too heavy for wind! Remember the rule!"},
    {e:"🎤",l:"LOUD SINGING",no:"La la laaa! Beautiful singing! ...But the meteor does not care! Remember the rule!"},
  ]);
  let wrongs=0, solved=false;
  const scene=el('<div class="card">'+
    '<div class="rulecard" id="rule">IF ☄️ COMES → THEN 🛡️ !</div>'+
    '<div class="scene" style="min-height:110px;"><span id="met" style="animation:meteor 1.1s ease-in-out infinite;display:inline-block;">☄️</span><span style="font-size:min(54px,13vw);">🏙️</span></div>'+
    '<div class="sub" style="font-family:var(--disp);letter-spacing:1px;color:var(--yellow);">PICK YOUR POWER!</div>'+
    '<div class="optgrid" id="opts" style="grid-template-columns:1fr 1fr;"></div>'+
    '<div class="feedback" id="fb"></div></div>');

  POWERS.forEach(function(o){

        pow("SAVED!","var(--green)"); confetti(40);
        fb.textContent="⭐ CITY SAVED! ⭐";
        speak("IF the meteor comes, THEN raise the shield! BOING! The meteor bounced away! "+NAME+", you followed the if, then rule, and saved the whole city!",{onend:done});

    };
    scene.querySelector("#opts").appendChild(card);
  });
  const intro="Emergency! A meteor is falling toward the city! But we have a rule, an if, then rule: IF the meteor comes, THEN raise the shield! Quick, pick the right power!";
  replayFn=function(){ speak(intro); };
  speak(intro);
}};
