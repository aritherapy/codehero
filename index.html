function genTable(level){
  const theme=rint(2)===0
    ? {title:"PETS",cols:["NAME","SPECIES","AGE"],names:["Rex","Milo","Coco","Bubbles","Luna","Ziggy"],cats:["dog","cat","parrot","fish"],numName:"AGE",bigWord:"older"}
    : {title:"PLAYERS",cols:["NAME","LEVEL","TEAM"],names:["Maya","Leo","Zoe","Kai","Ari","Sam"],cats:["RED","BLUE","GOLD"],numName:"LEVEL",bigWord:"above"};
  const isPets=theme.title==="PETS";
  const names=sample(theme.names,4);
  let rows=names.map(function(nm){
    const num=1+rint(isPets?9:12);
    return isPets?[nm,pick(theme.cats),num]:[nm,num,pick(theme.cats)];
  });
  const numIdx=isPets?2:1, catIdx=isPets?1:2;
  const html='<table class="dtable"><tr>'+theme.cols.map(function(c){return '<th>'+c+'</th>';}).join("")+'</tr>'+
    rows.map(function(r){return '<tr>'+r.map(function(v){return '<td>'+escT(v)+'</td>';}).join("")+'</tr>';}).join("")+'</table>';
  const kind=rint(3);
  if(kind===0){ // lookup
    const row=pick(rows);
    const ans=String(row[catIdx]);
    const wrongs=sample(theme.cats.filter(function(c){return String(c)!==ans;}),2).map(String);
    return {html:html,q:"What "+(isPets?"SPECIES":"TEAM")+" is "+row[0]+"?",ans:ans.toUpperCase(),wrongs:wrongs.map(function(w){return w.toUpperCase();}),
      why:"Find the row, slide across to the column. That's a database lookup."};
  }
  if(kind===1){ // filter count
    for(let tries=0;tries<20;tries++){
      const N=3+rint(6);
      const cnt=rows.filter(function(r){return r[numIdx]>N;}).length;
      if(cnt>=1&&cnt<=3){
        return {html:html,q:"How many are "+theme.bigWord+" "+theme.numName.toLowerCase()+" "+N+"?",
          ans:String(cnt),wrongs:[String(cnt+1),String(Math.max(0,cnt-1))],
          why:"You just ran a QUERY: show me every row where "+theme.numName.toLowerCase()+" is bigger than "+N+"."};
      }
    }
    const row=pick(rows);
    return {html:html,q:"What "+(isPets?"SPECIES":"TEAM")+" is "+row[0]+"?",ans:String(row[catIdx]).toUpperCase(),
      wrongs:sample(theme.cats.filter(function(c){return String(c)!==String(row[catIdx]);}),2).map(function(w){return String(w).toUpperCase();}),
      why:"Row first, then column. Lookup complete."};
  }
  // max — ensure unique
  let maxV=-1,maxN=null,tie=false;
  rows.forEach(function(r){ if(r[numIdx]>maxV){maxV=r[numIdx];maxN=r[0];tie=false;} else if(r[numIdx]===maxV)tie=true; });
  if(tie){ rows[0][numIdx]=13; maxN=rows[0][0]; }
  const rebuilt='<table class="dtable"><tr>'+theme.cols.map(function(c){return '<th>'+c+'</th>';}).join("")+'</tr>'+
    rows.map(function(r){return '<tr>'+r.map(function(v){return '<td>'+escT(v)+'</td>';}).join("")+'</tr>';}).join("")+'</table>';
  return {html:rebuilt,q:"Who has the highest "+theme.numName+"?",ans:maxN,
    wrongs:sample(rows.map(function(r){return r[0];}).filter(function(n){return n!==maxN;}),2),
    why:"Scanning a column for the biggest value — databases do that across MILLIONS of rows in a blink."};
}

function genErrFix(level){
  const t=level<=1?rint(3):rint(5);
  let s,w;
  switch(t){
    case 0: s=3+rint(6);
      return {lines:['score = '+s,'print(scor)'],fixLn:2,mission:String(s),
        fix:'print(score)',wrongs:['print("scor")','scor = 7'],
        why:"The error said it: I don't know scor. One missing letter — classic typo bug."};
    case 1: w=pick(PY_WORDS);
      return {lines:['print('+w+')'],fixLn:1,mission:w,
        fix:'print("'+w+'")',wrongs:['print('+w+' + '+w+')','print(print)'],
        why:"Without quotes, the machine hunts for a BOX named "+w+" — and finds nothing. Quotes make it a word."};
    case 2:
      return {lines:['power = 9','if power > 5','  print("mega")'],fixLn:2,mission:"mega",
        fix:'if power > 5:',wrongs:['if power > 5;','print(if power)'],
        why:"The colon tells the machine: the choosing starts here. Tiny character, big job."};
    case 3:
      return {lines:['age = 12','if age < 10:','  print("big kid")','else:','  print("little kid")'],fixLn:2,mission:"big kid",
        fix:'if age > 10:',wrongs:['if age == 10:','if age < 5:'],
        why:"No error this time — the code RAN, just wrong. The rule pointed the wrong way. Logic bugs hide quietly."};
    default:
      return {lines:['a = 3','b = "4"','print(a + b)'],fixLn:2,mission:"7",
        fix:'b = 4',wrongs:['a = "3"','print(a)'],
        why:"The quotes turned 4 into a word, so plus GLUED instead of adding. Sneakiest bug in the book."};
  }
}

/* Test pool helper: which skills can appear in a belt test */
function testableSkills(belt){
  if(/^black/.test(belt.id)){
    return TRACK().filter(b=>!/^black/.test(b.id)).flatMap(b=>b.skills).filter(id=>!SKILLS[id].noTest);
  }
  return belt.skills.filter(id=>!SKILLS[id].noTest);
}

function renderTest(){
  const b=TRACK()[S.belt], T=S.test;
  app.appendChild(header("⚔️ "+b.name+" TEST","belt"));
  const st=el('<div class="stage"></div>');
  app.appendChild(st);
  const hud=el('<div class="hudrow"><span class="big">CHALLENGE '+(T.at+1)+' OF '+T.qs.length+'</span>'+
    '<span>'+"🟡".repeat(T.right)+"⚪".repeat(T.at-T.right)+"▫️".repeat(T.qs.length-T.at)+'</span></div>');
  st.appendChild(hud);
  const arena=el('<div></div>');
  st.appendChild(arena);
  const sid=T.qs[T.at], sk=SKILLS[sid];
  if(T.at===0){
    speak("The "+b.name.toLowerCase()+" test begins! "+T.qs.length+" challenges. Get "+b.testPass+" right, and the belt is YOURS. First challenge: "+sk.title.toLowerCase()+"!",
      {onend:startQ});
  } else { startQ(); }
  function startQ(){
    if(S.screen!=="test")return;
    sk.play(arena,skillLevel(sid),"test",function(correct){
      if(S.screen!=="test")return;
      if(correct)T.right++;
      T.at++;
      if(T.at<T.qs.length){ render(); return; }
      // finished
      if(T.right>=b.testPass){
        BP(b.id).earned=true; save();
        go("award");
      }else{
        app.innerHTML="";
        app.appendChild(header(b.name+" TEST","belt"));
        const fs=el('<div class="stage" style="justify-content:center;text-align:center;">'+
          '<div style="font-size:90px;">💪</div>'+
          '<div class="banner" style="font-size:clamp(22px,7vw,34px);">SO CLOSE!</div>'+
          '<div class="sub">You got '+T.right+' of '+T.qs.length+'. You need '+b.testPass+'.</div>'+
          '<div class="btnrow"><button class="btn green" id="again">💪 PRACTICE MORE</button></div></div>');
        app.appendChild(fs);

/* ============================== ARCADE: STAR CATCHER ============================== */
function renderArcade(){
  app.appendChild(header("🌠 STAR CATCHER"));
  const st=el('<div class="stage">'+
    '<div class="hudrow"><span class="big" id="acScore">SCORE: 0</span><span id="acTime">25s</span><span>BEST: '+(P.best||0)+'</span></div>'+
    '<div class="sky" id="sky"></div>'+
    '<div class="btnrow" style="margin-top:10px;"><button class="btn green pulse" id="acGo" style="font-size:24px;">▶ GO!</button></div>'+
    '<div class="feedback" id="acFb"></div></div>');
  app.appendChild(st);
  const sky=st.querySelector("#sky"), scoreEl=st.querySelector("#acScore"), timeEl=st.querySelector("#acTime"), fb=st.querySelector("#acFb");
  let score=0, timeLeft=25, playing=false, spawnT=null, clockT=null;
  function stopAll(){ if(spawnT)clearInterval(spawnT); if(clockT)clearInterval(clockT); playing=false; }
  function spawn(){
    if(!sky.isConnected){ stopAll(); return; }
    const s=el('<div class="fallstar">'+(ART?'<img src="assets/obj-star.png" alt="">':pick(["⭐","🌟","💫"]))+'</div>');
    s.style.left=(5+rint(85))+"%";
    const dur=2.6+Math.random()*1.2;
    s.style.transition="top "+dur+"s linear";
    sky.appendChild(s);
    requestAnimationFrame(function(){ requestAnimationFrame(function(){ s.style.top="105%"; }); });
    s.onclick=function(){
      if(!playing)return;
      score++; scoreEl.textContent="SCORE: "+score;
      s.classList.add("caught"); pow("+1","var(--yellow)");
      setTimeout(()=>s.remove(),300);
    };
    setTimeout(()=>{ if(s.isConnected)s.remove(); },dur*1000+200);
  }
  st.querySelector("#acGo").onclick=function(ev){
    if(playing)return;
    playing=true; score=0; timeLeft=25;
    scoreEl.textContent="SCORE: 0"; timeEl.textContent="25s"; fb.textContent="";
    ev.target.style.visibility="hidden";
    speak("Stars are falling! Tap them before they land! Every tap is an EVENT — the game is listening for YOU! Go go go!");
    spawnT=setInterval(spawn,750);
    clockT=setInterval(function(){
      if(!sky.isConnected){ stopAll(); return; }
      timeLeft--; timeEl.textContent=timeLeft+"s";
      if(timeLeft<=0){
        stopAll();
        ev.target.style.visibility="visible"; ev.target.textContent="▶ AGAIN!";
        const isBest=score>(P.best||0);
        if(isBest){ P.best=score; save(); confetti(36); }
        fb.textContent=isBest?"🏆 NEW BEST: "+score+"!":"SCORE: "+score;
        speak(isBest?("NEW RECORD! "+score+" stars! Incredible tapping, "+NAME+"!")
                    :("You caught "+score+" stars! Every tap was an event the game heard. Play again and beat your best!"));
      }
    },1000);
  };
  const intro="Star catcher! When you tap a star, the game reacts — coders call that an EVENT! Press go, and catch as many as you can in twenty five seconds!";
  replayFn=function(){speak(intro);};
  speak(intro);
}

  replayFn=function(){speak(intro);};
  speak(intro);
}

function renderGrown(){
  app.appendChild(header("FOR GROWN-UPS"));
  const st=el('<div class="stage"></div>');
  /* ---- cloud sync section (additive; safe no-op if Supabase never loaded) ---- */
  if(!sb){
    st.appendChild(el('<div class="card" style="text-align:center;color:var(--faint);font-size:14px;">☁️ Sync is unavailable right now.</div>'));
  }else if(!cloudUser){
    const syncCard=el('<div class="card"></div>');
    if(syncUiStep==="email"){
      syncCard.innerHTML =
        '<div class="sub" style="margin:0 0 10px;">☁️ SYNC ACROSS DEVICES</div>'+
        '<div class="sub" style="font-size:14px;font-weight:400;margin-bottom:12px;">Sign in to save progress across every device.</div>'+
        '<input id="syncEmail" type="email" placeholder="parent@email.com" style="width:100%;box-sizing:border-box;font-family:var(--disp);font-size:22px;'+
          'padding:14px 16px;border-radius:var(--r-md);border:1px solid var(--stroke);background:rgba(0,0,0,.25);color:var(--white);'+
          'text-align:center;outline:none;" autocomplete="off"/>'+
        '<div class="btnrow" style="margin-top:14px;"><button class="btn" id="syncSend" style="font-size:16px;padding:12px 20px;">SEND SIGN-IN CODE</button></div>'+
        '<div id="syncStatusLine" class="sub" style="font-size:13px;margin-top:10px;"></div>';
      const emailInput=syncCard.querySelector("#syncEmail");
      emailInput.value = syncUiEmail;
      const statusEl=syncCard.querySelector("#syncStatusLine");
      syncCard.querySelector("#syncSend").onclick=function(){
        const emailValue=(emailInput.value||"").trim();
        if(!emailValue||emailValue.indexOf("@")<0){ statusEl.textContent="Enter a valid email"; return; }
        statusEl.textContent="Sending…";
        sb.auth.signInWithOtp({ email: emailValue }).then(function(res){
          if(res.error){ statusEl.textContent="Error: "+res.error.message; return; }
          syncUiEmail = emailValue;
          syncUiStep = "code";
          go("grown");
        });
      };
    }else{
      const safeEmail=String(syncUiEmail||"").replace(/[<>&]/g,"");
      syncCard.innerHTML =
        '<div class="sub" style="margin:0 0 10px;">☁️ ENTER YOUR CODE</div>'+
        '<div class="sub" style="font-size:14px;font-weight:400;margin-bottom:12px;">We sent a code to '+safeEmail+'. Type it below — on your phone, check the email, then type the code here on this device.</div>'+
        '<input id="syncCode" type="text" inputmode="numeric" autocomplete="one-time-code" placeholder="Enter code" maxlength="12" style="width:100%;box-sizing:border-box;font-family:var(--disp);font-size:30px;'+
          'letter-spacing:8px;padding:14px 16px;border-radius:var(--r-md);border:1px solid var(--stroke);background:rgba(0,0,0,.25);color:var(--white);'+
          'text-align:center;outline:none;"/>'+
        '<div class="btnrow" style="margin-top:14px;"><button class="btn" id="syncVerify" style="font-size:16px;padding:12px 20px;">VERIFY</button></div>'+
        '<div id="syncStatusLine" class="sub" style="font-size:13px;margin-top:10px;"></div>'+
        '<div class="btnrow" style="margin-top:10px;">'+
          '<button class="btn ghost" id="syncResend" style="font-size:13px;padding:8px 14px;">RESEND CODE</button>'+
          '<button class="btn ghost" id="syncBack" style="font-size:13px;padding:8px 14px;">‹ USE A DIFFERENT EMAIL</button>'+
        '</div>';
      const codeInput=syncCard.querySelector("#syncCode");
      const statusEl=syncCard.querySelector("#syncStatusLine");
      syncCard.querySelector("#syncVerify").onclick=function(){
        const codeValue=(codeInput.value||"").trim();
        if(!codeValue){ statusEl.textContent="Enter the code from the email"; return; }
        statusEl.textContent="Checking…";
        sb.auth.verifyOtp({ email: syncUiEmail, token: codeValue, type: "email" }).then(function(res){
          if(res.error){ statusEl.textContent="Error: "+res.error.message; return; }
          statusEl.textContent="✓ Signed in!";
          // onAuthStateChange (registered in initSupabase) picks up cloudUser + re-renders from here
        });
      };
      syncCard.querySelector("#syncResend").onclick=function(){
        statusEl.textContent="Sending…";
        sb.auth.signInWithOtp({ email: syncUiEmail }).then(function(res){
          statusEl.textContent = res.error ? ("Error: "+res.error.message) : "New code sent!";
        });
      };
      syncCard.querySelector("#syncBack").onclick=function(){
        syncUiStep="email";
        go("grown");
      };
    }
    st.appendChild(syncCard);
  }else{
    const statusMap={idle:"Ready to sync",syncing:"Syncing…",synced:"✓ Synced",error:"Sync failed — will retry"};
    const safeEmail=String(cloudUser.email||"").replace(/[<>&]/g,"");
    const syncedCard=el('<div class="card">'+
      '<div class="sub" style="margin:0 0 8px;">☁️ SYNCED</div>'+
      '<div class="sub" style="font-size:14px;font-weight:400;">Signed in as '+safeEmail+'</div>'+
      '<div class="sub" style="font-size:13px;margin-top:4px;">'+(statusMap[syncStatus]||"Ready to sync")+'</div>'+
      '<div class="btnrow" style="margin-top:12px;">'+
        '<button class="btn" id="syncNow" style="font-size:14px;padding:10px 16px;">🔄 SYNC NOW</button>'+
        '<button class="btn ghost" id="syncOut" style="font-size:14px;padding:10px 16px;">SIGN OUT</button>'+
      '</div>'+
    '</div>');
    syncedCard.querySelector("#syncNow").onclick=function(){ cloudSyncAll().then(function(){ render(); }); };
    syncedCard.querySelector("#syncOut").onclick=function(){ sb.auth.signOut().then(function(){ syncUiStep="email"; syncUiEmail=""; render(); }); };
    st.appendChild(syncedCard);
  }
  st.appendChild(el('<div class="grown">'+
    '<h3>How Hero Academy works</h3>'+
    'A mastery curriculum, Code-Ninjas style. Each <b>belt</b> = spoken lessons (with quick checks) → a <b>practice arena</b> (problems are randomly generated, so answers can\'t be memorized) → a <b>belt test</b> that unlocks the next belt.<br><br>'+
    '⚪ White — computer basics + history · 🟡 Yellow — sequences · 🟠 Orange — loops · 🟢 Green — if/then + else · 🔵 Blue — variables · 🟣 Purple — debugging · ⚫ Black — mixed final mission.<br><br>'+
    'Each practice game holds 3 stars (3 / 6 / 10 correct); problems get harder as stars grow. 🗣️ repeats narration, 🔊/🔇 mutes. Progress saves on this device.'+
  '</div>'));
  st.appendChild(el('<div class="sub" style="font-family:var(--disp);letter-spacing:1px;margin-top:6px;">👤 CURRENT PLAYER</div>'));
  if(activeProfile){
    st.appendChild(el('<div class="grown">'+
      '<b>'+activeProfile.avatar+' '+activeProfile.name+'</b> — '+(activeProfile.ageBand==="7-11"?"Ages 7–11":"Ages 4–7")+
    '</div>'));
    const pactions=el('<div class="btnrow" style="margin-top:10px;">'+
      '<button class="btn blue" id="gswitch" style="font-size:14px;padding:10px 16px;">👤 SWITCH PLAYER</button>'+

  }else{
    st.appendChild(el('<div class="grown">No player selected.</div>'));
  }
  st.appendChild(el('<div class="sub" style="font-family:var(--disp);letter-spacing:1px;margin-top:6px;">🔒 BELT CONTROLS</div>'));
  st.appendChild(el('<div class="sub" style="font-size:13px;margin:0 0 4px;">Unlock or re-lock any belt. Locking keeps her lessons &amp; stars — she just re-takes that belt test. White belt is always open.</div>'));
  const list=el('<div style="display:flex;flex-direction:column;gap:8px;"></div>');
