      x:"The app gets copied from storage — the shelf — into RAM — the desk. That little loading wait when a big game starts? That's this exact copying, happening live. Bigger game, bigger copy, longer wait."},
     {e:"🧠", t:"Step 3: the CPU runs it.",
      x:"Now the Central Processing Unit starts running the app's instructions — millions of them, one after another, in exact order. No skipping. Ever. Computers are incapable of skipping steps — that's actually their superpower."},
     {e:"🎨", t:"Step 4: the GPU draws it.",
      x:"The Graphics Processing Unit paints the screen — and keeps repainting it, sixty times every second, for as long as the app is open. Your eye sees smooth motion. The GPU knows it's really sixty still pictures a second."},
     {check:{t:"What happens FIRST after your tap?", spoken:"Check. What happens FIRST, right after your finger taps the icon?",
       opts:[{e:"⏰",l:"THE OS NOTICES",ok:true},{e:"🎨",l:"THE GPU DRAWS THE APP",no:"Drawing comes last — you can't draw an app nobody has woken up yet. Again."},{e:"📦",l:"THE APP COPIES INTO RAM",no:"Close — but someone has to give that order first. The boss notices, THEN the copying starts. Again."}],
       yes:"The OS notices first. Boss program. Always on duty."}},
     {e:"⚡", t:"All of that — in one blink.",
      x:"Notice what that was: a SEQUENCE. Exact steps, exact order, ridiculous speed. OS, then copy, then CPU, then GPU — every tap, every time, in that order. In the arena you'll rebuild these chains yourself, step by step. Go show the machine you know its moves."},
   ]},
   { title:"EVERYTHING IS SWITCHES", emoji:"🎛️", slides:[
     {e:"🔦", t:"Ready for the big secret?",
      x:"Here's the actual secret of every computer on Earth — the phone, the console, the two-hundred-million-dollar supercomputer. Deep, deep down... it's all tiny switches. On. Off. That's it. That's the whole trick. The rest of this lesson is me proving it to you."},
     {e:"⚙️", t:"The switch's real name: transistor.",
      x:"The tiny switch has a real name: the TRANSISTOR. It's electronic — no moving parts — and it flips between on and off billions of times a second. The transistor is probably the most important invention of the last hundred years, and most people can't name it. You can now."},
     {e:"🔬", t:"Billions. On a chip you could swallow.",
      x:"How small are they? A modern CPU packs around TWENTY BILLION transistors onto a chip smaller than your fingernail. Twenty billion switches, each one thinner than a virus, all flipping in perfect coordination. That's what's inside the 'chip' everyone brags about."},
     {check:{t:"The tiny switch inside every chip is called a...", spoken:"Check! The tiny electronic switch inside every chip — what's its real name?",
       opts:[{e:"⚙️",l:"TRANSISTOR",ok:true},{e:"🔌",l:"PLUG",no:"A plug connects things — the switch that computes is the transistor. Again."},{e:"💡",l:"LIGHT BULB",no:"Right idea — on and off! — but the real name is the transistor. Again."}],
       yes:"The transistor. Twenty billion of them are working for you right now."}},
     {e:"💡", t:"On = 1. Off = 0.",
      x:"A switch that's on, we call one. Off, we call zero. That's BINARY — the two-symbol language of every machine. One switch alone can't say much. But billions of switches, flipping billions of times a second? That's your phone. Everything it does is ones and zeros wearing a good costume."},
     {e:"🔢", t:"Switches can count.",
      x:"Line up five switches and give them values: sixteen, eight, four, two, one. Flip some on and add up the on-values. Flip on the eight and the two? Eight plus two — ten. Flip on sixteen, four, and one? Twenty-one. Any number, just from on and off. You just learned to count in binary."},
     {e:"🔤", t:"And numbers can be letters.",
      x:"Now give every letter a number — A is one, B is two, all the way to Z at twenty-six. Suddenly switches can SPELL. The letter H is eight — that's just the eight-switch, on. Every message you've ever sent was secretly switches spelling with numbers, at the speed of light."},
     {check:{t:"Switches showing 8+1 spell the number 9. Which letter is 9?", spoken:"Quick decode! The switches show eight plus one — nine. Count into the alphabet: which letter is number nine?",
       opts:[{e:"🔤",l:"I",ok:true},{e:"🔡",l:"H",no:"H is number eight. One more step into the alphabet. Again."},{e:"🔠",l:"J",no:"J is number ten — one step too far. Again."}],
       yes:"I — the ninth letter. You just read binary in your head."}},
     {e:"🧮", t:"Bits and bytes — real units.",
      x:"One switch's answer — one or zero — is called a BIT. Eight bits together make a BYTE — enough to hold one letter. These are the real units of all digital things, and now the storage numbers make sense: a kilobyte is about a thousand bytes, a megabyte about a million, a gigabyte about a billion."},
     {e:"📸", t:"Do the math on your own phone.",
      x:"One photo is about three megabytes — roughly twenty-four MILLION switches' worth of ones and zeros. A one-hundred-twenty-eight gigabyte phone? That's room for about a TRILLION bits. You are walking around with a trillion tiny light switches in your pocket. Casually."},
     {check:{t:"Eight bits together make a...", spoken:"Check! Eight bits together make one what?",
       opts:[{e:"🧮",l:"BYTE",ok:true},{e:"🍔",l:"BITE",no:"Sounds identical, spelled differently — and the computer one is B Y T E. Again."},{e:"💾",l:"GIGABYTE",no:"A gigabyte is about a BILLION bytes — way bigger. Eight bits is one byte. Again."}],
       yes:"A byte — enough for one letter. Kilobytes, megabytes, gigabytes: just bigger piles of bytes."}},
     {e:"🎛️", t:"Your turn at the switchboard.",
      x:"Music, photos, games, this app, my voice right now — all of it is numbers, and all the numbers are switches. In the practice arena there's a switchboard with your name on it. You're going to spell real letters in pure binary. Yes, actual binary. You're ready."},
   ]},
   { title:"THE TIME MACHINE", emoji:"🕰️", slides:[
     {e:"🕰️", t:"Same jobs. New tools.",
      x:"Kids always did homework, made plans, listened to music, and bugged their friends. The JOBS never changed — the TOOLS did. Hop in the time machine. We're going to visit how people managed — and meet the very first computers on the way back."},
     {e:"🏫", t:"School, 1975.",
      x:"No laptops, no search. You looked things up in an encyclopedia — twenty heavy books, already a few years out of date the day they arrived. Worksheets came off a hand-cranked copy machine with purple ink that teachers had to churn by arm. Homework was one hundred percent paper. Losing your notebook was losing EVERYTHING — no backups."},
     {e:"☎️", t:"Making plans, 1980.",
      x:"One phone per house. Wired to the wall. If your friend was out — you simply did not reach them, and that was that. People MEMORIZED their friends' numbers! Ask your grandparents — they can still recite numbers from fifty years ago. Their brains were the contacts app."},
     {e:"📼", t:"Music, 1990.",
      x:"You waited by the radio for your favorite song with one finger hovering over the record button of a cassette deck. Missed the start? Wait another hour and hope. A tape held about fifteen songs. Your streaming app holds about a hundred million. Same joy. Slightly different scale."},
     {check:{t:"It's 1980. Your friend isn't home. You...", spoken:"Time machine check. It's nineteen eighty. You call, and your friend is not home. What can you actually do?",
       opts:[{e:"⏳",l:"WAIT AND TRY LATER",ok:true},{e:"💬",l:"JUST TEXT THEM",no:"Text them WHERE? No mobile phones, no texting — that's twenty years away. Again."},{e:"📨",l:"DM THEM",no:"The internet barely exists and nobody is on it. Again."}],
       yes:"You waited. Or biked to their house and knocked. Plans took actual planning."}},
     {e:"🏢", t:"Now meet the first computers.",
      x:"And what were computers like back then? The first famous one, ENIAC, from the 1940s, FILLED AN ENTIRE ROOM and weighed as much as five elephants. Programmers didn't type — they re-plugged hundreds of cables to change the program. All that size... with less power than a cheap calculator today."},
     {e:"🚀", t:"The moon landing computer.",
      x:"Here's my favorite fact in all of computing. The computer that guided Apollo Eleven to the MOON in 1969 was thousands of times weaker than the phone in your house. Weaker than a smart watch. People flew to the moon on it anyway — because brilliant humans plus even a weak computer is an unstoppable combination."},
     {e:"🌐", t:"Then computers learned to talk.",
      x:"For decades, computers worked alone. Then in the 1990s the INTERNET connected them, and everything changed. Early internet came through the phone line with a screaming screech sound — and while you were online, nobody in the house could use the phone. Ask a grown-up to imitate the dial-up sound. They all can. It's hilarious."},
     {check:{t:"The Apollo moon computer compared to your phone was...", spoken:"Check! The computer that flew people to the moon — compared to a modern phone, it was...",
       opts:[{e:"🐜",l:"THOUSANDS OF TIMES WEAKER",ok:true},{e:"🐘",l:"WAY MORE POWERFUL",no:"Nope — your phone destroys it completely. They went to the moon on almost nothing. Again."},{e:"🤝",l:"ABOUT THE SAME",no:"Not close — thousands of times weaker. The humans made up the difference. Again."}],
       yes:"Thousands of times weaker — and they still landed on the moon. Never blame your tools."}},
     {e:"🔁", t:"But look closer...",
      x:"Kids in 1980 still made plans. Still shared music. Still passed notes in class — paper DMs, foldable, interceptable. The jobs never changed. The tools just got so fast that the waiting disappeared. THAT is what computers did to the world: they didn't change what we do. They deleted the waiting."},
     {check:{t:"So what really changed between THEN and NOW?", spoken:"So what really changed between then and now?",
       opts:[{e:"🛠️",l:"THE TOOLS — NOT THE JOBS",ok:true},{e:"🗣️",l:"PEOPLE STOPPED TALKING",no:"People talk more than ever — just through different tools. Again."},{e:"💯",l:"ABSOLUTELY EVERYTHING",no:"Look again — making plans, music, homework... the jobs are all still here. What changed is HOW. Again."}],
       yes:"Same jobs, faster tools. That's the smartest way to think about all technology — including whatever gets invented next."}},
     {e:"🎫", t:"You live in the fast chapter.",
      x:"From room-sized machines to a trillion switches in your pocket — in ONE human lifetime. Your grandparents saw the whole ride. And you? You're learning how it all works from the inside, which puts you ahead of most grown-ups. Time machine parked. Arena's open."},
   ]},
  ]},
{ id:"yellow2", name:"YELLOW BELT", concept:"THE INTERNET", beltEmoji:"🟡", color:"#F2C94C",
  skills:["urltrip","packet","cs"], testN:6, testPass:5,
  lessons:[
   { title:"ASK + ANSWER", emoji:"🏓", slides:[
     {e:"🏓", t:"The internet's only rule.",
      x:"White belt: you know the machine. Yellow belt: how machines TALK to each other. And everything online — every video, message, game — is one single pattern: somebody ASKS, somebody ANSWERS. Learn who's who in that pattern, and the entire internet stops being a mystery. Let's meet the two characters."},
     {e:"📱", t:"Your device = the CLIENT.",
      x:"The asker is called the CLIENT. Your phone, your tablet, your console — all clients. When you open a video, your device is asking a far-away computer: hey, send me that video. When you refresh a feed: got anything new for me? Clients ask. That's their whole personality."},
     {e:"🖥️", t:"The answerer = the SERVER.",
      x:"The answerer is called the SERVER — and the name is literal: a computer whose entire JOB is to SERVE others. Servers have no screen, no keyboard, no chair, because no human sits at them. They look like flat pizza boxes stacked in tall racks, blinking in the dark, answering requests all day and all night."},
     {e:"🍽️", t:"The restaurant picture.",
      x:"Here's the picture to keep forever. You at a restaurant are the CLIENT: you order. The kitchen is the SERVER: it has the ingredients and makes the food. You never walk into the kitchen — you ask, it answers. Every single thing you do online is you ordering from somebody's kitchen."},
     {check:{t:"You hit play on a video. Who actually HAS the video?", spoken:"You hit play on a video. Who actually has the video file?",
       opts:[{e:"🖥️",l:"THE SERVER",ok:true},{e:"📱",l:"YOUR PHONE",no:"If the whole video were already on your phone, you wouldn't need internet to watch it. Your phone asks — the server sends. Again."},{e:"🎨",l:"THE SCREEN",no:"The screen just shows what it's given. The file lives far away. Again."}],
       yes:"The server. Your phone asks, and the video streams over, piece by piece."}},
     {e:"🐙", t:"One server, thousands of clients.",
      x:"Here's the wild part: one server can answer THOUSANDS of clients at the same time. And big apps run thousands of servers working together — when millions of people watch videos at once, an army of servers is answering an ocean of asks, every second, without dropping one. Well. Mostly without dropping one."},
     {e:"💬", t:"Where messages wait.",
      x:"Send a message while your friend's phone is dead. Where does it go? It waits ON THE SERVER, in the middle. When their phone wakes up, it asks the server: anything for me? — and collects your message. Messages NEVER fly phone to phone directly. They always go through the middle. Always."},
     {check:{t:"Friend's phone is OFF. Your message...", spoken:"Your friend's phone is completely off. What happens to your message?",
       opts:[{e:"🖥️",l:"WAITS ON THE SERVER",ok:true},{e:"↩️",l:"BOUNCES BACK TO YOU",no:"Nothing bounces — the middle just holds it. Again."},{e:"✨",l:"TELEPORTS INTO THEIR PHONE",no:"Into a phone that's OFF? Nothing enters a dead phone. The server holds it until the phone asks. Again."}],
       yes:"It waits on the server — which is exactly why it arrives the second they're back online."}},
     {e:"🔐", t:"Why your password gets checked far away.",
      x:"When you log in, your device doesn't decide if the password is right — the SERVER checks it. Why? Because your device could be stolen! If a thief's phone could just say trust me, everyone's account would be open. The server is the guard at the door who actually keeps the list. Never the client. Always the server."},
     {check:{t:"Your password gets checked by...", spoken:"Check! Who actually checks that your password is right?",
       opts:[{e:"🖥️",l:"THE SERVER — THE GUARD",ok:true},{e:"📱",l:"YOUR PHONE",no:"A stolen phone could lie! The checking must happen where thieves can't reach — the server. Again."},{e:"⌨️",l:"THE KEYBOARD",no:"The keyboard just types. The far-away guard does the checking. Again."}],
       yes:"The server — so a stolen device can't just say trust me. Security lives in the middle."}},
     {e:"➡️", t:"One question left...",
      x:"So: clients ask, servers answer, servers hold the stuff and guard the doors. Which leaves one massive question — WHERE are all these servers? Billions of people, trillions of asks... those pizza-box computers must live somewhere. Next lesson: the buildings that run the world. See you there."},
   ]},
   { title:"WHERE THE CLOUD LIVES", emoji:"☁️", slides:[
     {e:"☁️", t:"'The cloud' — let's make it real.",
      x:"You know servers now. So when someone says your photos are 'in the cloud' — where IS that? Here's the truth: the cloud is a BUILDING. A real one, called a DATA CENTER — a giant warehouse packed with thousands of servers, humming in the dark. By the end of this lesson you'll know why those buildings exist, and why they quietly run your whole digital life."},
     {e:"🤔", t:"Why not just keep everything on your phone?",
      x:"Seriously — why involve far-away computers at all? Three reasons. One: phones get lost, dropped, and dunked in pools — if your photos lived ONLY there, one bad day erases your memories. Two: phones are small — they can't hold everything forever. Three: SHARING. If your photo goes to a friend, it needs a middle place you both can reach. The cloud is that safe, huge, shared middle place."},
     {check:{t:"Your phone breaks. Your cloud photos...", spoken:"Check! Your phone takes a swim in the pool and dies. What happens to the photos you backed up to the cloud?",
       opts:[{e:"😌",l:"SAFE — THEY LIVE ON SERVERS",ok:true},{e:"💀",l:"GONE FOREVER",no:"That's only true for photos that ONLY lived on the phone. The backed-up ones are sitting safely in a data center. Again."},{e:"🏊",l:"ALSO WET",no:"Ha! The servers are in a very dry building far away. Again."}],
       yes:"Safe. That's reason number one the cloud exists: your stuff survives your device."}},
     {e:"🏢", t:"Why ONE giant building?",
      x:"Okay — but why pack thousands of servers into one warehouse instead of spreading them around? Because together is cheaper and safer. One monster cooling system instead of thousands of little fans. One backup power plant. One security team. One repair crew walking the aisles swapping broken machines. It's like a library: ONE building with a million books beats every family buying every book."},
     {e:"🧊", t:"Cold air. Backup power. No naps.",
      x:"Thousands of computers make serious heat — so data centers run monster air conditioning, and some are built in cold countries on purpose. They also keep giant backup generators, because if the power dies, a chunk of the internet dies with it. The internet is not allowed to nap. Somewhere right now, someone's whole job is keeping those rooms cold."},
     {check:{t:"Why put thousands of servers in ONE building?", spoken:"Check! Why do companies pack thousands of servers into one giant building?",
       opts:[{e:"💰",l:"CHEAPER + SAFER TOGETHER",ok:true},{e:"🎨",l:"IT LOOKS COOLER",no:"Data centers are honestly pretty boring-looking from outside. It's about shared cooling, power, guards, and repairs. Again."},{e:"📦",l:"THEY GET LONELY",no:"Servers don't do feelings. They do share cooling and guards though. Again."}],
       yes:"Cheaper and safer together — shared cooling, power, security, and repairs. The library idea."}},
     {e:"🚀", t:"The cloud's superpower: renting.",
      x:"Now the part that changed the world. A small game studio doesn't BUY a thousand servers — they RENT cloud servers, and pay only for what they use. Even better: on a crazy-busy launch day they can borrow a thousand EXTRA servers for one hour... and hand them back after. That's why three friends in a garage can build an app that serves the whole planet. The cloud made small teams mighty."},
     {check:{t:"Why do app makers RENT cloud servers?", spoken:"Check! Why do most app makers rent cloud servers instead of buying their own?",
       opts:[{e:"🎈",l:"PAY ONLY FOR WHAT THEY USE — AND BORROW MORE ON BUSY DAYS",ok:true},{e:"🏠",l:"SERVERS DON'T FIT IN HOUSES",no:"A few would fit in a garage, honestly. The real magic is renting exactly what you need, and growing in minutes. Again."},{e:"😴",l:"BUYING IS TOO BORING",no:"Buying is EXPENSIVE — and slow. Renting means a tiny team can serve millions overnight. Again."}],
       yes:"Rent what you need, borrow more for busy days, hand it back after. Small teams, planet-sized apps."}},
     {e:"🏷️", t:"The landlords have names.",
      x:"Three companies run most of the internet's buildings. A W S — Amazon Web Services. Google Cloud. And Microsoft Azure. Never heard of AWS? It quietly runs a huge slice of the apps you use every day. Most app companies you know are actually renters in one of these three landlords' buildings."},
     {e:"🌍", t:"Where they build them.",
      x:"Data centers get built near three things: cold air, cheap power... and YOU. The closer the building, the faster your answers come back — so the big three build hundreds of them, spread across the whole planet. There's one closer to your house than you'd guess."},
     {check:{t:"So where IS the cloud, really?", spoken:"Last check. So — where is the cloud, really?",
       opts:[{e:"🏢",l:"BUILDINGS FULL OF RENTED SERVERS",ok:true},{e:"🌦️",l:"UP IN THE SKY",no:"The sky has regular clouds. Your photos are in a very cold warehouse. Less poetic — more true. Again."},{e:"📱",l:"INSIDE YOUR PHONE",no:"If it lived in your phone, losing the phone would lose everything. It lives in a data center — which is exactly why it's safe. Again."}],
       yes:"Buildings full of servers — rented out to the apps of the world. Now you know what everyone else just hand-waves."}},
     {e:"🌫️", t:"Never hand-wave it again.",
      x:"Next time anyone says 'it's in the cloud', you can picture it PROPERLY: a cold humming warehouse, racks of pizza-box servers, backup generators, a security guard, and somewhere on one of those machines... a little corner that's yours. Next lesson: how your data actually TRAVELS there and back. It's weirder than you think."},
   ]},
   { title:"A MESSAGE'S JOURNEY", emoji:"✉️", slides:[
     {e:"⌨️", t:"You type a site's name...",
      x:"...and hit enter. In the next second, one of the great hidden adventures of the modern world happens. You know clients, servers, and the buildings. Now let's follow your actual request, step by step, across the planet and back. Buckle up."},
     {e:"🔢", t:"First problem: the internet speaks numbers.",
      x:"The internet doesn't know NAMES — it knows number addresses. Every device online has one, called an I P address — that's INTERNET PROTOCOL address. It works like a house address for computers: a set of numbers that says exactly where to deliver. Your phone has one right now."},
     {e:"📖", t:"DNS = Domain Name System.",
      x:"So who translates the name you typed into the number address? A service called D N S — the DOMAIN NAME SYSTEM. It's the internet's phonebook: name goes in, number address comes out, in a few milliseconds. This happens for every site, every single time, and you've never noticed it. Now you know one of the internet's secret services by name."},
     {check:{t:"DNS's job is to...", spoken:"Quick check. What is the Domain Name System's job?",
       opts:[{e:"📖",l:"TURN NAMES INTO NUMBER ADDRESSES",ok:true},{e:"📦",l:"CARRY THE DATA",no:"Routers do the carrying. D N S is the phonebook you check BEFORE the trip. Again."},{e:"🎨",l:"DRAW THE WEBSITE",no:"Your browser draws the page — at the very end. D N S works at the very start. Again."}],
       yes:"The phonebook. Name in, I P address out, journey begins."}},
     {e:"✂️", t:"Your data gets chopped into packets.",
      x:"Now the weird part. Your data does NOT travel in one piece. It gets chopped into thousands of little chunks called PACKETS, and each packet races across the internet ON ITS OWN. One photo can be a thousand packets, each finding its own way. Why on earth would the internet work like that? Great question."},
     {e:"🚗", t:"Why packets? Small cars beat one big truck.",
      x:"Imagine moving your house with one giant truck: if it breaks down, EVERYTHING is stuck. Now imagine a thousand small cars: they weave through traffic, take different roads around jams... and if ONE car crashes, you resend just that one box — not the whole house. That's packets. Flexible, fast, and unstoppable."},
     {e:"🚦", t:"Routers — the traffic circles.",
      x:"At every crossroads of the internet sits a ROUTER — a little machine whose only job is reading each packet's address and shoving it in the right direction. Your home WiFi box? That's a router — the first traffic circle of every journey from your house. Hop, hop, hop — each router passes your packet closer."},
     {e:"🧩", t:"Rebuilt at the other end.",
      x:"At the destination, the packets get put back together in order — like numbered puzzle pieces. And if piece number seven never showed up? The receiver just says: resend seven, please! — and only that piece travels again. That little trick is why the internet keeps working even when parts of it fail."},
     {check:{t:"Why does data travel as many small packets?", spoken:"Check! Why does the internet chop your data into many small packets?",
       opts:[{e:"🚗",l:"FLEXIBLE ROUTES + RESEND JUST THE LOST BIT",ok:true},{e:"🎀",l:"IT LOOKS TIDIER",no:"Nobody sees them — it's about taking many roads and resending only what's lost. Again."},{e:"💸",l:"BIG FILES COST EXTRA",no:"No packet tax! It's about flexibility: many roads, and resend only the lost piece. Again."}],
       yes:"Many small cars: different roads, and if one is lost, resend just that one. The internet's smartest trick."}},
     {e:"🌊", t:"Yes — the ocean floor.",
      x:"How do packets cross between continents? Real CABLES lying on the OCEAN FLOOR — hundreds of them, thick as a garden hose, carrying most of the world's internet as light in glass fibers. Ships lay them. Submarines fix them. Sharks have literally bitten them. Your messages to far-away places ride the bottom of the sea."},
     {e:"⏳", t:"Why the spinner spins.",
      x:"So when you see the loading spinner — nothing is broken. Your request is TRAVELING: phonebook lookup, packets, routers, maybe the ocean floor, then the whole answer traveling back. A far server means a longer round trip. A near one feels instant. Distance is real, even online — and now you know every step of the trip."},
     {check:{t:"The spinner is spinning. What's ACTUALLY happening?", spoken:"Last check. The spinner is spinning. What is actually happening?",
       opts:[{e:"✈️",l:"THE ANSWER IS STILL TRAVELING",ok:true},{e:"🤔",l:"THE PHONE IS THINKING HARD",no:"Your phone finished asking ages ago — it's waiting for the answer to travel back. Again."},{e:"😤",l:"THE APP IS SULKING",no:"Apps don't sulk. Data travels. Sometimes across the literal ocean floor. Again."}],
       yes:"Traveling. Name to number, packets to routers, maybe under an ocean — and all the way back. Give it a second. It's earned it."}},
   ]},
  ]},
{ id:"orange2", name:"ORANGE BELT", concept:"WHAT APPS ARE MADE OF", beltEmoji:"🟠", color:"#EE9A5C",
  skills:["organs","journey","crew"], testN:6, testPass:5,
  lessons:[
   { title:"THE FOUR ORGANS", emoji:"🧩", slides:[
     {e:"🧩", t:"Every app is four parts.",
      x:"You know machines. You know the internet. Now — what exactly IS an app? Every app you love, no matter how different they look, has the same four organs inside. The FRONTEND you see and touch. The BACKEND thinking far away. The DATABASE remembering everything. And the API — the messenger sprinting between them. Learn these four, and no app is ever a mystery again."},
     {e:"📱", t:"Frontend: everything you see.",
      x:"Buttons, colors, animations, the keyboard, the loading spinner — if your eyes see it or your finger touches it, that's FRONTEND, living right on your device. The play button on a video app? Frontend. The chat bubbles in a messages app? Frontend. It's the app's face — and like a face, it's maybe ten percent of the whole body."},
     {e:"🖥️", t:"Backend: the far-away brain.",
      x:"The other ninety percent thinks on servers, far away — the BACKEND. Checking your password. Choosing which video to recommend next. Matching you against players your level. Counting likes from the whole planet. Your phone alone can't know what millions of other people are doing — the backend can, because everyone's asks flow through it."},
     {check:{t:"Who DECIDES which video you see next?", spoken:"Check! Who decides which video gets recommended to you next?",
       opts:[{e:"🖥️",l:"THE BACKEND",ok:true},{e:"📱",l:"THE FRONTEND",no:"The frontend just SHOWS the recommendation. The choosing needs to know what millions watched — that's far-away brain work. Again."},{e:"🔊",l:"THE SPEAKER",no:"The speaker plays sound. It has no opinions about videos. Again."}],
       yes:"The backend — it watches what the whole world watches, then picks for you."}},
     {e:"🗄️", t:"Database: the forever memory.",
      x:"Your score, your friends list, every comment ever posted — the DATABASE keeps it all safe. Even when your phone is off. Even if your tablet takes a bath. You met databases as an idea — next belt, you'll learn to speak to them. For now: the database is where anything that must SURVIVE gets written down."},
     {check:{t:"Your high score lives FOREVER in the...", spoken:"Check! Your high score has to survive forever. Which organ keeps it?",
       opts:[{e:"🗄️",l:"THE DATABASE",ok:true},{e:"📱",l:"THE FRONTEND",no:"The frontend SHOWS the score — but showing isn't remembering. Again."},{e:"⏳",l:"THE SPINNER",no:"The spinner just spins. It remembers absolutely nothing. Again."}],
       yes:"The database. Forever is its whole job."}},
     {e:"📨", t:"API = Application Programming Interface.",
      x:"And the fourth organ, with the fanciest name: A P I — APPLICATION PROGRAMMING INTERFACE. Forget the long words; remember the WAITER. At a restaurant, you don't walk into the kitchen — you tell the waiter, the waiter tells the kitchen, the food comes back on a tray. The API is the waiter between frontend and backend."},
     {e:"📜", t:"The API is also the menu.",
      x:"And like a restaurant, there's a MENU: the API is an agreement about exactly what you may ask for and what you'll get back. Send me this user's photos. Post this comment. Give me the new messages. Apps can't ask for just anything — only what's on the menu. That agreement is why millions of phones and servers understand each other perfectly."},
     {check:{t:"The messenger between frontend and backend is the...", spoken:"Check! What's the messenger that carries asks and answers between the frontend and the backend?",
       opts:[{e:"📨",l:"THE API — THE WAITER",ok:true},{e:"📶",l:"THE WIFI",no:"WiFi is the ROAD the messenger travels on. The messenger itself, with the menu of allowed asks, is the API. Again."},{e:"🗄️",l:"THE DATABASE",no:"The database remembers — it doesn't run messages. That's the API. Again."}],
       yes:"The API — Application Programming Interface. The waiter, with the menu."}},
     {e:"🎬", t:"One tap, all four organs.",
      x:"Watch them work together. You tap the heart on a friend's photo. FRONTEND: shows the heart turning red instantly. API: carries 'this kid liked that photo' to the servers. BACKEND: adds one to the count, checks it's allowed. DATABASE: writes it down forever. Your friend's phone asks the API for news... and sees plus one. Every tap you have ever made took that exact trip."},
     {e:"🔭", t:"Now you can dissect any app.",
      x:"Try it as a game: pick any app you know and name its organs. A video app: frontend is the player, backend picks recommendations, database holds every video and view count. A chat app: frontend is the bubbles, backend routes messages, database remembers every chat. Works every time — four organs, always. The arena's open: go ride some taps."},
   ]},
   { title:"THE CREW + UPDATE DAY", emoji:"👷", slides:[
     {e:"👷", t:"Apps are built by crews.",
      x:"Here's who actually builds these things — a real app team. The DESIGNER decides how it looks and feels, every color and corner. The FRONTEND DEVELOPER builds the part you touch. The BACKEND DEVELOPER builds the far-away brain. The DATA ENGINEER guards the database. The P M — project manager — decides what gets built next. And the TESTER... tries to break everything. On purpose. Every day. It's their actual job."},
     {e:"🎨", t:"A day in their lives.",
      x:"The designer is sketching three versions of one button and arguing about which blue feels friendlier. The frontend dev is making an animation feel bouncy. The backend dev is making one server answer a thousand asks at once without sweating. The data engineer is making sure not one single high score EVER gets lost. Different crafts — one app."},
     {e:"🔗", t:"Nobody works alone.",
      x:"The designer's gorgeous button? Does nothing without backend code wired behind it — a doorbell connected to nothing. The backend? Has nothing to say without the database. The tester needs all of them to build something worth breaking. Every part needs every other part. Apps are a team sport, all the way down."},
     {check:{t:"Who tries to BREAK the app on purpose?", spoken:"Check! Someone on the crew breaks the app on purpose, every day. Who?",
       opts:[{e:"🧪",l:"THE TESTER",ok:true},{e:"🎨",l:"THE DESIGNER",no:"The designer makes it lovely — someone else does the smashing. Again."},{e:"🦹",l:"A VILLAIN",no:"Ha — no villains needed. The team hires their own breaker. Again."}],
       yes:"The tester — breaking it in private, so it never breaks on you."}},
     {e:"🚀", t:"Why apps update: the honest list.",
      x:"That UPDATE button appears for three reasons. One: BUG FIXES — the crew found broken bits, hopefully before you did. Two: NEW FEATURES — the P M's list never ends. Three — and this one matters: SECURITY PATCHES."},
     {e:"🔐", t:"Security patches — the quiet heroes.",
      x:"Sometimes someone discovers a HOLE in an app — a sneaky way in that the builders never intended. When that happens, the crew races to patch it before bad actors can use it, and ships the fix as an update. That's why grown-ups say keep your apps updated: an old app is a house with a known unlocked window."},
     {check:{t:"Why is UPDATING apps actually important?", spoken:"Check! Why is keeping your apps updated genuinely important?",
       opts:[{e:"🔐",l:"UPDATES PATCH SECURITY HOLES",ok:true},{e:"🎨",l:"NEW ICONS ARE PRETTIER",no:"Sometimes true, never the point. The patches closing sneaky holes are the point. Again."},{e:"💾",l:"OLD APPS GET DUSTY",no:"Digital things don't dust. But their unpatched holes stay open. Again."}],
       yes:"Security patches. An updated app is a house with its windows locked."}},
     {e:"📦", t:"How an update reaches you.",
      x:"The crew finishes version two point one. It goes to the APP STORE, which checks it over. Then it rolls out — often to a small group of phones first, and if nothing explodes, to everyone. That's why your friend sometimes gets a feature a few days before you: they were in the taste-test group."},
     {e:"♾️", t:"Never finished. Currently shipped.",
      x:"Here's the truth about all software: it is never, ever DONE. There's always a bug to fix, a feature to add, a hole to patch. The crew ships the best current version, then keeps building. Remember that when we reach the debugging belt — it's the whole reason that belt exists."},
   ]},
  ]},
{ id:"green2", name:"GREEN BELT", concept:"DATABASES", beltEmoji:"🟢", color:"#6CC48F",
  skills:["tables","dbmatch","pickcol"], testN:6, testPass:5,
  lessons:[
   { title:"THE MEMORY OF THE WORLD", emoji:"🗄️", slides:[
     {e:"🗄️", t:"Databases remember everything.",
      x:"Every score, every message, every photo, every account on Earth lives in a DATABASE — the most under-famous invention in all of tech. Nobody makes movies about databases. But delete them all, and every app on the planet wakes up with no memory tomorrow. Time you two met properly."},
     {e:"📋", t:"Tables: rows and columns.",
      x:"A database keeps TABLES — grids with a perfect memory. Each ROW is one thing's whole entry: one pet, one player, one pizza order. Each COLUMN is one kind of info for everyone: every name, every age, every price. Row is the WHO, columns are the WHAT-ABOUT-THEM. That's the whole grammar of data."},
     {check:{t:"One ROW in the pets table is...", spoken:"Check! In a table of pets — what is one row?",
       opts:[{e:"🐶",l:"ONE PET'S WHOLE ENTRY",ok:true},{e:"📊",l:"ONE KIND OF INFO",no:"That's a COLUMN — everyone's age, everyone's name. A row is one whole pet. Again."},{e:"🚣",l:"A TINY BOAT",no:"Different kind of row, sailor. Again."}],
       yes:"One row, one pet — name, species, age, the works."}},
     {e:"💪", t:"A spreadsheet with superpowers.",
      x:"You might think: that's just a spreadsheet! Close — a database is a spreadsheet with SUPERPOWERS. It can hold a BILLION rows without breaking a sweat. A thousand people can write to it at the same instant without overwriting each other. And it enforces RULES — no pet without a name, no order without an address. Spreadsheets trust you. Databases check you."},
     {e:"📱", t:"One is in your pocket. Right now.",
      x:"A tiny database called S Q LITE lives inside your phone THIS SECOND, holding your texts, contacts, and settings. It's also inside cars, TVs, and airplanes — S Q Lite is quietly the most-installed piece of software on Earth. You've carried a database for years without knowing its name. Now you know its name."},
     {check:{t:"The tiny database inside your phone is called...", spoken:"Check! The tiny database living inside your phone right now — what's it called?",
       opts:[{e:"📱",l:"SQLITE",ok:true},{e:"🐘",l:"POSTGRES",no:"Postgres is one of the BIG engines, running websites — the pocket-sized one is S Q Lite. Again."},{e:"📦",l:"DROPBOX",no:"That's a cloud storage app — the little database engine is S Q Lite. Again."}],
       yes:"SQLite — the most-installed software on Earth, and it lives in your pocket."}},
     {e:"🌍", t:"The big engines: Postgres and MySQL.",
      x:"When apps need SERIOUS memory, they run big database engines on their servers. The two most famous: POSTGRES and MY S Q L. Between them they hold up half the internet — shops, games, schools, banks. When you make an account almost anywhere, odds are a Postgres or MySQL table just got a new row: you."},
     {e:"📦", t:"MongoDB — the flexible one.",
      x:"One more name for your collection: MONGO D B. Instead of strict grids, it stores flexible boxes of stuff — handy when every entry looks a bit different. Strict grids or bendy boxes: real engineers argue about this choice constantly. Now you can nod along knowingly."},
     {e:"🗣️", t:"SQL = Structured Query Language.",
      x:"See those letters S Q L everywhere? They stand for STRUCTURED QUERY LANGUAGE — the special language humans use to ask databases questions. It's almost English: SELECT, FROM, WHERE. Next lesson, you'll read some real S Q L yourself. Yes, really. It's easier than you think."},
     {check:{t:"SQL is a language for...", spoken:"Check! S Q L is a language for doing what?",
       opts:[{e:"🗣️",l:"ASKING DATABASES QUESTIONS",ok:true},{e:"🎨",l:"DRAWING BUTTONS",no:"Buttons are frontend work. S Q L talks to the memory. Again."},{e:"🌐",l:"BUILDING WIFI",no:"No wires, no waves — S Q L asks data questions. Again."}],
       yes:"Asking databases questions — Structured Query Language. You'll read some next lesson."}},
     {e:"❤️", t:"Under every app you love...",
      x:"...there's a database working. Your game inventory? Rows in a table. Your class photos? Rows. Your chat history? Rows. The apps come and go and change their looks — the tables underneath quietly remember everything. Next lesson: how to ASK them things. The arena's open first — go read some tables like a pro."},
   ]},
   { title:"ASK THE DATA ANYTHING", emoji:"🔍", slides:[
     {e:"🔍", t:"Queries: questions for data.",
      x:"A QUERY is a question you ask a database. Show me every player above level nine. Which pet is oldest? How many orders came in today? The database answers across MILLIONS of rows — in milliseconds. Learning to ask good questions of data is a real superpower, and today you start."},
     {e:"🗣️", t:"Real SQL. Ready?",
      x:"Here's an actual S Q L question: SELECT name FROM pets WHERE age is greater than five. Read it slowly... it's nearly English! Select the names, from the pets table, where the age is over five. The database reads that and hands back exactly those rows. You can already read the language of data. Told you it was easier than it sounds."},
     {check:{t:"SELECT name FROM pets WHERE age > 5 gives you...", spoken:"Check! Select name, from pets, where age is greater than five. What comes back?",
       opts:[{e:"🐕",l:"NAMES OF PETS OLDER THAN 5",ok:true},{e:"🐣",l:"THE YOUNGEST PETS",no:"Read the WHERE part again — age GREATER than five. The old-timers. Again."},{e:"🍕",l:"A PIZZA",no:"Wrong table entirely. Again."}],
       yes:"The names of pets older than five. You just read real S Q L."}},
     {e:"📖", t:"How it answers so fast: the index.",
      x:"How does a database search a billion rows in milliseconds? The same trick as a book INDEX. You don't read a whole book to find one topic — you check the index and jump straight to the page. Databases keep indexes on important columns, so they jump instead of reading everything. Simple idea. Superpower speed."},
     {check:{t:"A database finds things fast using...", spoken:"Check! What's the trick a database uses to find things incredibly fast?",
       opts:[{e:"📖",l:"AN INDEX — JUMP STRAIGHT THERE",ok:true},{e:"🏃",l:"READING EVERY ROW SUPER FAST",no:"Even fast reading of a billion rows is slow. The index means it barely reads at all — it JUMPS. Again."},{e:"🔮",l:"GUESSING",no:"Databases never guess. They jump — using the index, like a book's index page. Again."}],
       yes:"An index — jump straight to the right rows, like the index page of a book."}},
     {e:"⚡", t:"When apps feel instant...",
      x:"...you're feeling a database being excellent at its job. Log in, and your account gets found among two billion accounts in milliseconds — a query, an index, a jump. Now you know what's actually happening in that instant. It is genuinely showing off."},
     {e:"🧯", t:"Backups: memory that survives fire.",
      x:"Databases are too important to exist in one place. So they COPY themselves — to other machines, even to data centers in other cities. If a server dies, or a whole building floods, the copies carry on like nothing happened. Your score could survive an actual fire. That's how seriously the world takes its memory."},
     {e:"👻", t:"Data outlives the app.",
      x:"And now the lesson to remember FOREVER. Delete an app from your phone... and your account still exists — far away, in the database, backed up in three cities. The delete button on your screen does not reach the server. Which means: the internet remembers. So think BEFORE you post, not after. That's not a scary rule — it's just how the machinery works, and now you know it."},
     {check:{t:"You delete the app. Your account...", spoken:"Check. You delete the app from your phone. What happens to your account?",
       opts:[{e:"🗄️",l:"STILL LIVES IN THE DATABASE",ok:true},{e:"💨",l:"VANISHES FOREVER",no:"Your phone only deleted its own copy. The server never even noticed. Again."},{e:"🗑️",l:"HIDES IN THE TRASH",no:"Not in your trash — in a data center, far away, with backups. Again."}],
       yes:"Still there, on the server, with copies. Screens forget. Databases don't."}},
     {e:"🛡️", t:"Who guards all this memory?",
      x:"Data engineers guard the tables — and strict rules decide WHO may read WHAT. Your messages aren't readable by any random person at the company; permissions fence the data in. Good apps treat your rows like treasure. And now that you can read tables, write a little S Q L, and know where the memory lives... the arena awaits, data engineer."},
   ]},
  ]},
{ id:"blue2", name:"BLUE BELT", concept:"REAL CODE", beltEmoji:"🔵", color:"#7FA9DB",
  skills:["pyread","pyfill","pyfork"], testN:6, testPass:5,
  lessons:[
   { title:"HELLO, REAL CODE", emoji:"💬", slides:[
     {e:"⌨️", t:"Time. Actual code.",
      x:"Everything so far — the machine, the internet, the organs of an app — was the map. Today you write the territory. Real syntax, in a real terminal, really running. First, one big idea, then your first line. Ready? You're ready."},
     {e:"🗣️", t:"What a programming language IS.",
      x:"A PROGRAMMING LANGUAGE is a deal between humans and machines: words simple enough for the machine to follow exactly, but readable enough for humans to write. Not English — English is too fuzzy for a machine that never guesses. Not ones and zeros — that's too brutal for humans. Something perfectly in between."},
     {e:"🐍", t:"Meet the language family.",
      x:"There are many languages, each with a specialty. PYTHON — the friendliest start, and the style you're learning here. JAVASCRIPT — lives inside every webpage on Earth. LUA — Roblox games are written in it! JAVA — Minecraft and Android apps. SWIFT — iPhone apps. C PLUS PLUS — the heavy machinery: big games, robots, rockets."},
     {check:{t:"Roblox games are written in...", spoken:"Check! Roblox games are mostly written in which language?",
       opts:[{e:"🎮",l:"LUA",ok:true},{e:"🐍",l:"PYTHON",no:"Python is your friendly starter language — Roblox runs on Lua. Yes, you now know something most Roblox players don't. Again."},{e:"☕",l:"JAVA",no:"Java is Minecraft's language! Roblox speaks Lua. Again."}],
       yes:"Lua. Casually mention that to a Roblox friend and watch their face."}},
     {e:"💬", t:'print("hi")',
      x:"Your first real line. print is an instruction: put this on the screen. The round brackets hold WHAT to print. The quotes say: these are words, exactly as written. Every coder on Earth started with this exact line. Every single one. Today it's your turn."},
     {e:"🔤", t:"Quotes = words. No quotes = trouble.",
      x:"Write print, and in quotes, pizza — the terminal says pizza. Forget the quotes, and the machine goes hunting for a BOX named pizza, finds nothing, and throws an error. Quotes matter. A lot. Half of all beginner errors are just missing quotes — you've been warned, and you'll see it live in the arena."},
     {e:"➕", t:'print("ha" + "ha") → haha',
      x:"With words, plus is GLUE. Two ha's glue into haha — no space appears unless you put one inside the quotes yourself. The machine does exactly what you wrote. Never what you meant. Tattoo that on your brain: exactly what you WROTE."},
     {check:{t:'print("boom") shows...', spoken:"Check! print, and in quotes, boom. What appears in the terminal?",
       opts:[{e:"💥",l:"boom",ok:true},{e:"✏️",l:'"boom" — QUOTES AND ALL',no:"The quotes are for the machine, not the screen. They never get printed. Again."},{e:"🖨️",l:"print",no:"print is the instruction, not the message. Again."}],
       yes:"Just boom. The quotes stay behind the curtain."}},
     {e:"🔦", t:"Why print is the coder's flashlight.",
      x:"Here's why print matters more than it looks: it's how coders SEE inside a running program. Something acting weird? Print the score — see what's really in there. Even professionals with twenty years of experience still print things to check. It's the flashlight every coder carries. You just picked yours up."},
     {check:{t:"Coders use print mostly to...", spoken:"Check! Why do even professional coders use print all the time?",
       opts:[{e:"🔦",l:"SEE INSIDE THE PROGRAM",ok:true},{e:"🖨️",l:"USE THE PRINTER",no:"No paper involved! print writes to the screen — it's the flashlight for looking inside a program. Again."},{e:"🎵",l:"MAKE SOUNDS",no:"Silent flashlight. It shows values on screen. Again."}],
       yes:"To see inside — the coder's flashlight, from day one to year twenty."}},
     {e:"🖥️", t:"Your terminal awaits.",
      x:"In the playground there's now a REAL terminal with your name on it — type code, run it, break it, nobody minds. Breaking things there is encouraged, actually. And the practice arena opens after these lessons. Let's write."},
   ]},
   { title:"BOXES, BUT REAL", emoji:"📦", slides:[
     {e:"📦", t:"score = 7",
      x:"Memory boxes, real syntax. score, equals, seven — that MAKES a box called score with seven inside. One equals sign means: STORE this. Coders call these boxes VARIABLES — because what's inside can VARY. The name stays; the contents change. Remember both words: box for the feeling, variable for the dinner table."},
     {e:"🏷️", t:"Names matter. Rules apply.",
      x:"Coders choose CLEAR names: score, lives, player_name. Two real rules: no spaces allowed — so high score becomes high underscore score — and pick names that say what's inside. A box called x works... but a box called score means you'll still understand your own code next week. Future-you says thanks."},
     {check:{t:"Which is a LEGAL box name?", spoken:"Check! Which of these is a legal variable name?",
       opts:[{e:"✅",l:"high_score",ok:true},{e:"🚫",l:"high score",no:"There's a space hiding in there — the machine reads that as TWO things. Join it with an underscore. Again."},{e:"❓",l:"7score... maybe?",no:"Starting with a number confuses the machine. Letters first. Again."}],
       yes:"high_score — no spaces, clear meaning. A name future-you will thank you for."}},
     {e:"🏷️", t:'name = "Zoe"',
      x:"Boxes hold words too — with quotes. And then: print, quote hi space quote, plus name — the terminal says hi Zoe. print OPENS the box and uses what's inside. The box name has no quotes; the word going in does. That difference is everything."},
     {e:"🧵", t:'The real word for text: STRING.',
      x:"Time for the professional word. Text in quotes is called a STRING — a string of characters, like beads on a thread. So a variable holds either a NUMBER, for math, or a STRING, for words. Ask any coder what a string is — this is that. Your vocabulary is getting dangerous."},
     {check:{t:'"hello" is officially called a...', spoken:"Check! Text in quotes — what do coders officially call it?",
       opts:[{e:"🧵",l:"A STRING",ok:true},{e:"📜",l:"A SENTENCE",no:"The machine doesn't do grammar — characters on a thread are a STRING. Again."},{e:"🔤",l:"A WORDBLOB",no:"Ha — sadly not. It's a string. Again."}],
       yes:"A string — characters like beads on a thread. Professional vocabulary unlocked."}},
     {e:"🔄", t:"score = score + 1",
      x:"The most famous line in video games. Take what's in score, add one, store it BACK into score. Every coin grabbed, every zap landed, every point ever scored in every game ever made — this exact line was running somewhere. It reads weird at first — score equals itself plus one?! — but remember: one equals sign just means STORE."},
     {check:{t:"score = 4, then score = score + 1. Now the box holds...", spoken:"Check! score equals four. Then: score equals score plus one. What's in the box now?",
       opts:[{e:"5️⃣",l:"5",ok:true},{e:"4️⃣",l:"4",no:"The second line updated the box — old value out, new value in. Again."},{e:"🔢",l:"41",no:"Ha — no gluing here! Both are real numbers, so real math. Again."}],
       yes:"Five. The box always keeps the newest value."}},
     {e:"🧠", t:"Numbers add. Strings glue.",
      x:"Three plus four is seven. But quote-three plus quote-four is... thirty-four! A number in quotes isn't a number — it's a STRING in a number costume. This exact mix-up trips up real professional programmers on real projects. Not you though. You met it on day two."},
     {e:"🌍", t:"Variables are running your life.",
      x:"Right now, all around you: the volume level — a variable. The battery percent — a variable. Your name in every app, the brightness, the time on the clock — variables, changing values in named boxes, millions of them, all day. You now know what the world's information is stored in. Arena time."},
   ]},
   { title:"THE FORK: if / else", emoji:"🔱", slides:[
     {e:"🔱", t:'if password == "otter":',
      x:"The last piece of your starter kit: teaching the machine to CHOOSE. This is the fork, in real syntax. IF, then a rule, then a colon. The line under it — pushed in with spaces — runs ONLY if the rule is true. That pushing-in is called INDENTING, and it shows the machine exactly what belongs to the if."},
     {e:"⚖️", t:"== asks. = stores.",
      x:"Look closely at those TWO equals signs — they're the whole trick. One equals sign STORES into a box. Two equals signs ASK a question: are these the same? Store with one. Ask with two. Mixing them up is the most classic beginner slip in all of coding — and you're now vaccinated against it."},
     {check:{t:"Which one ASKS a question?", spoken:"Check! Which one asks — are these two things the same?",
       opts:[{e:"⚖️",l:"== TWO EQUALS",ok:true},{e:"📦",l:"= ONE EQUALS",no:"One equals STORES into the box. The question-asker is the double. Again."},{e:"➕",l:"THE PLUS",no:"Plus adds and glues. The asker is the double equals. Again."}],
       yes:"Double equals asks. Single stores. Vaccinated."}},
     {e:"🔀", t:"else: — the other path.",
      x:"else, colon, its own indented line. Rule true? The if-path runs. Rule false? The else-path runs. One rule, two doors — and the machine walks through EXACTLY one, every single time. It cannot take both, and it cannot take neither. Certainty is kind of the machine's whole thing."},
     {check:{t:"power = 3. if power > 5: mega, else: mini. Which prints?", spoken:"Check! power is three. If power is bigger than five, print mega. Else, print mini. Which one prints?",
       opts:[{e:"🐜",l:"mini",ok:true},{e:"💪",l:"mega",no:"Three is not bigger than five — the if-door stays shut, the else-door opens. Again."},{e:"👯",l:"BOTH",no:"Never both! One rule, one door, one path. Again."}],
       yes:"mini. Three lost to five, so else took over."}},
     {e:"🌡️", t:"> and < compare numbers.",
      x:"Greater-than and less-than handle the number rules. If temp is greater than twenty-five: print shorts. Else: print jacket. If lives is less than one: game over. Numbers on both sides, one honest comparison in the middle."},
     {e:"🎮", t:"Forks are running your games right now.",
      x:"Every game you play is a waterfall of forks. IF health equals zero: game over screen. IF coins are greater than ninety-nine: unlock the golden skin. IF the password matches: door opens. Thousands of these run every second of gameplay — and you can now READ every one of them."},
     {e:"🏠", t:"Forks run your house, too.",
      x:"IF battery is under twenty: switch to low power mode. IF the clock hits seven: ring the alarm. IF the room is dark: brighten the screen. Even parents run on forks: IF homework is done... THEN games. You've been living inside if-else statements your whole life. Now you can write them."},
     {check:{t:"IF health == 0, a game usually...", spoken:"Check! In a game: if health equals zero, then what usually happens?",
       opts:[{e:"💀",l:"GAME OVER SCREEN",ok:true},{e:"🎉",l:"CONFETTI PARTY",no:"That's the if-you-WIN fork. Zero health takes the sadder path. Again."},{e:"😴",l:"NOTHING AT ALL",no:"The fork always picks a path — and zero health picks the dramatic one. Again."}],
       yes:"Game over — the most famous if-statement in gaming history."}},
     {e:"🧰", t:"Your starter kit is complete.",
      x:"Look what you're carrying now: print to see inside, variables to remember, strings and numbers, and forks to choose. Sequences plus boxes plus choices — that is genuinely the core of ALL programming. Everything else is these three ideas wearing fancier costumes. The arena's open. Go fork some paths."},
   ]},
  ]},
{ id:"purple2", name:"PURPLE BELT", concept:"DEBUGGING", beltEmoji:"🟣", color:"#A98FE0",
  skills:["errfix","verorder"], testN:6, testPass:5,
  lessons:[
   { title:"ERRORS ARE CLUES", emoji:"🐛", slides:[
     {e:"🦋", t:"The first bug was a real moth.",
      x:"True story, and worth telling right. 1947, Harvard University — a computer the size of a room suddenly stops working. The engineers open panel after panel... and find an actual MOTH squashed inside a relay. They tape the moth into their logbook and write: first actual case of bug being found. It's still in a museum. Computer mistakes have been BUGS ever since."},
     {e:"👑", t:"Meet Amazing Grace.",
      x:"The most famous engineer on that team: GRACE HOPPER — a Navy admiral they called Amazing Grace. Her bigger gift to you: she believed humans should write code in almost-English words, and machines should translate it themselves — the idea behind the COMPILER. Every friendly language you'll ever use, including the one you're learning, walks through the door she opened."},
     {check:{t:"The FIRST computer bug was...", spoken:"Check! The very first computer bug in history was...",
       opts:[{e:"🦋",l:"AN ACTUAL MOTH",ok:true},{e:"🦠",l:"A COMPUTER VIRUS",no:"Viruses came decades later. This was a real insect with real wings, taped into a real logbook. Again."},{e:"⌨️",l:"A TYPO",no:"Typos cause most bugs TODAY — but the original was a genuine moth in the machine. Again."}],
       yes:"A real moth, taped into the logbook in 1947. Best origin story in tech."}},
     {e:"🚨", t:"An error is not an insult.",
      x:"When the terminal prints an error, it isn't angry at you. It's POINTING: this line, this name, this problem. Beginners feel embarrassed and look away. Professionals lean IN and read it like a treasure map — because the error message is the machine doing its best to help."},
     {e:"🧭", t:"Read it: line, name, hint.",
      x:"Line 2 — I don't know scor. Did you mean score? That one sentence gives you the WHERE, the WHAT, and practically hands you the fix. And a comforting secret: ninety percent of all bugs are typos, missing quotes, or a missing colon. You've personally met all three already."},
     {e:"🕵️", t:"The three species of bug.",
      x:"Bugs come in three species. SYNTAX bugs: you wrote something the machine can't even read — it stops immediately. NAME bugs: you asked for a box that doesn't exist. And the sneakiest of all... LOGIC bugs: the code runs PERFECTLY, no error anywhere — but it does the wrong thing. Wrong direction in a rule, plus where there should be minus. No alarm rings. Only a human can catch those."},
     {check:{t:"The SNEAKIEST kind of bug shows...", spoken:"Check! The sneakiest kind of bug — the logic bug — what does the terminal show when it strikes?",
       opts:[{e:"😶",l:"NO ERROR AT ALL",ok:true},{e:"🚨",l:"A BIG RED WARNING",no:"That's the EASY kind! Logic bugs run silently and just... do the wrong thing. Again."},{e:"💥",l:"THE APP EXPLODES",no:"No explosion, no message, nothing — the code runs fine and lies to you. That's why it's the sneaky one. Again."}],
       yes:"No error at all — the code runs and quietly does the wrong thing. Only humans catch those."}},
     {e:"🔁", t:"Guess. Check. Fix ONE thing. Run.",
      x:"The debugging loop, used by every programmer alive: GUESS what's wrong. CHECK your guess — print something and look! FIX one single thing. RUN it again. One thing at a time is the discipline — change five things at once and you'll never know which one mattered."},
     {e:"🦆", t:"The rubber duck trick. Really.",
      x:"And the strangest real technique in software: RUBBER DUCK DEBUGGING. Stuck? Explain your code, line by line, OUT LOUD... to a rubber duck. Saying it aloud forces your brain to slow down, and you hear the bug yourself — the duck never says a word. Professional programmers keep actual ducks on actual desks for this. I am not making this up."},
     {check:{t:"Why explain your code to a DUCK?", spoken:"Check! Why would a programmer explain their code to a rubber duck?",
       opts:[{e:"🗣️",l:"SAYING IT ALOUD REVEALS THE BUG",ok:true},{e:"🦆",l:"DUCKS ARE CODING EXPERTS",no:"The duck knows nothing. That's the point — YOUR brain does the work when you slow down and say it aloud. Again."},{e:"🍀",l:"DUCKS ARE LUCKY",no:"No luck involved — explaining out loud makes your own brain catch the mistake. Again."}],
       yes:"Saying it out loud slows your brain down until the bug reveals itself. The duck just listens."}},
     {e:"💪", t:"Bug hunters run the world.",
      x:"Here's the real secret of this belt: the best programmers aren't the ones who never write bugs — those people don't exist. They're the best BUG HUNTERS. Calm, curious, one fix at a time. The arena is full of broken code that needs you. Go read some clues, detective."},
   ]},
   { title:"HOW REAL SOFTWARE SHIPS", emoji:"🚢", slides:[
     {e:"🚢", t:"Nobody writes it perfect.",
      x:"Not beginners. Not professionals. Not the people who built your favorite game. NOBODY writes correct code on the first try. Real software gets written, tested, broken, fixed, and tested again — on purpose, every day, at every tech company on Earth. This lesson is how that machine works."},
     {e:"🧪", t:"Test before you ship.",
      x:"Before an update ever reaches your tablet, it gets hammered — testers tap every button and try every silly thing, AND robot testers run THOUSANDS of automated checks on every single change: does login still work? Does the score still count? A human wrote each of those checks once — the robots re-run them forever. What survives, ships."},
     {check:{t:"Robot testers are...", spoken:"Check! What are the robot testers?",
       opts:[{e:"🤖",l:"AUTOMATED CHECKS RUN ON EVERY CHANGE",ok:true},{e:"🦾",l:"ACTUAL METAL ROBOTS TAPPING SCREENS",no:"Ha — cheaper than that. They're programs that re-check thousands of things automatically. Again."},{e:"👾",l:"VIDEO GAME ENEMIES",no:"Different robots. These ones protect quality, thousands of checks at a time. Again."}],
       yes:"Automated checks — written once, re-run on every change, forever. Tireless."}},
     {e:"🔢", t:"Version numbers, decoded.",
      x:"Ever seen version two point four point one and wondered what it means? It's a code: BIG number — huge changes. MIDDLE number — new features. LAST number — tiny fixes. So two point four point one is: second big era, fourth feature batch, first patch. Go look up your favorite app's version tonight — you'll be able to READ it."},
     {e:"1️⃣", t:"Version 1.0 is a beginning.",
      x:"And one point oh is never the end — it's the FIRST SURVIVOR. Then one point one fixes what users found. Two point oh brings the big ideas. Software is never finished. It's just... currently shipped."},
     {e:"🐤", t:"Updates roll out to taste-testers first.",
      x:"When an update ships, it usually doesn't go to everyone at once. It goes to a SMALL group of phones first — the taste-testers. If nothing explodes for them, it rolls out to the world. That's why your friend sometimes gets a feature days before you. You weren't snubbed. You were just... not the experiment."},
     {check:{t:"Why do updates hit a FEW phones first?", spoken:"Check! Why do updates go to a small group of phones first?",
       opts:[{e:"🐤",l:"IF IT BREAKS, IT BREAKS SMALL",ok:true},{e:"🏆",l:"THOSE PHONES ARE FANCIER",no:"Nothing fancy about them — they're the taste-test. A bug caught there stays small. Again."},{e:"🐌",l:"THE INTERNET IS TOO SLOW",no:"The internet could handle it — the careful crew chooses not to risk everyone at once. Again."}],
       yes:"So a hidden bug hurts a few phones, not millions. Careful beats fast."}},
     {e:"💻", t:"'It works on MY machine!'",
      x:"The most famous sentence in software. A feature works perfectly on the coder's computer... and breaks on yours. Why? Because every device is a little different — different O S versions, languages, screen sizes, old batteries. That's exactly why teams test on MANY machines before shipping. Say the sentence to any programmer and watch them laugh, then sigh."},
     {e:"♾️", t:"Never finished. Currently shipped.",
      x:"So that's the real machine behind the UPDATE button: write, test with robots, version it, taste-test, roll out, fix, repeat forever. Software is a living thing that never stops being built. And now — the arena. Go ship something, and hunt what breaks."},
   ]},
  ]},
{ id:"black2", name:"BLACK BELT", concept:"AI + THE FINAL TEST", beltEmoji:"⚫", color:"#4A4460",
  skills:[], testN:8, testPass:6,
  lessons:[
   { title:"WHAT AI ACTUALLY IS", emoji:"✨", slides:[
     {e:"✨", t:"AI = Artificial Intelligence.",
      x:"The final belt. A I stands for ARTIFICIAL INTELLIGENCE — machines doing things that normally need human smarts: recognizing faces, understanding speech, writing sentences. It's the most talked-about technology on Earth right now, and most people talking about it have no idea how it works. In ten minutes, you will. Let's open the box."},
     {e:"🧩", t:"Not magic. Patterns.",
      x:"Here's the core, and it's simpler than anyone admits: AI learns PATTERNS from EXAMPLES. Show it a million cat photos — it slowly tunes itself until it catches the pattern of cat-ness: the ears, the whiskers, the eyes. Then show it a brand-new photo and it guesses: cat, or not? It doesn't think. It doesn't dream. It pattern-guesses. Very, very fast."},
     {e:"🎓", t:"Training: how the learning works.",
      x:"Teaching an AI is called TRAINING. You show it an example WITH the right answer — this is a cat, this is a dog — millions and millions of times. Every time it guesses wrong, it adjusts itself a tiny bit. Wrong, adjust. Wrong, adjust. A billion adjustments later... it's eerily good. Nobody programmed cat-ness in by hand. It grew from the examples."},
     {check:{t:"AI learns by...", spoken:"Check! How does an AI actually learn?",
       opts:[{e:"📚",l:"MILLIONS OF EXAMPLES + TINY ADJUSTMENTS",ok:true},{e:"🧠",l:"BEING BORN SMART",no:"Before training, an AI knows exactly nothing — not even what a cat is. The examples build everything. Again."},{e:"🔮",l:"READING MINDS",no:"No minds are read. Patterns are guessed, one adjustment at a time. Again."}],
       yes:"Examples with answers, and a billion tiny self-adjustments. The pattern IS the knowledge."}},
     {e:"🕸️", t:"The machine has a name: neural network.",
      x:"The pattern-machine inside is called a NEURAL NETWORK — millions of connected number-dials, loosely inspired by how brain cells connect. Loosely! Inside it's all math: numbers flowing through, dials turning during training. When someone says 'the A I model', they mean one of these — a giant, trained web of numbers."},
     {e:"🏭", t:"Where AI is born: you already know the place.",
      x:"And WHERE does training happen? Everything you've learned just connected. Training runs in DATA CENTERS — the cloud buildings! — on thousands of G P Us — the graphics chips! — running hot for weeks. The chip that draws your games and the buildings that hold your photos, teaming up to teach the biggest machines ever built. Your whole curriculum was secretly one story."},
     {check:{t:"Big AIs are trained on thousands of...", spoken:"Check! Big A I models get trained in data centers on thousands of... what?",
       opts:[{e:"🎨",l:"GPUs — GRAPHICS CHIPS",ok:true},{e:"🖱️",l:"COMPUTER MICE",no:"Ha — no clicking required. It's the graphics chips — G P Us — doing mountains of math. Again."},{e:"📼",l:"CASSETTE TAPES",no:"Wrong century! G P Us — the same chip family that draws your games. Again."}],
       yes:"GPUs — the graphics chips turned out to be perfect for AI math. Remember white belt? It all connects."}},
     {e:"🤖", t:"You used AI today. Several times.",
      x:"Autocorrect guessing your next word. Your video app choosing what you'd love next. Face unlock recognizing you. Photo search finding 'dog' in your pictures. Voice assistants like Siri and Alexa understanding what you said. All pattern-guessers. All trained on examples. All around you, all day long — mostly invisible."},
     {e:"💬", t:"And then came the chatbots.",
      x:"The famous ones — Chat G P T, Claude, Gemini — are neural networks trained on MOUNTAINS of text, learning one deceptively simple pattern: what word comes next? Do that astonishingly well, and something remarkable happens: it can answer questions, explain ideas, write stories, and yes — write code. Still pattern-guessing. Just... at a scale that starts to look like magic."},
     {check:{t:"Chatbots like ChatGPT and Claude basically learned to...", spoken:"Check! Chatbots learned one core pattern from mountains of text. What is it?",
       opts:[{e:"💬",l:"PREDICT WHAT COMES NEXT",ok:true},{e:"📖",l:"MEMORIZE EVERY BOOK",no:"Not memorizing — learning patterns deep enough to predict what should come next. That's the trick. Again."},{e:"🧙",l:"ACTUAL WIZARDRY",no:"Feels like it, doesn't it? It's next-word prediction, done absurdly well. Again."}],
       yes:"Predict what comes next — done so well that conversation, answers, and code fall out of it."}},
     {e:"⚠️", t:"When AI is confidently wrong.",
      x:"Now the crucial flaw. An AI sounds JUST as confident when it's wrong — because it isn't checking facts, it's completing patterns. Sometimes it fills a gap with something that merely SOUNDS right — a made-up date, a fake book title — like autocorrect inserting the wrong word with total confidence. So the rule: important facts from an AI get double-checked. Always."},
     {e:"⚖️", t:"Fair examples. Fair guesses.",
      x:"One more flaw to know: the AI is only as fair as its examples. Train a cat-spotter only on daytime photos, and it fails at night. Train any AI on one-sided examples, and its guesses come out one-sided too — unfair to people it saw too little of. Good AI builders work hard on fair, complete examples. The examples are the teacher — so choose the teacher well."},
     {check:{t:"Why double-check facts an AI tells you?", spoken:"Last check! Why should you double-check important facts from an A I?",
       opts:[{e:"🔍",l:"IT COMPLETES PATTERNS, NOT FACTS",ok:true},{e:"😈",l:"IT LIES ON PURPOSE",no:"No mischief — it genuinely doesn't know when its pattern-guess is false. That's exactly why YOU check. Again."},{e:"🐌",l:"IT'S USUALLY TOO SLOW",no:"Speed isn't the issue — confident pattern-guessing is. Verify the facts. Again."}],
       yes:"It completes patterns — confidently — whether or not they're true. The checker is you."}},
     {e:"🧰", t:"A tool. The mightiest one yet.",
      x:"So that's A I demystified: pattern-guessing, grown from examples, running on G P Us in data centers, brilliant and fallible at the same time. It's a TOOL — the mightiest one ever built. And tools answer to the people who understand them. Next lesson: what that means for your future. It's bigger than you think."},
   ]},
   { title:"THE PILOT RULE", emoji:"✈️", slides:[
     {e:"✈️", t:"AI writes code now. Really.",
      x:"True fact, no sugar-coating: AI can write code today. Whole working programs, in seconds. So the obvious question — was everything you just learned... pointless? Grab that question and hold it tight. This lesson is the answer, and it's the most important one in the whole academy."},
     {e:"🛠️", t:"What AI can genuinely do.",
      x:"Let's be honest about its powers, because they're real: today's AI can write whole functions, spot bugs in code, explain confusing programs in plain words, and translate between programming languages. Programmers everywhere already use it daily — like a tireless assistant who read every programming book ever written."},
     {e:"🕳️", t:"What AI cannot do.",
      x:"Now the other list. AI cannot know what you actually WANTED — it only sees what you asked. It cannot take responsibility when things go wrong. And it cannot truly check itself — it pattern-guesses its own checking! Confident, remember? Even when wrong. Someone in the room has to KNOW. Someone has to verify."},
     {check:{t:"What can AI NOT do?", spoken:"Check! What is the thing A I cannot do?",
       opts:[{e:"🕳️",l:"KNOW WHAT YOU REALLY WANTED",ok:true},{e:"⚡",l:"WRITE CODE QUICKLY",no:"That it CAN do — frighteningly fast. What it can't do is know your true intent, or take responsibility. Again."},{e:"📚",l:"EXPLAIN THINGS",no:"Explaining is one of its best tricks. Knowing what you MEANT — that's the gap. Again."}],
       yes:"It can't know your intent, can't take responsibility, can't truly verify itself. That's where humans live."}},
     {e:"👩‍✈️", t:"Autopilot flies. Pilots still exist.",
      x:"Here's the picture that explains the next fifty years. Autopilot can fly a plane for HOURS — most of every flight, actually. And airlines still train pilots for years and put them up front. Why? Because someone must understand what the plane is DOING — to catch mistakes and take over on the weird day. The autopilot doesn't know when it's wrong. The pilot knows. That's the whole job."},
     {e:"🔍", t:"The new loop: Ask. Read. Verify. Fix.",
      x:"So here's how coders really work with AI now. ASK it for code. READ what it wrote — actually read it. VERIFY it does the right thing. FIX what isn't right. Picture it: you ask for a game script, it looks perfect... you read it and spot health going UP when the player gets hit. A logic bug! No error, remember? The AI missed it. You caught it — because you understand. That's the job now."},
     {check:{t:"The human's loop with AI is...", spoken:"Check! What's the loop a human runs when working with A I?",
       opts:[{e:"🔁",l:"ASK, READ, VERIFY, FIX",ok:true},{e:"🙈",l:"ASK, PASTE, HOPE",no:"Ha! The most dangerous workflow in modern software. Reading and verifying is where the human earns their seat. Again."},{e:"📢",l:"ASK LOUDER",no:"Volume doesn't verify. Read it, check it, fix it. Again."}],
       yes:"Ask, read, verify, fix — and every step after asking needs someone who understands. You."}},
     {e:"📚", t:"Using AI to LEARN — the honest way.",
      x:"And here's how this applies to school, straight talk. Using AI to secretly do your work teaches the AI nothing new — and you even less. Using it to EXPLAIN things, quiz you, and check your thinking? That's a superpower. The difference is where the understanding ends up: in the machine's output... or in your head. Choose your head. Every time."},
     {e:"👑", t:"The future belongs to directors.",
      x:"Follow the logic to the end. AI is the mightiest tool ever built. Tools amplify the people who understand them. So the people who understand machines don't get replaced by AI — they get PROMOTED by it: they become the directors, telling it what to build and catching what it gets wrong. The pilot gets paid because the pilot understands the plane. You now understand the plane."},
     {check:{t:"People who UNDERSTAND machines will...", spoken:"Final check of the final lesson! What happens to people who truly understand how machines work?",
       opts:[{e:"👑",l:"DIRECT THE AI — AND GET STRONGER",ok:true},{e:"😴",l:"GET REPLACED FIRST",no:"Backwards! The ones who understand are exactly the ones who can verify, fix, and direct. They rise. Again."},{e:"🏃",l:"RUN AWAY FROM COMPUTERS",no:"Nowhere to run — and no need. Understanding is the seat at the controls. Again."}],
       yes:"They become the directors. Understanding is the seat at the controls — and you just earned yours."}},
     {e:"⚫", t:"The final test awaits.",
      x:"Look how far you came. The machine and its parts. The internet's ask and answer. The buildings of the cloud. The four organs of every app. The tables that remember the world. Real code, real bugs, real fixes. And the truth about AI. Eight challenges, everything mixed. Deep breath, insider... go show the machine who understands it."},
   ]},
  ]},

/* ============================== MAZE GENERATOR + BFS ============================== */
const GRIDN=5;
function wallKey(w){return w.x+","+w.y;}
function bfsPath(start,goal,walls){
  const wk=new Set(walls.map(wallKey));
  const seen={}; seen[start.x+","+start.y]=null;
  let q=[[start.x,start.y]];
  const DIRS4=[[1,0],[-1,0],[0,1],[0,-1]];
  while(q.length){
    const [x,y]=q.shift();
    if(x===goal.x&&y===goal.y){
      const moves=[]; let k=x+","+y;
      while(seen[k]){ moves.unshift(seen[k].m); k=seen[k].from; }
      return moves; // array of {dx,dy}
    }
    for(const [dx,dy] of DIRS4){
      const nx=x+dx,ny=y+dy,k=nx+","+ny;
      if(nx<0||ny<0||nx>=GRIDN||ny>=GRIDN||wk.has(k)||(k in seen))continue;
      seen[k]={from:x+","+y,m:{dx,dy}};
      q.push([nx,ny]);
    }
  }
  return null;
}
function genMaze(level){
  for(let tries=0;tries<80;tries++){
    let start,goal,walls=[];
    if(level<=1){
      const ry=1+rint(3);
      start={x:0,y:ry}; goal={x:4,y:ry};
      // sprinkle 3 decorative walls off the flight row
      const cells=[];
      for(let x=1;x<4;x++)for(let y=0;y<GRIDN;y++){ if(y!==ry)cells.push({x,y}); }
      walls=sample(cells,3);
    }else if(level===2){
      start={x:0,y:rint(GRIDN)}; goal={x:4,y:rint(GRIDN)};
      const gapY=rint(GRIDN);
      for(let y=0;y<GRIDN;y++){ if(y!==gapY)walls.push({x:2,y}); }
    }else{
      start={x:0,y:rint(GRIDN)}; goal={x:4,y:rint(GRIDN)};
      const g1=rint(GRIDN), g2=Math.max(0,Math.min(GRIDN-1,g1+(rint(3)-1)));
      for(let y=0;y<GRIDN;y++){ if(y!==g1)walls.push({x:1,y}); if(y!==g2)walls.push({x:3,y}); }
    }
    walls=walls.filter(w=>!(w.x===start.x&&w.y===start.y)&&!(w.x===goal.x&&w.y===goal.y));
    const path=bfsPath(start,goal,walls);
    const maxB=level<=1?5:(level===2?7:8);
    if(path&&path.length>=3&&path.length<=maxB) return {start,goal,walls,max:maxB,solution:path};
  }
  return {start:{x:0,y:2},goal:{x:4,y:2},walls:[],max:5,solution:[{dx:1,dy:0},{dx:1,dy:0},{dx:1,dy:0},{dx:1,dy:0}]};
}
function simulateRun(start,goal,walls,moves){
  // returns {steps:[{x,y}...], outcome:'win'|'crash'|'out'|'short', at:index}
  const wk=new Set(walls.map(wallKey));
  let pos={x:start.x,y:start.y};
  const steps=[];
  for(let i=0;i<moves.length;i++){
    pos={x:pos.x+moves[i].dx,y:pos.y+moves[i].dy};
    if(pos.x<0||pos.y<0||pos.x>=GRIDN||pos.y>=GRIDN)return {steps,outcome:"out",at:i};
    if(wk.has(pos.x+","+pos.y))return {steps:steps.concat([pos]),outcome:"crash",at:i};
    steps.push({x:pos.x,y:pos.y});
  }
  return {steps,outcome:(pos.x===goal.x&&pos.y===goal.y)?"win":"short",at:moves.length-1};
}
const DIRINFO=[{dx:1,dy:0,e:"➡️",n:"fly right"},{dx:-1,dy:0,e:"⬅️",n:"fly left"},{dx:0,dy:-1,e:"⬆️",n:"fly up"},{dx:0,dy:1,e:"⬇️",n:"fly down"}];
function dirInfo(m){ return DIRINFO.find(d=>d.dx===m.dx&&d.dy===m.dy); }

function choiceProblem(st,cfg,mode,onDone){
  const card=el('<div class="card">'+
    (cfg.rule?('<div class="rulecard">'+cfg.rule+'</div>'):"")+
    '<div class="scene" id="cpScene" style="font-size:'+(cfg.sceneSize||"min(64px,15vw)")+';">'+cfg.scene+'</div>'+
