      '<div class="bigtext pix-bubble" style="font-size:20px;">'+subName(cfg.prompt)+'</div></div>'+
    '<div class="optgrid'+(cfg.opts.length===2?" two":"")+'" id="cpOpts"></div>'+
    '<div class="feedback" id="cpFb"></div></div>');
  st.appendChild(card);
  const box=card.querySelector("#cpOpts"), fb=card.querySelector("#cpFb");
  const pixBox=card.querySelector("#cpPix");
  pixBox.innerHTML=pixelSVG("thinking",60);
  let locked=false;
  const opts=cfg.noShuffle?cfg.opts:shuffle(cfg.opts);
  opts.forEach(function(o){
    const c=el('<div class="opt">'+(o.e?('<span class="e">'+o.e+'</span>'):"")+(o.l?('<span class="l">'+o.l+'</span>'):"")+'</div>');
    c.onclick=function(){
      if(locked)return;
      if(o.ok){
        locked=true;
        c.classList.add("right");
        Array.from(box.children).forEach(ch=>{ if(ch!==c)ch.classList.add("dim"); });
        fb.textContent="⭐ CORRECT! ⭐";
        pow("YES!","var(--green)");
        setPixelIn(pixBox,"happy",60);
        speak(cfg.yes||praise(),{onend:function(){ onDone(true); }});
      }else{
        if(mode==="test"){
          locked=true;
          c.classList.add("wrong");
          const right=Array.from(box.children)[opts.findIndex(x=>x.ok)];
          if(right)right.classList.add("right");
          fb.textContent="THE ANSWER IS SHOWN!";
          setPixelIn(pixBox,"oops",60);
          speak(o.no||"Not this time! See the glowing one? That was the answer. On we go!",{onend:function(){ onDone(false); }});
        }else{
          c.classList.remove("wrong"); void c.offsetWidth; c.classList.add("wrong");
          fb.textContent="Try again!";
          setPixelIn(pixBox,"oops",60);
          setTimeout(function(){ if(!locked)setPixelIn(pixBox,"thinking",60); },1600);
          speak(o.no||encourage());
        }
      }
    };
    box.appendChild(c);
  });
  // read each answer choice aloud, one by one, highlighting the tile being said
  function clearReading(){ Array.from(box.children).forEach(t=>t.classList.remove("reading")); }
  function readOptions(){
    const tiles=Array.from(box.children);
    let i=0;
    (function step(){
      if(!card.isConnected||locked)return;
      clearReading();
      if(i>=tiles.length)return;
      tiles[i].classList.add("reading");
      const o=opts[i];
      if(o.l){ speak(o.l.replace(/\n/g," "),{onend:function(){ i++; step(); }}); }
      else { setTimeout(function(){ i++; step(); },600); }
    })();
  }
  box.addEventListener("click",clearReading,true);
  if(cfg.setup)cfg.setup(card.querySelector("#cpScene"));
  replayFn=function(){ speak(cfg.spoken, ageBand()==="4-7" ? {onend:readOptions} : {}); };
  speak(cfg.spoken, ageBand()==="4-7" ? {onend:readOptions} : {});
}

/* ---------- Shared maze drawing ---------- */
function drawGridInto(grid,mz,hero){
  grid.innerHTML="";
  const wk=new Set(mz.walls.map(wallKey));
  for(let y=0;y<GRIDN;y++)for(let x=0;x<GRIDN;x++){
    const c=document.createElement("div");
    c.className="cell"+(wk.has(x+","+y)?" wall":"");
    if(wk.has(x+","+y))c.innerHTML=ART?'<img class="cell-art" src="assets/obj-building.png" alt="">':"🏢";
    if(mz.goal.x===x&&mz.goal.y===y&&!(hero&&hero.x===x&&hero.y===y))
      c.innerHTML=ART?'<img class="cell-art" src="assets/'+(teenMode()?"obj2-server":"obj-signal")+'.png" alt="">':(teenMode()?"🖥️":"📡");
    if(hero&&hero.x===x&&hero.y===y){
      if(ART)c.innerHTML='<img class="cell-art" src="assets/'+pixFile(hero.crash?"oops":"idle")+'" alt="">';
      else c.innerHTML='<span>'+(hero.crash?"💥":"🦸‍♀️")+'</span>';
    }
    grid.appendChild(c);
  }
}

    if(run.outcome==="crash"||run.outcome==="out"){
      drawGridInto(grid,mz,Object.assign({},pos,{crash:true}));
      pow("CRASH!","var(--red)");

    fails++;

      over=true; running=false; fb.textContent="ON TO THE NEXT ONE!";
      speak("Tricky maze! We will get the next one. Onward!",{onend:function(){onDone(false);}});
      return;
    }
    fb.textContent=run.outcome==="short"?"ALMOST — KEEP GOING!":"💥 TRY AGAIN!";
    speak(run.outcome==="crash"?"CRASH! I flew into a building — because I follow your code EXACTLY! Change the code and try again!"
         :run.outcome==="out"?"Whoops, I flew out of the city! Fix the code and try again!"
         :"I followed every block, but I did not reach the signal yet. Add more blocks!");
    running=false;
    setTimeout(function(){ if(!over)drawGridInto(grid,mz,mz.start); },1200);
  };
  drawGridInto(grid,mz,mz.start); drawProg();
  const intro="Mission time! Fly me from my spot to the flashing signal — but do not hit the buildings! Tap arrow blocks to write the code, then press launch.";
  replayFn=function(){speak(intro);};
  speak(intro);
}};
/* ---------- ORANGE: Zap loop (set repeat N) ---------- */
SKILLS.zap={ title:"ZAP THE VILLAINS", emoji:"👾", blurb:"Set the loop to zap them all!",
play:function(st,level,mode,onDone){
  const theme=pick(ZAP_THEMES);
  let total,gone=0;
  if(level<=1)total=3+rint(3);
  else if(level===2)total=5+rint(4);
  else {total=6+rint(4); gone=1+rint(Math.min(3,total-4));}
  const need=total-gone;
  let n=1, running=false, over=false, attempts=0;
  const card=el('<div class="card">'+
    '<div class="scene" id="vill" style="font-size:inherit;min-height:90px;"></div>'+
    (gone?'<div class="sub" style="font-size:14px;">The faded ones are ALREADY zapped — skip them!</div>':"")+
    '<div class="repeatbox">'+
      '<button class="arrowbtn" id="minus">−</button>'+
      '<div><div class="lbl">REPEAT ZAP ⚡</div><div class="num" id="num">1</div><div class="lbl">TIMES</div></div>'+
      '<button class="arrowbtn" id="plus">+</button>'+
    '</div>'+
    '<div class="btnrow"><button class="btn purple" id="zap" style="font-size:24px;">⚡ RUN THE LOOP!</button></div>'+
    '<div class="feedback" id="fb"></div></div>');
  st.appendChild(card);
  const vill=card.querySelector("#vill"), num=card.querySelector("#num"), fb=card.querySelector("#fb");
  function draw(){
    vill.innerHTML="";
    for(let i=0;i<total;i++){
      const face=ART?'<img src="assets/obj-villain-'+((i%3)+1)+'.png" alt="">':theme[0];
      const v=el('<span class="villain'+(i<gone?" gone":"")+'" style="animation-delay:'+(i*0.18)+'s">'+face+'</span>');
      vill.appendChild(v);
    }
  }
  card.querySelector("#minus").onclick=function(){ if(running||over)return; if(n>1)n--; num.textContent=n; speak(String(n)); };
  card.querySelector("#plus").onclick=function(){ if(running||over)return; if(n<9)n++; num.textContent=n; speak(String(n)); };
  card.querySelector("#zap").onclick=async function(){
    if(running||over)return;
    running=true; draw(); attempts++;
    fb.textContent="ZAP ZAP ZAP...";
    const kids=Array.from(vill.children);
    for(let i=0;i<Math.min(n,need);i++){
      await new Promise(r=>setTimeout(r,420));
      if(!card.isConnected)return;
      kids[gone+i].classList.add("zapped"); pow("ZAP!","var(--blue)");
    }
    await new Promise(r=>setTimeout(r,600));
    if(!card.isConnected)return;
    if(n===need){
      over=true; confetti(32); pow("KAPOW!");
      fb.textContent="⭐ ALL ZAPPED! ⭐";
      speak("Exactly "+NUMWORD[need]+"! One little loop, "+NUMWORD[need]+" big zaps! Loops are POWERFUL!",{onend:function(){onDone(true);}});
      return;
    }
    if(mode==="test"){
      over=true; fb.textContent="THE ANSWER WAS "+need+"!";
      speak("We needed exactly "+NUMWORD[need]+" zaps. Next one is yours!",{onend:function(){onDone(false);}});
      return;
    }
    fb.textContent=n<need?"SOME ARE LEFT!":"TOO MANY ZAPS!";
    speak(n<need?("Only "+NUMWORD[n]+" zaps — some "+theme[1]+" are still giggling! Count them and make the loop bigger!")
               :("Whoa, "+NUMWORD[n]+" zaps is too many — we zapped empty sky! Count again!"));
    running=false; setTimeout(function(){ if(!over)draw(); },1200);
  };
  draw();
  const intro=(gone? "Some "+theme[1]+" are already zapped — count only the ones still wiggling! ":"")+
    "Do not tap them one by one — use a LOOP! Count the "+theme[1]+", set the repeat number, and run your loop!";
  replayFn=function(){speak(intro);};
  speak(intro);
}};

/* ---------- GREEN: Rule Cards (if/then, if/else) ---------- */
SKILLS.rules={ title:"RULE MASTER", emoji:"🚦", blurb:"Follow the IF-THEN rule!",
play:function(st,level,mode,onDone){
  if(level<=1){
    const R=pick(RULES_BANK);

      spoken:"The rule is: IF "+R.ifL.toLowerCase()+", THEN "+R.thenL.toLowerCase()+"! Now look: "+R.sit+" What do you do?",
      opts:[{e:R.thenE,l:R.thenL,ok:true}].concat(others.map(o=>({e:o.thenE,l:o.thenL,no:"Check the rule card at the top! IF "+R.ifL.toLowerCase()+", THEN what?"}))),
      yes:"Yes! IF "+R.ifL.toLowerCase()+", THEN "+R.thenL.toLowerCase()+"! Rule followed perfectly!",
    },mode,onDone);
  }else if(level===2){
    const two=sample(RULES_BANK,2);
    const R=pick(two);
    const other=two.find(x=>x!==R);
    choiceProblem(st,{
      rule:"IF "+two[0].ifE+" → "+two[0].thenE+" &nbsp;&nbsp; IF "+two[1].ifE+" → "+two[1].thenE,
      scene:'<span class="floaty">'+R.ifE+'</span>',
      prompt:R.sit+" Which rule fires?",
      spoken:"TWO rules now! IF "+two[0].ifL.toLowerCase()+", THEN "+two[0].thenL.toLowerCase()+". IF "+two[1].ifL.toLowerCase()+", THEN "+two[1].thenL.toLowerCase()+". Now look: "+R.sit+" What do you do?",
      opts:[{e:R.thenE,l:R.thenL,ok:true},{e:other.thenE,l:other.thenL,no:"That is the OTHER rule! Look again: "+R.sit},
            (function(){const d=pick(RULES_BANK.filter(x=>x!==two[0]&&x!==two[1]));return {e:d.thenE,l:d.thenL,no:"That is not in our rules! Check the rule card!"};})()],
      yes:"Yes! The computer checked which IF was true, and picked the right THEN. Just like you!",
    },mode,onDone);
  }else{
    const R=pick(RULES_BANK);
    const other=pick(RULES_BANK.filter(x=>x!==R));
    const isIf=rint(2)===0;
    choiceProblem(st,{
      rule:"IF "+R.ifE+" → "+R.thenE+" &nbsp; ELSE → "+other.thenE,
      scene:'<span class="floaty">'+(isIf?R.ifE:"🙅"+R.ifE)+'</span>',
      prompt:(isIf?R.sit:("It is NOT "+R.ifL.toLowerCase()+" today!"))+" IF... or ELSE?",
      spoken:"The rule is: IF "+R.ifL.toLowerCase()+", THEN "+R.thenL.toLowerCase()+". ELSE — "+other.thenL.toLowerCase()+"! Now: "+(isIf?R.sit:("it is NOT "+R.ifL.toLowerCase()+" today!"))+" What do you do?",
      opts:[
        {e:R.thenE,l:R.thenL,ok:isIf,no:isIf?null:"But it is NOT "+R.ifL.toLowerCase()+"! When the IF is not true, the ELSE wins. Try again!"},
        {e:other.thenE,l:other.thenL+" (ELSE)",ok:!isIf,no:!isIf?null:"The ELSE only wins when the IF is NOT true. But look — "+R.sit+" Try again!"},
      ],
      yes:isIf?"Yes! The IF was true, so the THEN happens!":"Yes! The IF was not true — so the ELSE wins! You cracked if-else!",
    },mode,onDone);
  }
}};

/* ---------- PURPLE: Fix the Maze (debugging) ---------- */
SKILLS.fixmaze={ title:"BUG HUNT: SKY CODE", emoji:"🐛", blurb:"One block is wrong — find it!",
play:function(st,level,mode,onDone){
  const mz=genMaze(Math.min(level+1,3));
  const good=mz.solution;
  let badIdx=-1, badProg=null;
  for(let t=0;t<40;t++){
    const i=rint(good.length);
    const wrongDir=pick(DIRINFO.filter(d=>!(d.dx===good[i].dx&&d.dy===good[i].dy)));
    const prog=good.slice(); prog[i]={dx:wrongDir.dx,dy:wrongDir.dy};
    const run=simulateRun(mz.start,mz.goal,mz.walls,prog);
    if(run.outcome!=="win"){ badIdx=i; badProg=prog; break; }
  }
  if(badIdx<0){ badIdx=0; badProg=good.slice(); badProg[0]={dx:-good[0].dx,dy:-good[0].dy}; }
  let over=false, phase="watch";
  const card=el('<div class="card">'+
    '<div class="citygrid" id="grid"></div>'+
    '<div class="sub" style="margin-top:8px;font-family:var(--disp);letter-spacing:1px;color:var(--yellow);">THE CODE:</div>'+
    '<div class="progrow" id="prog" style="border-style:solid;"></div>'+
    '<div class="feedback" id="fb">WATCH WHAT HAPPENS...</div></div>');
  st.appendChild(card);
  const grid=card.querySelector("#grid"), progRow=card.querySelector("#prog"), fb=card.querySelector("#fb");
  const chips=[];
  badProg.forEach(function(m,i){
    const ch=el('<div class="chip">'+dirInfo(m).e+'</div>');
    ch.onclick=function(){
      if(over||phase!=="hunt")return;
      if(i===badIdx){
        over=true;
        ch.classList.add("fixed");
        ch.textContent=dirInfo(good[badIdx]).e;
        fb.textContent="BUG FIXED! WATCH!";
        pow("FIXED!","var(--green)");
        speak("You found the bug! Let me fly the fixed code!",{onend:async function(){
          let pos={x:mz.start.x,y:mz.start.y};
          const run=simulateRun(mz.start,mz.goal,mz.walls,good);
          for(const s of run.steps){ pos=s; drawGridInto(grid,mz,pos); await new Promise(r=>setTimeout(r,380)); }
          confetti(32); fb.textContent="⭐ BUG SQUASHED! ⭐";
          speak("Perfect flight! One fixed block saved the whole mission. You are a real bug hunter, "+NAME+"!",{onend:function(){onDone(true);}});
        }});
      }else{
        ch.classList.remove("bad"); void ch.offsetWidth; ch.classList.add("bad");
        if(mode==="test"){
          over=true;
          chips[badIdx].classList.add("fixed");
          fb.textContent="THE BUG IS GLOWING!";
          speak("Not that block! See the glowing one? That was the bug. On we go!",{onend:function(){onDone(false);}});
        }else{
          speak("Hmm, that block looks okay to me! Watch the crash again — where does it go wrong?");
        }
      }
    };
    chips.push(ch); progRow.appendChild(ch);
  });
  drawGridInto(grid,mz,mz.start);
  async function watchRun(){
    const run=simulateRun(mz.start,mz.goal,mz.walls,badProg);
    let pos={x:mz.start.x,y:mz.start.y};
    await new Promise(r=>setTimeout(r,1500));
    for(const s of run.steps){ pos=s; drawGridInto(grid,mz,pos); await new Promise(r=>setTimeout(r,420)); }
    if(!card.isConnected)return;
    if(run.outcome==="crash"||run.outcome==="out"){
      drawGridInto(grid,mz,Object.assign({},pos.x!==undefined?pos:mz.start,{crash:true}));
      pow("CRASH!","var(--red)");
    }
    phase="hunt";
    fb.textContent="TAP THE WRONG BLOCK!";
    speak("Oh no — the code has a BUG! One block points the wrong way. Look at the code and tap the block that is wrong!");
  }
  const intro="Bug hunt! This code is SUPPOSED to fly me to the signal. Watch what happens instead...";
  replayFn=function(){speak(intro);};

}};

/* ---------- shared: tap-the-steps-in-order engine (track 2) ---------- */
function orderChain(st,cfg,mode,onDone){
  const steps=cfg.steps.map(function(s,i){return {e:s.e,l:s.l,idx:i};});
  const cards=shuffle(steps.slice());
  let need=0, over=false, anyWrong=false;
  const card=el('<div class="card">'+
    '<div class="sub" style="font-family:var(--disp);letter-spacing:1px;color:var(--yellow);">'+cfg.headline+'</div>'+
    '<div class="slotrow" id="slots"></div>'+
    '<div class="optgrid" id="cards" style="grid-template-columns:repeat('+Math.min(cards.length,3)+',1fr);"></div>'+
    '<div class="feedback" id="fb">What happens FIRST?</div></div>');
  st.appendChild(card);
  const slots=card.querySelector("#slots"), fb=card.querySelector("#fb");
  steps.forEach(function(){slots.appendChild(el('<div class="slot">·</div>'));});
  cards.forEach(function(o){
    const c=el('<div class="opt"><span class="e">'+o.e+'</span><span class="l">'+o.l+'</span></div>');
    c.onclick=function(){
      if(over||c.classList.contains("dim"))return;
      if(o.idx===need){
        c.classList.add("dim");
        const slot=slots.children[need];
        slot.textContent=o.e; slot.classList.add("filled");
        need++;
        if(need>=steps.length){
          over=true;
          const win=(mode!=="test"||!anyWrong);
          pow("DONE!"); if(win)confetti(24);
          fb.textContent="⭐ SEQUENCE COMPLETE! ⭐";
          speak(win?cfg.doneLine:"Finished — but a few steps got tangled on the way. Watch the order next time!",
            {onend:function(){onDone(win);}});
        }else{ fb.textContent="What happens NEXT?"; speak(pick(["Right. Then?","Correct. Next?","Yep. What now?","Good. Keep going."])); }
      }else{
        anyWrong=true;
        c.classList.remove("wrong"); void c.offsetWidth; c.classList.add("wrong");
        speak("Not that one yet. What really happens "+(need===0?"first":"next")+"?");
      }
    };
    card.querySelector("#cards").appendChild(c);
  });
  replayFn=function(){speak(cfg.intro);};
  speak(cfg.intro);
}

const BITVALS=[16,8,4,2,1];
function letterOf(n){ return (n>=1&&n<=26)?String.fromCharCode(64+n):null; }
const EASY_LETTERS="ABCDEFHIJLPQRTX";
SKILLS.binary={ title:"THE SWITCHBOARD", emoji:"🎛️", blurb:"Spell real letters in pure binary!",
play:function(st,level,mode,onDone){
  if(level>=2&&rint(2)===0){
    const num=1+rint(26);
    const L=letterOf(num);
    const others=sample("ABCDEFGHIJKLMNOPQRSTUVWXYZ".split("").filter(function(c){return c!==L;}),2);
    const onVals=BITVALS.filter(function(v){return num&v;});
    const row='<div class="bswrap">'+BITVALS.map(function(v){
      return '<div class="bscol"><div class="bsw ro'+((num&v)?" on":"")+'"><div class="knob"></div></div><div class="bsval">'+v+'</div></div>';
    }).join("")+'</div>';
    choiceProblem(st,{
      scene:row, sceneSize:"16px",
      prompt:"Read the switches — which letter is lit up?",
      spoken:"Read the switchboard! Add up the switches that are ON, then find the letter. A is one, B is two, and so on.",
      opts:[{e:L,ok:true}].concat(others.map(function(c){return {e:c,no:"Add up only the gold switches, then count into the alphabet. Again."};})),
      yes:"Yes! "+(onVals.length>1?onVals.join(" plus ")+" makes "+num:"Just the "+num+" switch")+" — the letter "+L+". You just read binary.",
    },mode,onDone);
    return;
  }
  let n=0, over=false;
  const nameL=((NAME||"").toUpperCase().replace(/[^A-Z]/g,"")[0])||null;
  let wl;
  if(level<=1){ wl=(rint(3)===0&&nameL&&EASY_LETTERS.indexOf(nameL)>=0)?nameL:EASY_LETTERS[rint(EASY_LETTERS.length)]; }
  else { wl=(rint(4)===0&&nameL)?nameL:String.fromCharCode(65+rint(26)); }
  const want=wl.charCodeAt(0)-64;
  const showLetter=level<3;
  const card=el('<div class="card">'+
    '<div class="bigtext" style="font-size:21px;text-align:center;">Light up the letter <span style="color:var(--gold);font-size:30px;">'+wl+'</span> <span style="color:var(--faint);font-size:15px;">(letter number '+want+')</span></div>'+
    '<div class="bswrap" id="bsw"></div>'+
    '<div class="bsum" id="bsum">0'+(showLetter?" = ?":"")+'</div>'+
    '<div class="btnrow"><button class="btn green" id="bcheck" style="font-size:22px;">⚡ CHECK!</button></div>'+
    '<div class="feedback" id="bfb"></div></div>');
  st.appendChild(card);
  const wrap=card.querySelector("#bsw"), sum=card.querySelector("#bsum"), fb=card.querySelector("#bfb");
  const state=[0,0,0,0,0];
  BITVALS.forEach(function(v,i){
    const col=el('<div class="bscol"><div class="bsw"><div class="knob"></div></div><div class="bsval">'+v+'</div></div>');
    const sw=col.querySelector(".bsw");
    sw.onclick=function(){
      if(over)return;
      state[i]=state[i]?0:1;
      sw.classList.toggle("on",!!state[i]);
      n=BITVALS.reduce(function(a,vv,ii){return a+(state[ii]?vv:0);},0);
      const L=letterOf(n);
      sum.textContent=(BITVALS.filter(function(vv,ii){return state[ii];}).join("+")||"0")+" = "+n+(showLetter?(" = "+(L||(n===0?"?":"too big!"))):"");
    };
    wrap.appendChild(col);
  });
  card.querySelector("#bcheck").onclick=function(){
    if(over)return;
    if(n===want){
      over=true; confetti(28); pow(wl+"!");
      fb.textContent="⭐ THAT'S "+wl+"! ⭐";
      const onVals=BITVALS.filter(function(v,i){return state[i];});
      speak((onVals.length>1?onVals.join(" plus ")+" is "+want:String(want))+" — the letter "+wl+"! You are literally writing binary. Machines everywhere are impressed.",{onend:function(){onDone(true);}});
      return;
    }
    if(mode==="test"){
      over=true;
      fb.textContent="THE TARGET WAS "+want+"!";
      speak(wl+" is letter number "+want+", and your switches added up to "+n+". The next one is yours.",{onend:function(){onDone(false);}});
      return;
    }
    fb.textContent=n<want?"TOO SMALL — ADD MORE!":"TOO BIG — SWITCH SOME OFF!";
    speak(n<want?("That adds up to "+n+". "+wl+" needs "+want+" — flip on a bit more."):("That adds up to "+n+". Too big! "+wl+" only needs "+want+"."));
  };
  const intro="The switchboard! Every letter has a number — A is one, B is two, up to Z at twenty six. "+wl+" is number "+want+". Flip switches so they ADD UP to exactly "+want+", then hit check!";
  replayFn=function(){speak(intro);};
  speak(intro);
}};

/* ============================== TRACK 2: THE CODE RUNNER (blue belt) ============================== */
function escT(t){ return String(t).replace(/[&<>]/g,function(c){return {"&":"&amp;","<":"&lt;",">":"&gt;"}[c];}); }
function levDist(a,b){
  const m=a.length,n=b.length; if(!m)return n; if(!n)return m;
  let prev=[]; for(let j=0;j<=n;j++)prev[j]=j;
  for(let i=1;i<=m;i++){
    const cur=[i];
    for(let j=1;j<=n;j++)cur[j]=Math.min(prev[j]+1,cur[j-1]+1,prev[j-1]+(a[i-1]===b[j-1]?0:1));
    prev=cur;
  }
  return prev[n];
}
/* tiny sandboxed interpreter: print / string+number variables / + / if-else with == > < */
function pixRun(code){
  const out=[], vars={};
  const raw=String(code||"").replace(/\t/g,"  ").split("\n");
  const st=[];
  for(let i=0;i<raw.length;i++){
    if(!raw[i].trim())continue;
    st.push({ln:i+1, txt:raw[i].trim(), ind:raw[i].match(/^ */)[0].length});
  }
  function fail(ln,msg){ return {out:out,err:{ln:ln,msg:msg}}; }
  function nearest(name){
    let best=null,bd=3;
    Object.keys(vars).forEach(function(k){ const d=levDist(k,name); if(d<bd){bd=d;best=k;} });
    return best;
  }
  function evalExpr(src){
    src=String(src).trim();
    if(!src)return {e:"there's nothing to work with here."};
    const parts=[]; let cur="",q=null;
    for(const ch of src){
      if(q){ cur+=ch; if(ch===q)q=null; continue; }
      if(ch==='"'||ch==="'"){ q=ch; cur+=ch; continue; }
      if(ch==='+'){ parts.push(cur); cur=""; continue; }
      cur+=ch;
    }
    if(q)return {e:"a quote got opened but never closed. Every quote needs a partner."};
    parts.push(cur);
    const vals=[];
    for(let p of parts){
      p=p.trim();
      if(!p)return {e:"there's a + with nothing on one side of it."};
      let m;
      if((m=p.match(/^"([^"]*)"$/))||(m=p.match(/^'([^']*)'$/))){ vals.push(m[1]); continue; }
      if(/^-?\d+(\.\d+)?$/.test(p)){ vals.push(parseFloat(p)); continue; }
      if(/^[A-Za-z_][A-Za-z0-9_]*$/.test(p)){
        if(!(p in vars)){
          const s=nearest(p);
          return {e:"I don't know «"+p+"». "+(s?("Did you mean «"+s+"»?"):"Words need quotes — or put "+p+" in a box first.")};
        }
        vals.push(vars[p]); continue;
      }
      return {e:"I can't read «"+p+"». Words need quotes, like \"hello\"."};
    }
    if(vals.some(function(v){return typeof v==="string";}))return {v:vals.map(String).join("")};
    return {v:vals.reduce(function(a,b){return a+b;},0)};
  }
  function evalCond(src){
    let op=null,idx=-1;
    if((idx=src.indexOf("=="))>=0)op="==";
    else if((idx=src.indexOf(">"))>=0)op=">";
    else if((idx=src.indexOf("<"))>=0)op="<";
    if(!op)return {e:"an if needs a comparison: ==, > or <."};
    const L=evalExpr(src.slice(0,idx)); if(L.e)return L;
    const R=evalExpr(src.slice(idx+op.length)); if(R.e)return R;
    if(op==="=="){
      if(typeof L.v==="number"&&typeof R.v==="number")return {v:L.v===R.v};
      return {v:String(L.v)===String(R.v)};
    }
    if(typeof L.v!=="number"||typeof R.v!=="number")return {e:"I can only compare numbers with "+op+"."};
    return {v:op===">"?L.v>R.v:L.v<R.v};
  }
  function execSimple(s){
    let m;
    if((m=s.txt.match(/^print\s*\((.*)\)\s*$/))){
      const r=evalExpr(m[1]); if(r.e)return r.e;
      out.push(String(r.v)); return null;
    }
    if(/^print\b/.test(s.txt))return "print needs round brackets: print(\"hi\")";
    if((m=s.txt.match(/^([A-Za-z_][A-Za-z0-9_]*)\s*=(?!=)\s*(.+)$/))){
      const r=evalExpr(m[2]); if(r.e)return r.e;
      vars[m[1]]=r.v; return null;
    }
    if(/^else\b/.test(s.txt))return "this else has no if to belong to.";
    return "I don't understand this line. Try print(...), a box like score = 7, or if ...:";
  }
  let i=0, steps=0;
  while(i<st.length){
    if(++steps>500)return fail(st[i].ln,"that is a LOT of steps. My terminal stops at five hundred.");
    const s=st[i];
    if(/^if\b/.test(s.txt)){
      if(!/:\s*$/.test(s.txt))return fail(s.ln,"an if needs a colon at the end, like: if score > 5:");
      const m=s.txt.match(/^if\s+(.+):\s*$/);
      if(!m)return fail(s.ln,"an if needs a rule to check, like: if score > 5:");
      const cond=evalCond(m[1]); if(cond.e)return fail(s.ln,cond.e);
      const base=s.ind; i++;
      const thenB=[];
      while(i<st.length&&st[i].ind>base){ thenB.push(st[i]); i++; }
      if(!thenB.length)return fail(s.ln,"the if has no indented line under it to run.");
      let elseB=[];
      if(i<st.length&&/^else\b/.test(st[i].txt)&&st[i].ind===base){
        if(!/^else\s*:\s*$/.test(st[i].txt))return fail(st[i].ln,"else needs a colon too: else:");
        const eln=st[i].ln; i++;
        while(i<st.length&&st[i].ind>base){ elseB.push(st[i]); i++; }
        if(!elseB.length)return fail(eln,"the else has no indented line under it to run.");
      }
      const body=cond.v?thenB:elseB;
      for(const b of body){
        if(/^if\b/.test(b.txt))return fail(b.ln,"one fork at a time in my terminal! No if inside an if... yet.");
        const e=execSimple(b); if(e)return fail(b.ln,e);
        if(++steps>500)return fail(b.ln,"too many steps!");
      }
      continue;
    }
    const e=execSimple(s); if(e)return fail(s.ln,e);
    i++;
  }
  return {out:out,err:null};
}
/* code display helpers */
function colorCode(line){
  const rest=escT(line);
  const re=/("[^"]*"|'[^']*')/g;
  let outH="",last=0,m;
  function plain(seg){
    return seg.replace(/\b(print|if|else)\b/g,'<span class="kwd">$1</span>')
              .replace(/\b(\d+)\b/g,'<span class="num">$1</span>');
  }
  while((m=re.exec(rest))){
    outH+=plain(rest.slice(last,m.index))+'<span class="str">'+m[1]+'</span>';
    last=m.index+m[1].length;
  }
  outH+=plain(rest.slice(last));
  return outH;
}
function codeBoxHTML(lines){
  return '<div class="codebox">'+lines.map(function(l,i){
    return '<div class="cl"><span class="cln">'+(i+1)+'</span>'+colorCode(l)+'</div>';
  }).join("")+'</div>';
}
function termHTML(res){
  let h='<div class="term">';
  res.out.forEach(function(l,i){ h+='<div class="tl" style="animation-delay:'+(i*0.22)+'s">'+escT(l)+'</div>'; });
  if(res.err)h+='<div class="terr" style="animation-delay:'+(res.out.length*0.22)+'s">Line '+res.err.ln+' — '+escT(res.err.msg)+'</div>';
  if(!res.out.length&&!res.err)h+='<div class="tdim">…nothing printed</div>';
  return h+'</div>';
}

function genTable(level){
  const theme=rint(2)===0
    ? {title:"PETS",cols:["NAME","SPECIES","AGE"],names:["Rex","Milo","Coco","Bubbles","Luna","Ziggy"],cats:["dog","cat","parrot","fish"],numName:"AGE",bigWord:"older"}
    : {title:"PLAYERS",cols:["NAME","LEVEL","TEAM"],names:["Maya","Leo","Zoe","Kai","Ari","Sam"],cats:["RED","BLUE","GOLD"],numName:"LEVEL",bigWord:"above"};
  const isPets=theme.title==="PETS";
  const names=sample(theme.names,4);
  let rows=names.map(function(nm){
    const num=1+rint(isPets?9:12);
    return isPets?[nm,pick(theme.cats),num]:[nm,num,pick(theme.cats)];
  });
  const numIdx=isPets?2:1, catIdx=isPets?1:2;
  const html='<table class="dtable"><tr>'+theme.cols.map(function(c){return '<th>'+c+'</th>';}).join("")+'</tr>'+
    rows.map(function(r){return '<tr>'+r.map(function(v){return '<td>'+escT(v)+'</td>';}).join("")+'</tr>';}).join("")+'</table>';
  const kind=rint(3);
  if(kind===0){ // lookup
    const row=pick(rows);
    const ans=String(row[catIdx]);
    const wrongs=sample(theme.cats.filter(function(c){return String(c)!==ans;}),2).map(String);
    return {html:html,q:"What "+(isPets?"SPECIES":"TEAM")+" is "+row[0]+"?",ans:ans.toUpperCase(),wrongs:wrongs.map(function(w){return w.toUpperCase();}),
      why:"Find the row, slide across to the column. That's a database lookup."};
  }
  if(kind===1){ // filter count
    for(let tries=0;tries<20;tries++){
      const N=3+rint(6);
      const cnt=rows.filter(function(r){return r[numIdx]>N;}).length;
      if(cnt>=1&&cnt<=3){
        return {html:html,q:"How many are "+theme.bigWord+" "+theme.numName.toLowerCase()+" "+N+"?",
          ans:String(cnt),wrongs:[String(cnt+1),String(Math.max(0,cnt-1))],
          why:"You just ran a QUERY: show me every row where "+theme.numName.toLowerCase()+" is bigger than "+N+"."};
      }
    }
    const row=pick(rows);
    return {html:html,q:"What "+(isPets?"SPECIES":"TEAM")+" is "+row[0]+"?",ans:String(row[catIdx]).toUpperCase(),
      wrongs:sample(theme.cats.filter(function(c){return String(c)!==String(row[catIdx]);}),2).map(function(w){return String(w).toUpperCase();}),
      why:"Row first, then column. Lookup complete."};
  }
  // max — ensure unique
  let maxV=-1,maxN=null,tie=false;
  rows.forEach(function(r){ if(r[numIdx]>maxV){maxV=r[numIdx];maxN=r[0];tie=false;} else if(r[numIdx]===maxV)tie=true; });
  if(tie){ rows[0][numIdx]=13; maxN=rows[0][0]; }
  const rebuilt='<table class="dtable"><tr>'+theme.cols.map(function(c){return '<th>'+c+'</th>';}).join("")+'</tr>'+
    rows.map(function(r){return '<tr>'+r.map(function(v){return '<td>'+escT(v)+'</td>';}).join("")+'</tr>';}).join("")+'</table>';
  return {html:rebuilt,q:"Who has the highest "+theme.numName+"?",ans:maxN,
    wrongs:sample(rows.map(function(r){return r[0];}).filter(function(n){return n!==maxN;}),2),
    why:"Scanning a column for the biggest value — databases do that across MILLIONS of rows in a blink."};
}

function genErrFix(level){
  const t=level<=1?rint(3):rint(5);
  let s,w;
  switch(t){
    case 0: s=3+rint(6);
      return {lines:['score = '+s,'print(scor)'],fixLn:2,mission:String(s),
        fix:'print(score)',wrongs:['print("scor")','scor = 7'],
        why:"The error said it: I don't know scor. One missing letter — classic typo bug."};
    case 1: w=pick(PY_WORDS);
      return {lines:['print('+w+')'],fixLn:1,mission:w,
        fix:'print("'+w+'")',wrongs:['print('+w+' + '+w+')','print(print)'],
        why:"Without quotes, the machine hunts for a BOX named "+w+" — and finds nothing. Quotes make it a word."};
    case 2:
      return {lines:['power = 9','if power > 5','  print("mega")'],fixLn:2,mission:"mega",
        fix:'if power > 5:',wrongs:['if power > 5;','print(if power)'],
        why:"The colon tells the machine: the choosing starts here. Tiny character, big job."};
    case 3:
      return {lines:['age = 12','if age < 10:','  print("big kid")','else:','  print("little kid")'],fixLn:2,mission:"big kid",
        fix:'if age > 10:',wrongs:['if age == 10:','if age < 5:'],
        why:"No error this time — the code RAN, just wrong. The rule pointed the wrong way. Logic bugs hide quietly."};
    default:
      return {lines:['a = 3','b = "4"','print(a + b)'],fixLn:2,mission:"7",
        fix:'b = 4',wrongs:['a = "3"','print(a)'],
        why:"The quotes turned 4 into a word, so plus GLUED instead of adding. Sneakiest bug in the book."};
  }
}

  }

  nextProblem();

    '<div class="feedback" id="acFb"></div></div>');
  app.appendChild(st);
  const sky=st.querySelector("#sky"), scoreEl=st.querySelector("#acScore"), timeEl=st.querySelector("#acTime"), fb=st.querySelector("#acFb");
  let score=0, timeLeft=25, playing=false, spawnT=null, clockT=null;
  function stopAll(){ if(spawnT)clearInterval(spawnT); if(clockT)clearInterval(clockT); playing=false; }
  function spawn(){
    if(!sky.isConnected){ stopAll(); return; }
    const s=el('<div class="fallstar">'+(ART?'<img src="assets/obj-star.png" alt="">':pick(["⭐","🌟","💫"]))+'</div>');
    s.style.left=(5+rint(85))+"%";
    const dur=2.6+Math.random()*1.2;
    s.style.transition="top "+dur+"s linear";
    sky.appendChild(s);
    requestAnimationFrame(function(){ requestAnimationFrame(function(){ s.style.top="105%"; }); });
    s.onclick=function(){
      if(!playing)return;
      score++; scoreEl.textContent="SCORE: "+score;
      s.classList.add("caught"); pow("+1","var(--yellow)");
      setTimeout(()=>s.remove(),300);
    };
    setTimeout(()=>{ if(s.isConnected)s.remove(); },dur*1000+200);
  }
  st.querySelector("#acGo").onclick=function(ev){
    if(playing)return;
    playing=true; score=0; timeLeft=25;
    scoreEl.textContent="SCORE: 0"; timeEl.textContent="25s"; fb.textContent="";
    ev.target.style.visibility="hidden";
    speak("Stars are falling! Tap them before they land! Every tap is an EVENT — the game is listening for YOU! Go go go!");
    spawnT=setInterval(spawn,750);
    clockT=setInterval(function(){
      if(!sky.isConnected){ stopAll(); return; }
      timeLeft--; timeEl.textContent=timeLeft+"s";
      if(timeLeft<=0){
        stopAll();
        ev.target.style.visibility="visible"; ev.target.textContent="▶ AGAIN!";
        const isBest=score>(P.best||0);
        if(isBest){ P.best=score; save(); confetti(36); }
        fb.textContent=isBest?"🏆 NEW BEST: "+score+"!":"SCORE: "+score;
        speak(isBest?("NEW RECORD! "+score+" stars! Incredible tapping, "+NAME+"!")
                    :("You caught "+score+" stars! Every tap was an event the game heard. Play again and beat your best!"));
      }
    },1000);
  };
  const intro="Star catcher! When you tap a star, the game reacts — coders call that an EVENT! Press go, and catch as many as you can in twenty five seconds!";
  replayFn=function(){speak(intro);};
  speak(intro);
}
/* ============================== PIXEL'S TERMINAL (free play, 7-11) ============================== */
function renderTerminal(){
  app.appendChild(header("🖥️ PIXEL'S TERMINAL"));
  const EX=[
    {n:"👋 hello",c:'name = "'+NAME+'"\nprint("hi " + name)'},
    {n:"➕ math",c:'a = 12\nb = 30\nprint(a + b)'},
    {n:"🔱 fork",c:'power = 9\nif power > 5:\n  print("MEGA MODE")\nelse:\n  print("mini mode")'},
    {n:"🐛 broken",c:'score = 7\nprint(scor)'},
  ];
  const st=el('<div class="stage">'+
    '<div class="sub" style="font-size:15px;">Real code. It really runs. Break it — that\'s allowed.<br>'+
    '<span style="color:var(--faint);font-size:13px;">This terminal understands print(...), boxes like score = 7, and if / else.</span></div>'+
    '<div class="card">'+
      '<textarea class="termta" id="tta" spellcheck="false" autocapitalize="off" autocomplete="off" autocorrect="off"></textarea>'+
      '<div class="btnrow" style="margin-top:10px;"><button class="btn green" id="trun" style="font-size:22px;">▶ RUN</button>'+
      '<button class="btn ghost" id="tclear">🧹</button></div>'+
      '<div class="palette" id="texs" style="margin-top:10px;"></div>'+
      '<div id="tout"></div>'+
    '</div></div>');
  app.appendChild(st);
  const ta=st.querySelector("#tta"), tout=st.querySelector("#tout");
  ta.value=EX[0].c;
  let firstRun=true;
  EX.forEach(function(ex){
    const c=el('<div class="chip" style="font-size:14px;">'+ex.n+'</div>');
    c.onclick=function(){ ta.value=ex.c; tout.innerHTML=""; };
    st.querySelector("#texs").appendChild(c);
  });
  st.querySelector("#tclear").onclick=function(){ ta.value=""; tout.innerHTML=""; ta.focus(); };
  st.querySelector("#trun").onclick=function(){
    const res=pixRun(ta.value);
    tout.innerHTML=termHTML(res);
    if(firstRun){
      firstRun=false;
      speak(res.err?("An error — line "+res.err.ln+". Read it, it's a clue!"):"It ran! Your code, really running. Change something and run it again!");
    }
  };
  const intro="Welcome to my terminal, "+NAME+". Type real code, press run, and watch it obey — or watch it complain! Try the example chips, or break things on purpose. Breaking things here is one hundred percent allowed.";
  replayFn=function(){speak(intro);};
  speak(intro);
}
/* ============================== GROWN-UPS ============================== */
function renderGrown(){
  app.appendChild(header("FOR GROWN-UPS"));
  const st=el('<div class="stage"></div>');
  /* ---- cloud sync section (additive; safe no-op if Supabase never loaded) ---- */
  if(!sb){
    st.appendChild(el('<div class="card" style="text-align:center;color:var(--faint);font-size:14px;">☁️ Sync is unavailable right now.</div>'));
  }else if(!cloudUser){
    const syncCard=el('<div class="card"></div>');
    if(syncUiStep==="email"){
      syncCard.innerHTML =
        '<div class="sub" style="margin:0 0 10px;">☁️ SYNC ACROSS DEVICES</div>'+
        '<div class="sub" style="font-size:14px;font-weight:400;margin-bottom:12px;">Sign in to save progress across every device.</div>'+
        '<input id="syncEmail" type="email" placeholder="parent@email.com" style="width:100%;box-sizing:border-box;font-family:var(--disp);font-size:22px;'+
          'padding:14px 16px;border-radius:var(--r-md);border:1px solid var(--stroke);background:rgba(0,0,0,.25);color:var(--white);'+
          'text-align:center;outline:none;" autocomplete="off"/>'+
        '<div class="btnrow" style="margin-top:14px;"><button class="btn" id="syncSend" style="font-size:16px;padding:12px 20px;">SEND SIGN-IN CODE</button></div>'+
        '<div id="syncStatusLine" class="sub" style="font-size:13px;margin-top:10px;"></div>';
      const emailInput=syncCard.querySelector("#syncEmail");
      emailInput.value = syncUiEmail;
      const statusEl=syncCard.querySelector("#syncStatusLine");
      syncCard.querySelector("#syncSend").onclick=function(){
        const emailValue=(emailInput.value||"").trim();
        if(!emailValue||emailValue.indexOf("@")<0){ statusEl.textContent="Enter a valid email"; return; }
        statusEl.textContent="Sending…";
        sb.auth.signInWithOtp({ email: emailValue }).then(function(res){
          if(res.error){ statusEl.textContent="Error: "+res.error.message; return; }
          syncUiEmail = emailValue;
          syncUiStep = "code";
          go("grown");
        });
      };
    }else{
      const safeEmail=String(syncUiEmail||"").replace(/[<>&]/g,"");
      syncCard.innerHTML =
        '<div class="sub" style="margin:0 0 10px;">☁️ ENTER YOUR CODE</div>'+
        '<div class="sub" style="font-size:14px;font-weight:400;margin-bottom:12px;">We sent a code to '+safeEmail+'. Type it below — on your phone, check the email, then type the code here on this device.</div>'+
        '<input id="syncCode" type="text" inputmode="numeric" autocomplete="one-time-code" placeholder="Enter code" maxlength="12" style="width:100%;box-sizing:border-box;font-family:var(--disp);font-size:30px;'+
          'letter-spacing:8px;padding:14px 16px;border-radius:var(--r-md);border:1px solid var(--stroke);background:rgba(0,0,0,.25);color:var(--white);'+
          'text-align:center;outline:none;"/>'+
        '<div class="btnrow" style="margin-top:14px;"><button class="btn" id="syncVerify" style="font-size:16px;padding:12px 20px;">VERIFY</button></div>'+
        '<div id="syncStatusLine" class="sub" style="font-size:13px;margin-top:10px;"></div>'+
        '<div class="btnrow" style="margin-top:10px;">'+
          '<button class="btn ghost" id="syncResend" style="font-size:13px;padding:8px 14px;">RESEND CODE</button>'+
          '<button class="btn ghost" id="syncBack" style="font-size:13px;padding:8px 14px;">‹ USE A DIFFERENT EMAIL</button>'+
        '</div>';
      const codeInput=syncCard.querySelector("#syncCode");
      const statusEl=syncCard.querySelector("#syncStatusLine");
      syncCard.querySelector("#syncVerify").onclick=function(){
        const codeValue=(codeInput.value||"").trim();
        if(!codeValue){ statusEl.textContent="Enter the code from the email"; return; }
        statusEl.textContent="Checking…";
        sb.auth.verifyOtp({ email: syncUiEmail, token: codeValue, type: "email" }).then(function(res){
          if(res.error){ statusEl.textContent="Error: "+res.error.message; return; }
          statusEl.textContent="✓ Signed in!";
          // onAuthStateChange (registered in initSupabase) picks up cloudUser + re-renders from here
        });
      };
      syncCard.querySelector("#syncResend").onclick=function(){
        statusEl.textContent="Sending…";
        sb.auth.signInWithOtp({ email: syncUiEmail }).then(function(res){
          statusEl.textContent = res.error ? ("Error: "+res.error.message) : "New code sent!";
        });
      };
      syncCard.querySelector("#syncBack").onclick=function(){
        syncUiStep="email";
        go("grown");
      };
    }
    st.appendChild(syncCard);
  }else{
    const statusMap={idle:"Ready to sync",syncing:"Syncing…",synced:"✓ Synced",error:"Sync failed — will retry"};
    const safeEmail=String(cloudUser.email||"").replace(/[<>&]/g,"");
    const syncedCard=el('<div class="card">'+
      '<div class="sub" style="margin:0 0 8px;">☁️ SYNCED</div>'+
      '<div class="sub" style="font-size:14px;font-weight:400;">Signed in as '+safeEmail+'</div>'+
      '<div class="sub" style="font-size:13px;margin-top:4px;">'+(statusMap[syncStatus]||"Ready to sync")+'</div>'+
      '<div class="btnrow" style="margin-top:12px;">'+
        '<button class="btn" id="syncNow" style="font-size:14px;padding:10px 16px;">🔄 SYNC NOW</button>'+
        '<button class="btn ghost" id="syncOut" style="font-size:14px;padding:10px 16px;">SIGN OUT</button>'+
      '</div>'+
    '</div>');
    syncedCard.querySelector("#syncNow").onclick=function(){ cloudSyncAll().then(function(){ render(); }); };
    syncedCard.querySelector("#syncOut").onclick=function(){ sb.auth.signOut().then(function(){ syncUiStep="email"; syncUiEmail=""; render(); }); };
    st.appendChild(syncedCard);
  }
  st.appendChild(el('<div class="grown">'+
    '<h3>How Hero Academy works</h3>'+
    'A mastery curriculum, Code-Ninjas style. Each <b>belt</b> = spoken lessons (with quick checks) → a <b>practice arena</b> (problems are randomly generated, so answers can\'t be memorized) → a <b>belt test</b> that unlocks the next belt.<br><br>'+
    '⚪ White — computer basics + history · 🟡 Yellow — sequences · 🟠 Orange — loops · 🟢 Green — if/then + else · 🔵 Blue — variables · 🟣 Purple — debugging · ⚫ Black — mixed final mission.<br><br>'+
    'Each practice game holds 3 stars (3 / 6 / 10 correct); problems get harder as stars grow. 🗣️ repeats narration, 🔊/🔇 mutes. Progress saves on this device.'+
  '</div>'));
  st.appendChild(el('<div class="sub" style="font-family:var(--disp);letter-spacing:1px;margin-top:6px;">👤 CURRENT PLAYER</div>'));
  if(activeProfile){
    st.appendChild(el('<div class="grown">'+
      '<b>'+activeProfile.avatar+' '+activeProfile.name+'</b> — '+(activeProfile.ageBand==="7-11"?"Ages 7–11":"Ages 4–7")+
    '</div>'));
    const pactions=el('<div class="btnrow" style="margin-top:10px;">'+
      '<button class="btn blue" id="gswitch" style="font-size:14px;padding:10px 16px;">👤 SWITCH PLAYER</button>'+
      '<button class="btn ghost" id="gageband" style="font-size:14px;padding:10px 16px;">🔁 CHANGE AGE BAND</button>'+
      '<button class="btn red" id="gdelete" style="font-size:14px;padding:10px 16px;">DELETE THIS PLAYER</button>'+
    '</div>');
    pactions.querySelector("#gswitch").onclick=function(){ go("pick"); };
    pactions.querySelector("#gageband").onclick=function(){
      activeProfile.ageBand=activeProfile.ageBand==="7-11"?"4-7":"7-11";
      activeProfile.updatedAt = new Date().toISOString();
      saveProfiles(); go("grown");
    };
    const delBtn=pactions.querySelector("#gdelete");
    let delArmed=false;
    delBtn.onclick=function(){
      if(!delArmed){ delArmed=true; delBtn.textContent="TAP AGAIN TO CONFIRM"; return; }
      const id=activeProfile.id;
      deleteProfile(id);
      go("pick");
    };
    st.appendChild(pactions);
  }else{
    st.appendChild(el('<div class="grown">No player selected.</div>'));
  }
  st.appendChild(el('<div class="sub" style="font-family:var(--disp);letter-spacing:1px;margin-top:6px;">🔒 BELT CONTROLS</div>'));
  st.appendChild(el('<div class="sub" style="font-size:13px;margin:0 0 4px;">Unlock or re-lock any belt. Locking keeps her lessons &amp; stars — she just re-takes that belt test. White belt is always open.</div>'));
  const list=el('<div style="display:flex;flex-direction:column;gap:8px;"></div>');
  TRACK().forEach(function(b,i){
    if(b.soon)return;
    const openNow=beltOpen(i);
    const row=el('<div style="display:flex;align-items:center;gap:10px;background:var(--surface);border:1px solid var(--stroke-soft);border-radius:var(--r-md);padding:8px 12px;">'+
      '<span style="line-height:0;">'+beltGemSVG(b.id,22)+'</span>'+
      '<span style="flex:1;font-family:var(--disp);font-size:14px;letter-spacing:.5px;color:var(--off);">'+b.name+'</span>'+
      '<button class="btn '+(i===0||openNow?"ghost":"green")+'" style="font-size:13px;padding:8px 14px;letter-spacing:.5px;">'+
        (i===0?"ALWAYS ON":(openNow?"🔒 LOCK":"🔓 UNLOCK"))+'</button></div>');
    const btn=row.querySelector("button");
    if(i===0){ btn.disabled=true; }
    else btn.onclick=function(){
      if(beltOpen(i)){ for(let k=i-1;k<TRACK().length;k++)BP(TRACK()[k].id).earned=false; }
      else { for(let k=0;k<i;k++)BP(TRACK()[k].id).earned=true; }
      save(); go("grown");
    };
    list.appendChild(row);
  });
  st.appendChild(list);
  const actions=el('<div class="btnrow" style="margin-top:12px;">'+
    '<button class="btn ghost" id="gback">⬅ BACK</button>'+
    '<button class="btn red" id="greset">RESET THIS PLAYER</button></div>');
  actions.querySelector("#gback").onclick=function(){ go("map"); };
  const rbtn=actions.querySelector("#greset");
  let armed=false;
  rbtn.onclick=function(){
    if(!armed){ armed=true; rbtn.textContent="TAP AGAIN TO CONFIRM"; return; }
    P={v:3,belts:{},heroes:0,best:0}; save(); go("map");
  };
  st.appendChild(actions);
  app.appendChild(st);
  replayFn=function(){ speak("This is the grown-up page. Here you can unlock or re-lock any belt, or reset everything."); };
}
/* ============================== BOOT ============================== */
if(PROFILES.active){ selectProfile(PROFILES.active); }
initSupabase();
render();
</script>
